<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ReadSpark – English Reading for Kids</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Fredoka+One&display=swap" rel="stylesheet">
<style>
  :root {
    --blue:#3b82f6;--blue-dark:#1d4ed8;--green:#22c55e;--green-dark:#16a34a;
    --orange:#f97316;--red:#ef4444;--yellow:#fbbf24;--purple:#8b5cf6;
    --bg:#f0f7ff;--text:#1e293b;--muted:#64748b;
    --radius:20px;--shadow:0 4px 24px rgba(59,130,246,0.12);
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;
    background-image:radial-gradient(circle at 20% 20%,#dbeafe 0%,transparent 50%),
    radial-gradient(circle at 80% 80%,#fde8ff 0%,transparent 50%);}

  /* ── PROFILE SCREEN ── */
  #profile-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;}
  .profile-box{background:white;border-radius:var(--radius);padding:40px 32px;max-width:480px;width:100%;
    box-shadow:var(--shadow);text-align:center;}
  .profile-box .pb-emoji{font-size:64px;margin-bottom:12px;display:block;}
  .profile-box h1{font-family:'Fredoka One',cursive;font-size:32px;color:var(--blue-dark);margin-bottom:6px;}
  .profile-box p{color:var(--muted);font-size:15px;margin-bottom:24px;}
  .user-list{display:flex;flex-direction:column;gap:10px;margin-bottom:20px;}
  .user-card{background:#f8fafc;border:2.5px solid #e2e8f0;border-radius:14px;padding:14px 18px;
    display:flex;align-items:center;gap:14px;cursor:pointer;transition:all .2s;text-align:left;}
  .user-card:hover{border-color:var(--blue);background:#eff6ff;transform:translateX(4px);}
  .user-avatar{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;
    font-size:22px;font-weight:800;color:white;flex-shrink:0;}
  .user-info .u-name{font-weight:800;font-size:16px;}
  .user-info .u-stats{font-size:12px;color:var(--muted);margin-top:2px;}
  .user-delete{margin-left:auto;background:none;border:none;color:#cbd5e1;cursor:pointer;font-size:18px;padding:4px;
    border-radius:8px;transition:color .2s;flex-shrink:0;}
  .user-delete:hover{color:var(--red);}
  .divider{border:none;border-top:1px solid #e2e8f0;margin:16px 0;}
  .new-user-form{display:flex;flex-direction:column;gap:10px;}
  .new-user-form h3{font-family:'Fredoka One',cursive;font-size:18px;color:var(--blue-dark);}
  .name-input{width:100%;padding:12px 16px;border:2.5px solid #e2e8f0;border-radius:12px;
    font-family:'Nunito',sans-serif;font-size:15px;font-weight:600;outline:none;transition:border-color .2s;}
  .name-input:focus{border-color:var(--blue);}
  .avatar-picker{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin:4px 0;}
  .av-btn{width:44px;height:44px;border-radius:50%;border:3px solid transparent;
    font-size:20px;cursor:pointer;background:#f1f5f9;display:flex;align-items:center;justify-content:center;
    transition:all .2s;}
  .av-btn:hover,.av-btn.selected{border-color:var(--blue);background:#dbeafe;transform:scale(1.15);}
  .btn-create{background:linear-gradient(135deg,var(--blue),var(--purple));color:white;border:none;
    padding:12px;border-radius:12px;font-family:'Fredoka One',cursive;font-size:18px;cursor:pointer;
    transition:opacity .2s;}
  .btn-create:hover{opacity:.9;}

  /* ── HEADER ── */
  header{background:white;padding:12px 20px;display:flex;align-items:center;justify-content:space-between;
    box-shadow:0 2px 12px rgba(0,0,0,0.07);position:sticky;top:0;z-index:100;}
  .logo{font-family:'Fredoka One',cursive;font-size:24px;color:var(--blue);display:flex;align-items:center;gap:8px;}
  .header-right{display:flex;gap:8px;align-items:center;}
  .current-user-btn{display:flex;align-items:center;gap:8px;background:#f8fafc;border:2px solid #e2e8f0;
    border-radius:50px;padding:6px 14px;cursor:pointer;font-family:'Nunito',sans-serif;font-weight:700;
    font-size:14px;transition:all .2s;}
  .current-user-btn:hover{border-color:var(--blue);background:#eff6ff;}
  .cu-dot{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;
    font-size:14px;color:white;font-weight:800;}
  .btn-scores{background:var(--purple);color:white;border:none;padding:8px 14px;border-radius:50px;
    font-family:'Nunito',sans-serif;font-weight:700;font-size:14px;cursor:pointer;transition:transform .15s;}
  .btn-scores:hover{transform:translateY(-2px);}
  main{max-width:900px;margin:0 auto;padding:24px 20px 60px;}

  /* START */
  #start-section{display:block;}
  .welcome-bar{background:linear-gradient(135deg,#1d4ed8,#7c3aed);border-radius:16px;padding:20px 24px;
    color:white;display:flex;align-items:center;justify-content:space-between;margin-bottom:28px;flex-wrap:wrap;gap:12px;}
  .wb-left h2{font-family:'Fredoka One',cursive;font-size:22px;margin-bottom:4px;}
  .wb-left p{opacity:.85;font-size:14px;}
  .wb-stats{display:flex;gap:16px;flex-wrap:wrap;}
  .wb-stat{background:rgba(255,255,255,.15);border-radius:12px;padding:10px 16px;text-align:center;}
  .wb-stat .ws-num{font-family:'Fredoka One',cursive;font-size:24px;}
  .wb-stat .ws-label{font-size:11px;opacity:.8;font-weight:700;}

  .filter-section{margin-bottom:20px;}
  .filter-section h2{font-size:18px;font-weight:800;color:var(--blue-dark);margin-bottom:12px;}
  .filter-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px;}
  .filter-btn{background:white;border:2.5px solid #e2e8f0;border-radius:50px;padding:7px 14px;
    font-family:'Nunito',sans-serif;font-weight:700;font-size:13px;cursor:pointer;transition:all .2s;color:var(--text);}
  .filter-btn:hover,.filter-btn.active{border-color:var(--blue);background:#eff6ff;color:var(--blue);}
  .search-bar{width:100%;padding:11px 16px;border:2.5px solid #e2e8f0;border-radius:50px;
    font-family:'Nunito',sans-serif;font-size:14px;font-weight:600;outline:none;margin-bottom:12px;transition:border-color .2s;}
  .search-bar:focus{border-color:var(--blue);}
  .articles-count{text-align:center;color:var(--muted);font-size:13px;font-weight:600;margin-bottom:14px;}
  .articles-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:14px;margin-bottom:28px;}
  .article-card-mini{background:white;border-radius:16px;padding:16px;box-shadow:0 2px 12px rgba(0,0,0,.07);
    cursor:pointer;transition:transform .2s,box-shadow .2s;border:2px solid transparent;}
  .article-card-mini:hover{transform:translateY(-4px);box-shadow:var(--shadow);border-color:var(--blue);}
  .article-card-mini.completed{border-color:var(--green);}
  .mini-header{display:flex;align-items:flex-start;gap:10px;margin-bottom:8px;}
  .mini-emoji{font-size:32px;flex-shrink:0;}
  .mini-title{font-weight:800;font-size:14px;line-height:1.3;color:var(--text);}
  .mini-topic{font-size:11px;color:var(--muted);margin-top:2px;font-weight:600;}
  .mini-footer{display:flex;align-items:center;justify-content:space-between;}
  .mini-badge{font-size:11px;font-weight:700;padding:3px 9px;border-radius:50px;background:#eff6ff;color:var(--blue);}
  .mini-score{font-family:'Fredoka One',cursive;font-size:15px;}
  .mini-score.great{color:var(--green);}
  .mini-score.ok{color:var(--orange);}
  .mini-score.low{color:var(--red);}

  /* READING */
  #reading-section{display:none;}
  .article-card{background:white;border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;margin-bottom:18px;}
  .article-header{background:linear-gradient(135deg,#1d4ed8,#7c3aed);padding:18px 22px;color:white;}
  .article-header h1{font-size:20px;font-weight:800;margin-bottom:8px;}
  .article-meta{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px;}
  .badge{background:rgba(255,255,255,.2);padding:3px 10px;border-radius:50px;font-size:11px;font-weight:700;}
  .controls-bar{display:flex;gap:8px;flex-wrap:wrap;}
  .ctrl-btn{background:rgba(255,255,255,.2);border:2px solid rgba(255,255,255,.4);color:white;border-radius:50px;
    padding:6px 13px;font-family:'Nunito',sans-serif;font-weight:700;font-size:12px;cursor:pointer;transition:background .2s;}
  .ctrl-btn:hover{background:rgba(255,255,255,.35);}
  .ctrl-btn.speaking{background:rgba(251,191,36,.4);}
  .timer-bar{background:#f8fafc;padding:9px 22px;display:flex;align-items:center;justify-content:space-between;
    border-bottom:1px solid #e2e8f0;}
  .timer-display{font-family:'Fredoka One',cursive;font-size:20px;color:var(--blue);}
  .timer-label{font-size:12px;color:var(--muted);font-weight:600;}
  .article-body{padding:22px;line-height:1.9;font-size:16px;}
  .article-body p{margin-bottom:12px;}
  .vocab-word{cursor:pointer;border-bottom:2px dashed var(--blue);color:var(--blue-dark);font-weight:700;
    padding:0 2px;border-radius:3px;transition:background .15s;}
  .vocab-word:hover{background:#dbeafe;}
  .tooltip{position:fixed;background:#1e293b;color:white;padding:10px 14px;border-radius:12px;
    font-size:13px;max-width:240px;z-index:999;pointer-events:none;opacity:0;transition:opacity .2s;
    line-height:1.5;box-shadow:0 8px 24px rgba(0,0,0,.3);}
  .tooltip.visible{opacity:1;}
  .tooltip strong{color:var(--yellow);font-size:14px;display:block;margin-bottom:3px;}

  /* QUIZ */
  #quiz-section{display:none;}
  .quiz-header{text-align:center;margin-bottom:20px;}
  .quiz-header h2{font-family:'Fredoka One',cursive;font-size:26px;color:var(--blue-dark);}
  .quiz-header p{color:var(--muted);font-size:14px;margin-top:5px;}
  .progress-bar-outer{background:#e2e8f0;height:8px;border-radius:99px;margin:12px 0 20px;overflow:hidden;}
  .progress-bar-inner{height:100%;background:linear-gradient(90deg,var(--blue),var(--purple));border-radius:99px;transition:width .4s;}
  .question-card{background:white;border-radius:var(--radius);padding:22px;box-shadow:var(--shadow);margin-bottom:16px;}
  .q-number{font-size:11px;font-weight:800;color:var(--purple);text-transform:uppercase;letter-spacing:1px;margin-bottom:7px;}
  .q-text{font-size:16px;font-weight:700;line-height:1.4;margin-bottom:16px;}
  .options{display:flex;flex-direction:column;gap:9px;}
  .option-btn{background:#f8fafc;border:2.5px solid #e2e8f0;border-radius:13px;padding:12px 15px;
    text-align:left;font-family:'Nunito',sans-serif;font-size:14px;font-weight:600;cursor:pointer;
    transition:all .2s;display:flex;align-items:center;gap:11px;color:var(--text);}
  .option-btn:hover:not(:disabled){border-color:var(--blue);background:#eff6ff;transform:translateX(4px);}
  .option-label{width:28px;height:28px;background:#e2e8f0;border-radius:50%;display:flex;align-items:center;
    justify-content:center;font-weight:800;font-size:12px;flex-shrink:0;}
  .option-btn.correct{border-color:var(--green);background:#f0fdf4;color:var(--green-dark);}
  .option-btn.correct .option-label{background:var(--green);color:white;}
  .option-btn.wrong{border-color:var(--red);background:#fff5f5;color:var(--red);}
  .option-btn.wrong .option-label{background:var(--red);color:white;}
  .explanation{margin-top:10px;padding:11px 14px;background:#f0fdf4;border-left:4px solid var(--green);
    border-radius:10px;font-size:13px;color:#166534;font-weight:600;display:none;}
  .explanation.show{display:block;}
  .explanation.wrong-exp{background:#fff5f5;border-color:var(--red);color:#991b1b;}
  .quiz-nav{display:flex;justify-content:space-between;align-items:center;margin-top:6px;}
  .btn-next{background:linear-gradient(135deg,var(--green),#16a34a);color:white;border:none;padding:11px 24px;
    border-radius:50px;font-family:'Fredoka One',cursive;font-size:17px;cursor:pointer;display:none;transition:transform .2s;}
  .btn-next:hover{transform:translateY(-2px);}
  .btn-submit{background:linear-gradient(135deg,var(--orange),#dc2626);color:white;border:none;padding:11px 24px;
    border-radius:50px;font-family:'Fredoka One',cursive;font-size:17px;cursor:pointer;display:none;transition:transform .2s;}
  .btn-submit:hover{transform:translateY(-2px);}

  /* RESULTS */
  #result-section{display:none;text-align:center;}
  .result-card{background:white;border-radius:var(--radius);padding:32px 24px;box-shadow:var(--shadow);}
  .score-circle{width:120px;height:120px;border-radius:50%;margin:0 auto 16px;display:flex;flex-direction:column;
    align-items:center;justify-content:center;font-family:'Fredoka One',cursive;}
  .score-circle.great{background:linear-gradient(135deg,var(--green),#16a34a);color:white;}
  .score-circle.ok{background:linear-gradient(135deg,var(--orange),var(--yellow));color:white;}
  .score-circle.low{background:linear-gradient(135deg,var(--red),var(--orange));color:white;}
  .score-num{font-size:40px;line-height:1;}
  .score-denom{font-size:14px;opacity:.8;}
  .result-emoji{font-size:48px;margin-bottom:10px;}
  .result-title{font-family:'Fredoka One',cursive;font-size:28px;margin-bottom:6px;}
  .result-sub{color:var(--muted);font-size:14px;margin-bottom:18px;}
  .result-stats{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-bottom:20px;}
  .stat-pill{background:#f8fafc;border:2px solid #e2e8f0;border-radius:50px;padding:8px 14px;font-size:13px;font-weight:700;}
  .result-actions{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;}
  .btn-action{padding:11px 24px;border-radius:50px;font-family:'Fredoka One',cursive;font-size:16px;
    cursor:pointer;border:none;transition:transform .2s;}
  .btn-action:hover{transform:translateY(-2px);}
  .btn-action.blue{background:linear-gradient(135deg,var(--blue),var(--purple));color:white;}
  .btn-action.orange{background:linear-gradient(135deg,var(--orange),#dc2626);color:white;}
  .btn-action.green{background:linear-gradient(135deg,var(--green),#16a34a);color:white;}

  /* MODAL */
  .modal-overlay{position:fixed;inset:0;background:rgba(15,23,42,.6);backdrop-filter:blur(4px);
    z-index:200;display:none;align-items:center;justify-content:center;padding:20px;}
  .modal-overlay.open{display:flex;}
  .modal{background:white;border-radius:var(--radius);width:100%;max-width:540px;max-height:80vh;
    overflow-y:auto;padding:26px;box-shadow:0 20px 60px rgba(0,0,0,.25);}
  .modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;}
  .modal-header h3{font-family:'Fredoka One',cursive;font-size:20px;color:var(--blue-dark);}
  .btn-close{background:none;border:none;font-size:22px;cursor:pointer;color:var(--muted);}
  .history-empty{text-align:center;color:var(--muted);padding:36px;font-size:14px;}
  .history-item{border:2px solid #e2e8f0;border-radius:13px;padding:12px 14px;margin-bottom:9px;
    display:flex;align-items:center;justify-content:space-between;gap:10px;}
  .h-title{font-weight:700;font-size:13px;}
  .h-meta{font-size:11px;color:var(--muted);margin-top:2px;}
  .score-badge{font-family:'Fredoka One',cursive;font-size:17px;padding:5px 12px;border-radius:50px;color:white;}
  .score-badge.great{background:var(--green);}
  .score-badge.ok{background:var(--orange);}
  .score-badge.low{background:var(--red);}
  .btn-big{background:linear-gradient(135deg,var(--blue),var(--purple));color:white;border:none;
    padding:12px 30px;border-radius:50px;font-family:'Fredoka One',cursive;font-size:19px;cursor:pointer;
    box-shadow:0 4px 20px rgba(59,130,246,.3);transition:transform .2s;}
  .btn-big:hover{transform:translateY(-3px);}

  @media(max-width:600px){.article-header{padding:14px;}.wb-stats{display:none;}}
</style>
</head>
<body>

<!-- TOOLTIP -->
<div class="tooltip" id="tooltip">
  <strong id="tooltip-word"></strong><span id="tooltip-def"></span>
</div>

<!-- HISTORY MODAL -->
<div class="modal-overlay" id="history-modal">
  <div class="modal">
    <div class="modal-header">
      <h3>🏆 Score History</h3>
      <button class="btn-close" onclick="closeHistory()">✕</button>
    </div>
    <div id="history-list"></div>
  </div>
</div>

<!-- ── PROFILE SCREEN ── -->
<div id="profile-screen">
  <div class="profile-box">
    <span class="pb-emoji">📚</span>
    <h1>ReadSpark</h1>
    <p>Who's reading today? Choose your name or add a new reader!</p>

    <div class="user-list" id="user-list"></div>

    <hr class="divider">

    <div class="new-user-form">
      <h3>➕ Add New Reader</h3>
      <div class="avatar-picker" id="avatar-picker"></div>
      <input class="name-input" id="new-name" type="text" placeholder="Enter your name..." maxlength="20">
      <button class="btn-create" onclick="createUser()">Create Profile 🎉</button>
    </div>
  </div>
</div>

<!-- ── MAIN APP ── -->
<div id="app" style="display:none;">
  <header>
    <div class="logo"><span>📚</span> ReadSpark</div>
    <div class="header-right">
      <button class="current-user-btn" onclick="switchUser()" id="current-user-btn">
        <div class="cu-dot" id="cu-dot"></div>
        <span id="cu-name"></span> ▾
      </button>
      <button class="btn-scores" onclick="openHistory()">🏆 Scores</button>
    </div>
  </header>

  <main>
    <!-- START -->
    <div id="start-section">
      <div class="welcome-bar" id="welcome-bar">
        <div class="wb-left">
          <h2 id="welcome-msg"></h2>
          <p id="welcome-sub"></p>
        </div>
        <div class="wb-stats" id="wb-stats"></div>
      </div>
      <div class="filter-section">
        <h2>Choose a Topic</h2>
        <div class="filter-row" id="filter-row"></div>
        <input class="search-bar" id="search-bar" placeholder="🔍 Search articles..." oninput="filterArticles()">
        <div class="articles-count" id="articles-count"></div>
      </div>
      <div class="articles-grid" id="articles-grid"></div>
    </div>

    <!-- READING -->
    <div id="reading-section">
      <div class="article-card">
        <div class="article-header">
          <h1 id="article-title"></h1>
          <div class="article-meta">
            <span class="badge" id="badge-topic"></span>
            <span class="badge">Grade 3–4</span>
            <span class="badge" id="badge-words"></span>
          </div>
          <div class="controls-bar">
            <button class="ctrl-btn" id="tts-btn" onclick="toggleTTS()">🔊 Read Aloud</button>
            <button class="ctrl-btn" onclick="startQuiz()">📝 Take Quiz</button>
            <button class="ctrl-btn" onclick="goHome()">← Back</button>
          </div>
        </div>
        <div class="timer-bar">
          <div class="timer-display">⏱️ <span id="timer-display">0:00</span></div>
          <div class="timer-label">Reading Time</div>
        </div>
        <div class="article-body" id="article-body"></div>
      </div>
      <div style="text-align:center;margin-bottom:18px;color:var(--muted);font-size:13px;">
        💡 <strong>Tap any underlined word</strong> to see its meaning!
      </div>
      <div style="text-align:center;">
        <button class="btn-big" onclick="startQuiz()">📝 Ready — Take the Quiz!</button>
      </div>
    </div>

    <!-- QUIZ -->
    <div id="quiz-section">
      <div class="quiz-header">
        <h2>📝 Reading Quiz</h2>
        <p id="quiz-subtitle">Let's see what you understood!</p>
      </div>
      <div class="progress-bar-outer">
        <div class="progress-bar-inner" id="progress-bar" style="width:0%"></div>
      </div>
      <div id="questions-container"></div>
      <div class="quiz-nav">
        <div style="font-size:13px;color:var(--muted);font-weight:600;" id="q-counter"></div>
        <div style="display:flex;gap:9px;">
          <button class="btn-next" id="btn-next" onclick="nextQuestion()">Next ➜</button>
          <button class="btn-submit" id="btn-submit" onclick="submitQuiz()">Submit 🎉</button>
        </div>
      </div>
    </div>

    <!-- RESULTS -->
    <div id="result-section">
      <div class="result-card">
        <div class="result-emoji" id="result-emoji"></div>
        <div class="score-circle" id="score-circle">
          <div class="score-num" id="score-num"></div>
          <div class="score-denom" id="score-denom"></div>
        </div>
        <div class="result-title" id="result-title"></div>
        <div class="result-sub" id="result-sub"></div>
        <div class="result-stats" id="result-stats"></div>
        <div class="result-actions">
          <button class="btn-action blue" onclick="goHome()">🏠 More Stories</button>
          <button class="btn-action orange" onclick="reviewQuiz()">👀 Review</button>
          <button class="btn-action green" onclick="readAgain()">🔄 Read Again</button>
        </div>
      </div>
    </div>
  </main>
</div>

<script>
const ALL_ARTICLES = [{"id": 1, "topic": "Animals", "emoji": "🦁", "title": "The Amazing African Lion", "body": "Lions are known as the \"kings of the jungle,\" but they actually live in grasslands and open plains called savannas. Africa is home to most of the world's wild lions. These powerful cats can weigh up to 420 pounds and run as fast as 50 miles per hour!\n\nLions are unique among cats because they live in groups called prides. A pride usually has about 15 lions, including several females, their cubs, and a few males. The females, called lionesses, do most of the hunting. They work together as a team to catch prey like zebras and wildebeest.\n\nMale lions are famous for their magnificent manes — the thick ring of fur around their heads. A darker, fuller mane often means the lion is older and stronger. Lions communicate through roars that can be heard five miles away!\n\nSadly, lion populations have dropped by half in the past 25 years. Habitat loss and conflict with humans are the biggest threats. Conservation groups are working hard to protect these majestic animals for future generations.", "vocab": [{"word": "savanna", "definition": "A flat, grassy plain in Africa with very few trees."}, {"word": "pride", "definition": "The name for a group of lions that live together."}, {"word": "lioness", "definition": "A female lion."}, {"word": "magnificent", "definition": "Very beautiful and impressive."}, {"word": "conservation", "definition": "The work of protecting animals and nature."}, {"word": "habitat", "definition": "The natural place where an animal lives."}], "questions": [{"question": "Where do most wild lions live?", "options": ["A. In jungles", "B. In savannas and grasslands", "C. In forests", "D. In deserts"], "answer": 1, "explanation": "The passage says lions live in grasslands and open plains called savannas, not jungles."}, {"question": "Who does most of the hunting in a lion pride?", "options": ["A. Male lions", "B. Lion cubs", "C. Lionesses (female lions)", "D. All lions equally"], "answer": 2, "explanation": "The passage clearly states that lionesses (females) do most of the hunting and work together as a team."}, {"question": "What does a darker, fuller mane tell us about a male lion?", "options": ["A. He is younger", "B. He is older and stronger", "C. He is sick", "D. He is the fastest runner"], "answer": 1, "explanation": "According to the passage, a darker and fuller mane often means the lion is older and stronger."}, {"question": "How far away can a lion's roar be heard?", "options": ["A. One mile", "B. Three miles", "C. Five miles", "D. Ten miles"], "answer": 2, "explanation": "The passage states that lions' roars can be heard five miles away."}, {"question": "What is the biggest threat to lions today?", "options": ["A. Other predators", "B. Disease", "C. Habitat loss and conflict with humans", "D. Lack of water"], "answer": 2, "explanation": "The passage says habitat loss and conflict with humans are the biggest threats to lions."}]}, {"id": 2, "topic": "Animals", "emoji": "🐘", "title": "Elephants: The Gentle Giants", "body": "Elephants are the largest land animals on Earth. African elephants can weigh up to 14,000 pounds — as heavy as two large cars! They use their long trunks for breathing, smelling, drinking, and picking up objects. A trunk has over 40,000 muscles, making it one of the most flexible body parts in the animal kingdom.\n\nElephants live in close family groups led by the oldest female, called the matriarch. She guides the herd to food and water, using her wisdom and memory. Elephants have excellent memories and can remember water sources and migration routes for decades.\n\nThese gentle giants communicate in many ways. They trumpet loudly when excited or alarmed. They also make very low rumbling sounds that humans cannot hear. These sounds, called infrasound, can travel through the ground and reach other elephants miles away.\n\nElephants show deep emotions. They mourn their dead, play joyfully, and comfort each other when upset. They even recognize themselves in mirrors — something only a few animals can do. Protecting elephants is vital because they shape their environment by clearing trees and digging water holes that other animals depend on.", "vocab": [{"word": "matriarch", "definition": "The oldest female leader of an elephant herd."}, {"word": "flexible", "definition": "Able to bend and move easily in many ways."}, {"word": "infrasound", "definition": "Very low sounds that humans cannot hear."}, {"word": "migration", "definition": "The seasonal movement of animals from one place to another."}, {"word": "mourn", "definition": "To feel deep sadness after someone dies."}, {"word": "vital", "definition": "Extremely important and necessary."}], "questions": [{"question": "How many muscles does an elephant's trunk have?", "options": ["A. Over 400", "B. Over 4,000", "C. Over 40,000", "D. Over 400,000"], "answer": 2, "explanation": "The passage states that a trunk has over 40,000 muscles."}, {"question": "Who leads an elephant herd?", "options": ["A. The youngest male", "B. The oldest female (matriarch)", "C. The largest elephant", "D. The fastest elephant"], "answer": 1, "explanation": "Elephants live in groups led by the oldest female, called the matriarch."}, {"question": "What is infrasound?", "options": ["A. A loud trumpet call", "B. A sound only baby elephants make", "C. Very low sounds humans cannot hear", "D. Sounds made by elephant feet"], "answer": 2, "explanation": "The passage explains that infrasound refers to very low rumbling sounds that humans cannot hear."}, {"question": "Which of the following shows that elephants have emotions?", "options": ["A. They run very fast", "B. They mourn their dead and comfort each other", "C. They have large ears", "D. They eat a lot of food"], "answer": 1, "explanation": "The passage says elephants mourn their dead, play joyfully, and comfort each other — all signs of deep emotions."}, {"question": "Why are elephants important to their environment?", "options": ["A. They scare away predators", "B. They clear trees and dig water holes other animals use", "C. They plant seeds by eating fruit", "D. They make paths through the forest"], "answer": 1, "explanation": "The passage says elephants shape their environment by clearing trees and digging water holes that other animals depend on."}]}, {"id": 3, "topic": "Animals", "emoji": "🐬", "title": "Dolphins: Ocean Geniuses", "body": "Dolphins are among the most intelligent animals in the world. They live in oceans and some rivers, and belong to a group of animals called cetaceans — the same family as whales. Dolphins breathe air through a blowhole on top of their heads, so they must come to the surface regularly.\n\nDolphins are highly social and live in groups called pods, which can have anywhere from a few to hundreds of members. They cooperate to hunt fish, often herding them into tight balls before taking turns feeding. They also play together, riding waves and leaping out of the water.\n\nOne of the most impressive dolphin abilities is echolocation. Dolphins produce clicking sounds that travel through the water and bounce off objects. By listening to the echoes, they can determine the size, shape, and distance of objects — even in murky water or complete darkness.\n\nDolphins communicate with each other using a complex system of whistles, clicks, and body movements. Researchers have discovered that each dolphin has a unique signature whistle — like a name — that other dolphins use to call them. This level of communication is rare in the animal world.", "vocab": [{"word": "cetaceans", "definition": "The group of ocean mammals that includes dolphins and whales."}, {"word": "blowhole", "definition": "The nostril on top of a dolphin or whale's head for breathing."}, {"word": "echolocation", "definition": "Using sound echoes to find the location of objects."}, {"word": "murky", "definition": "Dark and cloudy, hard to see through."}, {"word": "signature", "definition": "Something unique that identifies a particular individual."}, {"word": "cooperate", "definition": "To work together toward a shared goal."}], "questions": [{"question": "How do dolphins breathe?", "options": ["A. Through gills like fish", "B. Through their mouths only", "C. Through a blowhole on top of their heads", "D. Through their skin"], "answer": 2, "explanation": "Dolphins breathe air through a blowhole on top of their heads and must surface regularly."}, {"question": "What is a group of dolphins called?", "options": ["A. A herd", "B. A pod", "C. A pride", "D. A school"], "answer": 1, "explanation": "The passage states that dolphins live in groups called pods."}, {"question": "What is echolocation?", "options": ["A. A special dolphin dance", "B. The way dolphins sleep", "C. Using sound echoes to locate objects", "D. A type of dolphin communication call"], "answer": 2, "explanation": "Echolocation is when dolphins produce clicking sounds that bounce off objects, helping them determine size, shape, and distance."}, {"question": "What is a signature whistle?", "options": ["A. A warning sound", "B. A unique whistle like a name for each dolphin", "C. A mating call", "D. A sound used only for hunting"], "answer": 1, "explanation": "Researchers found each dolphin has a unique signature whistle that other dolphins use to call them — like a name."}, {"question": "How do dolphins hunt fish together?", "options": ["A. By chasing fish to the shore", "B. By diving very deep", "C. By herding fish into tight balls and taking turns feeding", "D. By using echolocation to freeze the fish"], "answer": 2, "explanation": "The passage says dolphins cooperate to herd fish into tight balls before taking turns feeding."}]}, {"id": 4, "topic": "Animals", "emoji": "🦋", "title": "The Incredible Journey of the Monarch Butterfly", "body": "Every year, millions of monarch butterflies make one of the most amazing journeys in the animal kingdom. These delicate orange-and-black insects travel up to 3,000 miles from Canada and the United States to their winter home in the mountains of Mexico. The journey takes about two months.\n\nWhat makes this migration truly remarkable is that no single butterfly makes the round trip. The butterflies that leave Mexico in spring are the great-grandparents of those that return in fall. Yet somehow, each new generation finds its way back to the same small forests in Mexico — forests the butterflies have never visited before.\n\nScientists believe monarchs navigate using the sun as a compass. They also sense Earth's magnetic field to help them stay on course. Before migrating, monarchs feed heavily on milkweed plants to build up fat reserves for the long journey.\n\nMonarch populations have declined dramatically in recent decades. Pesticides have destroyed milkweed — the only plant monarch caterpillars can eat. Planting milkweed in gardens and reducing pesticide use are simple ways people can help save these extraordinary butterflies.", "vocab": [{"word": "migration", "definition": "A long seasonal journey made by animals to a different place."}, {"word": "remarkable", "definition": "Surprising and worthy of attention; extraordinary."}, {"word": "navigate", "definition": "To find your way from one place to another."}, {"word": "magnetic field", "definition": "An invisible force around Earth that compasses detect."}, {"word": "pesticides", "definition": "Chemicals used to kill insects that damage crops."}, {"word": "reserves", "definition": "Stored supplies saved for use when needed."}], "questions": [{"question": "How far do monarch butterflies travel during migration?", "options": ["A. Up to 300 miles", "B. Up to 1,000 miles", "C. Up to 3,000 miles", "D. Up to 5,000 miles"], "answer": 2, "explanation": "The passage says monarchs travel up to 3,000 miles from Canada and the US to Mexico."}, {"question": "What is remarkable about the monarch migration?", "options": ["A. They fly at night only", "B. No single butterfly makes the full round trip", "C. They travel in a single giant group", "D. They fly faster than any other insect"], "answer": 1, "explanation": "No single butterfly completes the round trip — the returning butterflies are the great-grandchildren of those that left."}, {"question": "How do monarchs find their way during migration?", "options": ["A. They follow rivers south", "B. They follow older butterflies", "C. They use the sun and Earth's magnetic field", "D. They use smell to find Mexico"], "answer": 2, "explanation": "Scientists believe monarchs use the sun as a compass and sense Earth's magnetic field to navigate."}, {"question": "Why is milkweed important to monarchs?", "options": ["A. It is where they lay their eggs and the only food for caterpillars", "B. It gives them energy for their flight", "C. It protects them from predators", "D. It marks the migration path"], "answer": 0, "explanation": "Milkweed is the only plant monarch caterpillars can eat, making it essential for their survival."}, {"question": "What is causing monarch populations to decline?", "options": ["A. Climate change only", "B. Predators eating them during migration", "C. Pesticides destroying milkweed", "D. Loss of forest in Mexico"], "answer": 2, "explanation": "The passage says pesticides have destroyed milkweed, which is the main cause of monarch population decline."}]}, {"id": 5, "topic": "Animals", "emoji": "🐧", "title": "Penguins: Birds That Can't Fly", "body": "Penguins are birds, but unlike most birds, they cannot fly. Instead, their wings evolved into flippers that make them superb swimmers. Penguins can swim up to 15 miles per hour and dive deeper than 1,800 feet. In the water, they are acrobatic hunters, chasing fish, squid, and krill.\n\nThere are 18 species of penguins, and they all live in the Southern Hemisphere. The largest is the Emperor penguin, which can grow up to 4 feet tall. Emperor penguins survive the brutal Antarctic winter by hudding together in large groups. They take turns moving to the warmer center of the huddle to share body heat.\n\nPenguins are devoted parents. Emperor penguin fathers balance a single egg on their feet and cover it with a warm flap of skin called a brood pouch. They do this for about 65 days through freezing temperatures, without eating, until the egg hatches.\n\nMost penguins mate for life. They recognize their partner and chicks among thousands of other penguins using unique calls. When a penguin returns from the sea, it calls out and its family answers — a remarkable display of connection in a noisy colony.", "vocab": [{"word": "evolved", "definition": "Changed slowly over many generations to be better suited for survival."}, {"word": "flippers", "definition": "Flat, paddle-like limbs used for swimming."}, {"word": "acrobatic", "definition": "Able to move in impressive and skillful ways."}, {"word": "huddle", "definition": "To crowd together closely for warmth or protection."}, {"word": "brood pouch", "definition": "A warm flap of skin used to keep an egg warm."}, {"word": "colony", "definition": "A large group of animals living together in one place."}], "questions": [{"question": "Why can't penguins fly?", "options": ["A. Their wings are too small", "B. Their wings evolved into flippers for swimming", "C. They are too heavy to fly", "D. They never learned how to fly"], "answer": 1, "explanation": "The passage explains that penguin wings evolved into flippers, making them excellent swimmers instead of flyers."}, {"question": "How do Emperor penguins survive the Antarctic winter?", "options": ["A. They migrate north", "B. They sleep underground", "C. They huddle together and share body heat", "D. They grow extra thick feathers"], "answer": 2, "explanation": "Emperor penguins huddle in large groups and take turns moving to the warmer center to share body heat."}, {"question": "What is a brood pouch?", "options": ["A. A nest made of rocks", "B. A warm skin flap used to keep the egg warm", "C. A pouch for carrying food", "D. A place where penguins sleep"], "answer": 1, "explanation": "A brood pouch is a warm flap of skin that Emperor penguin fathers use to cover and warm their egg."}, {"question": "How long do Emperor penguin fathers keep the egg warm without eating?", "options": ["A. About 20 days", "B. About 40 days", "C. About 65 days", "D. About 90 days"], "answer": 2, "explanation": "The passage says Emperor penguin fathers balance the egg for about 65 days through freezing temperatures without eating."}, {"question": "How do penguins recognize their family in a large colony?", "options": ["A. By their appearance", "B. By their smell", "C. By unique calls", "D. By the color of their flippers"], "answer": 2, "explanation": "Penguins recognize their partner and chicks among thousands using unique calls."}]}, {"id": 6, "topic": "Space", "emoji": "🚀", "title": "Our Solar System", "body": "Our solar system is a vast collection of objects all orbiting around a star we call the Sun. The Sun contains 99.8% of all the mass in the solar system — it is so large that about one million Earths could fit inside it! The Sun's gravity holds everything in the solar system in place.\n\nThere are eight planets in our solar system. The four closest to the Sun — Mercury, Venus, Earth, and Mars — are called terrestrial planets because they have rocky surfaces. The four outer planets — Jupiter, Saturn, Uranus, and Neptune — are called gas giants. They are enormous and made mostly of gas and liquid.\n\nBetween Mars and Jupiter lies the asteroid belt, a region filled with millions of rocks called asteroids. Beyond Neptune is a region called the Kuiper Belt, home to dwarf planets like Pluto and millions of icy objects.\n\nEarth is the only planet in our solar system known to support life. It has just the right temperature, liquid water, and an atmosphere with oxygen. Scientists are searching other planets and moons for signs of microbial life — simple living things too small to see without a microscope.", "vocab": [{"word": "orbit", "definition": "To travel in a curved path around something, like a planet around the Sun."}, {"word": "terrestrial", "definition": "Related to Earth or having a rocky surface like Earth."}, {"word": "asteroid", "definition": "A rocky object that orbits the Sun, smaller than a planet."}, {"word": "dwarf planet", "definition": "A round object orbiting the Sun that is smaller than a regular planet."}, {"word": "atmosphere", "definition": "The layer of gases that surrounds a planet."}, {"word": "microbial", "definition": "Relating to microscopic living things called microbes."}], "questions": [{"question": "What percentage of the solar system's mass does the Sun contain?", "options": ["A. 50%", "B. 75%", "C. 90%", "D. 99.8%"], "answer": 3, "explanation": "The passage states that the Sun contains 99.8% of all the mass in the solar system."}, {"question": "What are terrestrial planets?", "options": ["A. Planets made of gas", "B. Planets with rocky surfaces", "C. Planets with rings", "D. Planets with moons"], "answer": 1, "explanation": "The passage says terrestrial planets have rocky surfaces — they are Mercury, Venus, Earth, and Mars."}, {"question": "Where is the asteroid belt located?", "options": ["A. Between Earth and Mars", "B. Between Mars and Jupiter", "C. Between Jupiter and Saturn", "D. Beyond Neptune"], "answer": 1, "explanation": "The passage says the asteroid belt lies between Mars and Jupiter."}, {"question": "What makes Earth unique in our solar system?", "options": ["A. It is the largest planet", "B. It has the most moons", "C. It is the only planet known to support life", "D. It is closest to the Sun"], "answer": 2, "explanation": "The passage says Earth is the only planet in our solar system known to support life."}, {"question": "What is the Kuiper Belt?", "options": ["A. A ring around Saturn", "B. A region of asteroids near Mars", "C. A region beyond Neptune with dwarf planets and icy objects", "D. The area closest to the Sun"], "answer": 2, "explanation": "The Kuiper Belt is a region beyond Neptune that is home to dwarf planets like Pluto and millions of icy objects."}]}, {"id": 7, "topic": "Space", "emoji": "🌙", "title": "The Moon: Earth's Companion", "body": "The Moon is Earth's only natural satellite, orbiting our planet at an average distance of 239,000 miles. It is about one-quarter the size of Earth. The Moon has no atmosphere, no wind, and no liquid water — making it a very different world from our own.\n\nThe Moon's surface is covered in craters, created by meteorites crashing into it billions of years ago. Because there is no wind or rain to erode them, these craters remain perfectly preserved. The Moon also has vast flat plains called maria (meaning 'seas' in Latin), which ancient astronomers mistakenly thought were actual seas.\n\nThe Moon affects Earth in important ways. Its gravitational pull causes the ocean tides. The Moon also stabilizes Earth's tilt, which keeps our planet's climate relatively stable. Without the Moon, Earth's seasons and climate could be wildly unpredictable.\n\nOn July 20, 1969, astronauts Neil Armstrong and Buzz Aldrin became the first humans to walk on the Moon during NASA's Apollo 11 mission. Armstrong's famous words were: \"That's one small step for man, one giant leap for mankind.\" Twelve astronauts walked on the Moon between 1969 and 1972. No humans have returned since.", "vocab": [{"word": "satellite", "definition": "An object that orbits a planet; the Moon is Earth's natural satellite."}, {"word": "crater", "definition": "A bowl-shaped hole on the surface of a planet or moon caused by a meteorite impact."}, {"word": "meteorite", "definition": "A rock from space that hits the surface of a planet or moon."}, {"word": "erode", "definition": "To wear away slowly over time by wind, water, or other forces."}, {"word": "gravitational pull", "definition": "The force of gravity that attracts objects toward each other."}, {"word": "stabilizes", "definition": "Keeps something steady and prevents it from changing too much."}], "questions": [{"question": "How far is the Moon from Earth on average?", "options": ["A. 23,900 miles", "B. 239,000 miles", "C. 2,390,000 miles", "D. 93,000,000 miles"], "answer": 1, "explanation": "The passage says the Moon orbits Earth at an average distance of 239,000 miles."}, {"question": "Why do craters on the Moon remain perfectly preserved?", "options": ["A. The Moon is very cold", "B. The craters are protected by ice", "C. There is no wind or rain to erode them", "D. New rock fills the craters over time"], "answer": 2, "explanation": "Because the Moon has no wind or rain, nothing erodes the craters, so they stay perfectly preserved."}, {"question": "What are 'maria' on the Moon?", "options": ["A. Deep valleys", "B. Vast flat plains that look like seas", "C. Actual water seas", "D. Mountain ranges"], "answer": 1, "explanation": "Maria are vast flat plains on the Moon; ancient astronomers mistakenly thought they were actual seas."}, {"question": "What important effect does the Moon have on Earth?", "options": ["A. It creates Earth's weather", "B. It reflects sunlight to keep Earth warm", "C. Its gravity causes ocean tides and stabilizes Earth's tilt", "D. It protects Earth from asteroids"], "answer": 2, "explanation": "The Moon's gravitational pull causes ocean tides, and it also stabilizes Earth's tilt to keep the climate steady."}, {"question": "When did the first humans walk on the Moon?", "options": ["A. July 20, 1959", "B. July 20, 1969", "C. July 20, 1979", "D. July 20, 1989"], "answer": 1, "explanation": "Neil Armstrong and Buzz Aldrin walked on the Moon on July 20, 1969, during the Apollo 11 mission."}]}, {"id": 8, "topic": "Space", "emoji": "⭐", "title": "Stars: Balls of Fire in Space", "body": "When you look up at the night sky, you see thousands of twinkling lights — those are stars! Stars are enormous balls of hot gas, mostly hydrogen and helium. They produce energy through a process called nuclear fusion, where hydrogen atoms combine to form helium, releasing tremendous amounts of light and heat.\n\nOur Sun is a star — a medium-sized, middle-aged star about 4.6 billion years old. Compared to other stars, the Sun is quite average. Some stars are so large they are called supergiants, thousands of times bigger than our Sun. Other stars are tiny and dim, called red dwarfs, and are the most common type in our galaxy.\n\nStars have life cycles, just like living things. A star is born inside a cloud of gas and dust called a nebula. After billions of years, when a star runs out of hydrogen fuel, it changes dramatically. A star like our Sun will expand into a red giant, then shrink into a small, dense object called a white dwarf.\n\nLarger stars end their lives in a spectacular explosion called a supernova — one of the most powerful events in the universe. After a supernova, what remains may become a neutron star or even a black hole, an object so dense that not even light can escape its gravity.", "vocab": [{"word": "nuclear fusion", "definition": "The process where atoms combine to release enormous amounts of energy."}, {"word": "supergiant", "definition": "An extremely large and bright star, much bigger than our Sun."}, {"word": "red dwarf", "definition": "A small, dim, cool star; the most common type in the galaxy."}, {"word": "nebula", "definition": "A cloud of gas and dust in space where stars are born."}, {"word": "supernova", "definition": "A massive explosion that occurs when a large star dies."}, {"word": "black hole", "definition": "An object in space so dense that nothing, not even light, can escape its gravity."}], "questions": [{"question": "What are stars made of?", "options": ["A. Rock and ice", "B. Hot gas, mostly hydrogen and helium", "C. Burning wood and oxygen", "D. Liquid fire and metal"], "answer": 1, "explanation": "The passage says stars are enormous balls of hot gas, mostly hydrogen and helium."}, {"question": "What process do stars use to produce energy?", "options": ["A. Burning oxygen", "B. Chemical reactions", "C. Nuclear fusion", "D. Solar radiation"], "answer": 2, "explanation": "Stars produce energy through nuclear fusion, where hydrogen atoms combine to form helium, releasing light and heat."}, {"question": "What is the most common type of star in our galaxy?", "options": ["A. Supergiants", "B. Stars like our Sun", "C. White dwarfs", "D. Red dwarfs"], "answer": 3, "explanation": "The passage states that red dwarfs are the most common type of star in our galaxy."}, {"question": "Where are stars born?", "options": ["A. Inside black holes", "B. In clouds of gas and dust called nebulae", "C. Near the center of galaxies", "D. From supernova explosions only"], "answer": 1, "explanation": "Stars are born inside clouds of gas and dust called nebulae."}, {"question": "What might form after a large star explodes in a supernova?", "options": ["A. A new planet", "B. A red giant", "C. A neutron star or black hole", "D. A new solar system"], "answer": 2, "explanation": "The passage says after a supernova, what remains may become a neutron star or even a black hole."}]}, {"id": 9, "topic": "Ocean", "emoji": "🌊", "title": "The Deep Ocean: Earth's Last Frontier", "body": "The ocean covers more than 70% of Earth's surface, yet we have explored less than 20% of it. The deep ocean — areas below 3,300 feet — is one of the least understood places on our planet. It is pitch-black, ice-cold, and under enormous pressure. Yet incredibly, life thrives there.\n\nDeep-sea creatures have evolved remarkable adaptations to survive in such extreme conditions. Many produce their own light through a process called bioluminescence. The anglerfish dangles a glowing lure above its head to attract prey in the darkness. Vampire squid can turn themselves inside out to escape predators.\n\nThe deepest part of the ocean is the Mariana Trench in the Pacific Ocean. At its deepest point, called Challenger Deep, the ocean is about 36,000 feet deep — deeper than Mount Everest is tall! The pressure there is about 1,000 times greater than at sea level.\n\nDespite the harsh conditions, scientists have discovered entire ecosystems around hydrothermal vents — cracks in the ocean floor that release superheated water. Bacteria near these vents convert chemicals into energy instead of using sunlight. These bacteria support a whole food chain of tube worms, crabs, and other extraordinary creatures.", "vocab": [{"word": "bioluminescence", "definition": "The ability of a living thing to produce its own light."}, {"word": "adaptation", "definition": "A feature that helps a living thing survive in its environment."}, {"word": "hydrothermal vents", "definition": "Cracks in the ocean floor that release very hot water and chemicals."}, {"word": "ecosystem", "definition": "All the living things in an area and how they interact with each other."}, {"word": "pressure", "definition": "The force pushing on an object from all sides; increases with depth in water."}, {"word": "lure", "definition": "Something used to attract animals or people toward a trap."}], "questions": [{"question": "What percentage of the ocean have we explored?", "options": ["A. Less than 5%", "B. Less than 20%", "C. About 50%", "D. About 70%"], "answer": 1, "explanation": "The passage says we have explored less than 20% of the ocean."}, {"question": "What is bioluminescence?", "options": ["A. A deep-sea current", "B. The ability to survive in cold water", "C. The ability of a creature to produce its own light", "D. A type of deep-sea plant"], "answer": 2, "explanation": "Bioluminescence is the process by which deep-sea creatures produce their own light."}, {"question": "How deep is Challenger Deep in the Mariana Trench?", "options": ["A. About 3,600 feet", "B. About 13,000 feet", "C. About 29,000 feet", "D. About 36,000 feet"], "answer": 3, "explanation": "Challenger Deep is about 36,000 feet deep — deeper than Mount Everest is tall."}, {"question": "How do bacteria near hydrothermal vents get energy?", "options": ["A. From sunlight", "B. From eating other bacteria", "C. By converting chemicals into energy", "D. From the heat of the water"], "answer": 2, "explanation": "The passage says bacteria near hydrothermal vents convert chemicals into energy instead of using sunlight."}, {"question": "What conditions exist in the deep ocean?", "options": ["A. Bright light and warm temperatures", "B. Pitch-black, ice-cold, and enormous pressure", "C. Low pressure and moderate temperatures", "D. Warm and calm conditions"], "answer": 1, "explanation": "The deep ocean is described as pitch-black, ice-cold, and under enormous pressure."}]}, {"id": 10, "topic": "Ocean", "emoji": "🦈", "title": "Sharks: Ancient Ocean Hunters", "body": "Sharks have been swimming in Earth's oceans for over 450 million years — long before dinosaurs existed! They have survived five mass extinctions that wiped out most life on Earth. Today, there are more than 500 species of sharks, ranging from the tiny dwarf lanternshark (about 8 inches long) to the massive whale shark (up to 40 feet long).\n\nSharks are perfectly designed for hunting. They have multiple rows of teeth — when one tooth falls out, another moves forward to replace it. A shark may go through thousands of teeth in its lifetime. Their sense of smell is extraordinary; some species can detect a single drop of blood in 25 gallons of water.\n\nContrary to popular belief, most sharks are not dangerous to humans. Of the 500+ species, only about a dozen are considered potentially dangerous. Sharks are actually more scared of us than we are of them. Humans kill approximately 100 million sharks per year, mainly for their fins, while sharks kill fewer than 10 people per year worldwide.\n\nSharks are vital to ocean health. As apex predators, they keep fish populations balanced. When shark populations decline, it causes a chain reaction that disrupts the entire ocean ecosystem. Protecting sharks means protecting the health of our oceans.", "vocab": [{"word": "mass extinction", "definition": "An event where a large number of species die out in a short time."}, {"word": "species", "definition": "A group of similar living things that can reproduce together."}, {"word": "extraordinary", "definition": "Very unusual or impressive; beyond what is ordinary."}, {"word": "contrary", "definition": "Opposite to what is expected or believed."}, {"word": "apex predator", "definition": "An animal at the top of the food chain with no natural predators."}, {"word": "disrupts", "definition": "Causes disorder or prevents something from working normally."}], "questions": [{"question": "How long have sharks been on Earth?", "options": ["A. About 65 million years", "B. About 200 million years", "C. Over 450 million years", "D. About 1 billion years"], "answer": 2, "explanation": "The passage says sharks have been swimming in Earth's oceans for over 450 million years."}, {"question": "What happens when a shark loses a tooth?", "options": ["A. The shark cannot eat for weeks", "B. Another tooth moves forward to replace it", "C. The tooth grows back slowly", "D. The shark loses all its teeth"], "answer": 1, "explanation": "Sharks have multiple rows of teeth, and when one falls out, another moves forward to replace it."}, {"question": "About how many shark species are considered potentially dangerous to humans?", "options": ["A. All 500+ species", "B. About 200 species", "C. About 50 species", "D. About a dozen species"], "answer": 3, "explanation": "The passage says only about a dozen of the 500+ species are considered potentially dangerous to humans."}, {"question": "Why are sharks vital to ocean health?", "options": ["A. They clean the ocean by eating dead animals", "B. They produce oxygen for the ocean", "C. As apex predators, they keep fish populations balanced", "D. They create habitats for other sea creatures"], "answer": 2, "explanation": "Sharks are apex predators that keep fish populations balanced, and without them, the whole ocean ecosystem is disrupted."}, {"question": "Who kills more — sharks killing humans or humans killing sharks?", "options": ["A. Sharks kill far more humans", "B. They kill about equal numbers", "C. Humans kill far more sharks", "D. Neither kills the other"], "answer": 2, "explanation": "Humans kill about 100 million sharks per year, while sharks kill fewer than 10 people per year worldwide."}]}, {"id": 11, "topic": "Dinosaurs", "emoji": "🦕", "title": "Dinosaurs: Rulers of the Ancient World", "body": "Dinosaurs were extraordinary reptiles that dominated Earth for about 165 million years. They first appeared about 230 million years ago during the Triassic Period and ruled the planet until a mass extinction event about 66 million years ago. Humans have only existed for about 300,000 years — we are newcomers compared to dinosaurs!\n\nDinosaurs came in astonishing variety. The mighty T. rex was a fierce predator that could grow 40 feet long and weigh 9 tons. Brachiosaurus was a gentle giant that used its incredibly long neck to reach leaves high in treetops. The tiny Compsognathus was only about the size of a turkey.\n\nFor a long time, scientists thought dinosaurs were slow, cold-blooded creatures like modern reptiles. New research has changed this view dramatically. Many dinosaurs were warm-blooded, active, and fast-moving. Some even had feathers — strong evidence that modern birds are actually living dinosaurs, direct descendants of feathered theropod dinosaurs.\n\nDinosaurs went extinct when a massive asteroid struck Earth near present-day Mexico. The impact caused wildfires, tsunamis, and a dust cloud that blocked sunlight for years, causing plants to die and food chains to collapse. Only small, feathered theropods survived — and they eventually evolved into the birds we see today.", "vocab": [{"word": "dominated", "definition": "Had power and control over a large area or group."}, {"word": "Triassic Period", "definition": "A time in Earth's history from 252 to 201 million years ago when dinosaurs first appeared."}, {"word": "predator", "definition": "An animal that hunts and eats other animals."}, {"word": "warm-blooded", "definition": "Able to maintain a constant body temperature regardless of surroundings."}, {"word": "theropod", "definition": "A group of two-legged dinosaurs that are ancestors of modern birds."}, {"word": "descendants", "definition": "Offspring or later generations of a living thing."}], "questions": [{"question": "How long did dinosaurs rule the Earth?", "options": ["A. About 66 million years", "B. About 165 million years", "C. About 230 million years", "D. About 300,000 years"], "answer": 1, "explanation": "The passage says dinosaurs dominated Earth for about 165 million years."}, {"question": "What new research has scientists discovered about dinosaurs?", "options": ["A. They were cold-blooded like lizards", "B. They were even slower than previously thought", "C. Many were warm-blooded, active, and some had feathers", "D. They all lived in water"], "answer": 2, "explanation": "New research shows many dinosaurs were warm-blooded and active, and some had feathers."}, {"question": "What is the connection between dinosaurs and birds?", "options": ["A. Birds evolved from flying reptiles, not dinosaurs", "B. Modern birds are actually living dinosaurs descended from feathered theropods", "C. Birds look like dinosaurs but are not related", "D. Only a few bird species are related to dinosaurs"], "answer": 1, "explanation": "Modern birds are direct descendants of feathered theropod dinosaurs — they are essentially living dinosaurs."}, {"question": "What caused dinosaurs to go extinct?", "options": ["A. Extreme cold temperatures", "B. Disease spreading worldwide", "C. A massive asteroid strike that blocked sunlight", "D. Volcanic eruptions only"], "answer": 2, "explanation": "A massive asteroid struck Earth, causing wildfires, tsunamis, and a dust cloud that blocked sunlight and collapsed food chains."}, {"question": "Which dinosaur was about the size of a turkey?", "options": ["A. T. rex", "B. Brachiosaurus", "C. Velociraptor", "D. Compsognathus"], "answer": 3, "explanation": "The passage says the tiny Compsognathus was only about the size of a turkey."}]}, {"id": 12, "topic": "Dinosaurs", "emoji": "🦖", "title": "T. Rex: The Tyrant King", "body": "Tyrannosaurus rex — T. rex for short — is one of the most famous and fearsome dinosaurs that ever lived. Its name means 'tyrant lizard king' in Latin. T. rex lived about 66-68 million years ago in what is now western North America, during the late Cretaceous Period.\n\nT. rex was a massive predator. Adults could reach 40 feet in length and weigh up to 9 tons. Its skull alone was up to 5 feet long, and it had 60 banana-shaped teeth, each up to 12 inches long. Its bite was so powerful it could crush bone — the most powerful bite force of any land animal ever discovered.\n\nDespite its terrifying appearance, T. rex had tiny arms — only about 3 feet long. Scientists debate what these small arms were used for. Some think they helped T. rex grip prey or push itself up off the ground. T. rex's legs, however, were enormous and powerful, suggesting it could run at speeds of 12-25 miles per hour.\n\nRecent discoveries have changed how we picture T. rex. Fossils show evidence of feathers, at least on parts of the body. T. rex was likely not the scaly green beast of movies, but may have had patches of feathers, similar to a large, fierce chicken! Scientists continue to learn new things about this incredible dinosaur every year.", "vocab": [{"word": "tyrant", "definition": "A cruel and powerful ruler who controls others by force."}, {"word": "Cretaceous Period", "definition": "A time in Earth's history from 145 to 66 million years ago."}, {"word": "fossil", "definition": "The preserved remains or traces of ancient living things found in rock."}, {"word": "debate", "definition": "To discuss different opinions about a topic."}, {"word": "evidence", "definition": "Facts or signs that help prove whether something is true."}, {"word": "massive", "definition": "Very large and heavy."}], "questions": [{"question": "What does 'Tyrannosaurus rex' mean?", "options": ["A. Giant lizard king", "B. Tyrant lizard king", "C. Terrible lizard king", "D. Swift lizard king"], "answer": 1, "explanation": "The passage explains that Tyrannosaurus rex means 'tyrant lizard king' in Latin."}, {"question": "How long were T. rex's teeth?", "options": ["A. Up to 2 inches", "B. Up to 6 inches", "C. Up to 12 inches", "D. Up to 24 inches"], "answer": 2, "explanation": "T. rex had banana-shaped teeth each up to 12 inches long."}, {"question": "What was special about T. rex's bite?", "options": ["A. It was the fastest bite of any dinosaur", "B. It was the most powerful bite force of any land animal ever discovered", "C. It could bite through metal", "D. It was used to crack open eggs"], "answer": 1, "explanation": "T. rex's bite was the most powerful bite force of any land animal ever discovered — powerful enough to crush bone."}, {"question": "What recent discovery surprised scientists about T. rex?", "options": ["A. T. rex could swim", "B. T. rex hunted in packs", "C. T. rex had evidence of feathers", "D. T. rex was actually cold-blooded"], "answer": 2, "explanation": "Recent fossils show evidence of feathers on T. rex, changing how we picture this dinosaur."}, {"question": "How fast could T. rex run?", "options": ["A. 5-8 miles per hour", "B. 12-25 miles per hour", "C. 30-40 miles per hour", "D. Over 50 miles per hour"], "answer": 1, "explanation": "The passage suggests T. rex could run at speeds of 12-25 miles per hour based on the size of its legs."}]}, {"id": 13, "topic": "Nature", "emoji": "🌿", "title": "The Amazing World of Trees", "body": "Trees are the largest living things on Earth and are essential to all life on our planet. Through photosynthesis, trees absorb carbon dioxide from the air and release oxygen — the oxygen we breathe. A single mature tree can absorb about 48 pounds of carbon dioxide per year and provide enough oxygen for two people.\n\nTrees communicate with each other through underground networks of fungi connected to their roots, sometimes called the 'Wood Wide Web.' Through this network, trees share nutrients and water. A 'mother tree' — the largest and oldest tree in a forest — sends extra nutrients to young seedlings growing in the shade where sunlight is scarce.\n\nSome trees live for an extraordinarily long time. A bristlecone pine tree in California called Methuselah is about 4,850 years old — the oldest known living tree in the world. Some clonal tree colonies, which are groups of trees sharing a single root system, are even older. Pando, a colony of aspen trees in Utah, is estimated to be 80,000 years old!\n\nForests cover about 31% of Earth's land surface and are home to about 80% of Earth's land animals. They regulate climate, prevent soil erosion, and filter water. Protecting forests is one of the most important things humans can do to fight climate change.", "vocab": [{"word": "photosynthesis", "definition": "The process by which plants use sunlight, water, and carbon dioxide to make food and release oxygen."}, {"word": "fungi", "definition": "Organisms like mushrooms and mold that break down dead matter; plural of fungus."}, {"word": "nutrients", "definition": "Substances that living things need to grow and stay healthy."}, {"word": "seedlings", "definition": "Young plants that have just sprouted from seeds."}, {"word": "clonal", "definition": "Made up of genetically identical copies from a single original organism."}, {"word": "erosion", "definition": "The gradual wearing away of soil or rock by wind, water, or other forces."}], "questions": [{"question": "How much carbon dioxide can a single mature tree absorb per year?", "options": ["A. About 4.8 pounds", "B. About 48 pounds", "C. About 480 pounds", "D. About 4,800 pounds"], "answer": 1, "explanation": "The passage says a single mature tree can absorb about 48 pounds of carbon dioxide per year."}, {"question": "What is the 'Wood Wide Web'?", "options": ["A. A type of tree disease", "B. An internet-like system for tracking forests", "C. Underground fungal networks that connect tree roots", "D. A network of forest animals that help trees"], "answer": 2, "explanation": "The 'Wood Wide Web' refers to underground networks of fungi connected to tree roots through which trees share nutrients and water."}, {"question": "What does a 'mother tree' do?", "options": ["A. It reproduces the most seeds", "B. It sends extra nutrients to young seedlings in the shade", "C. It is the tallest tree in the forest", "D. It protects other trees from disease"], "answer": 1, "explanation": "A mother tree is the largest and oldest tree that sends extra nutrients to young seedlings growing in the shade."}, {"question": "How old is Pando, the aspen tree colony in Utah?", "options": ["A. About 4,850 years old", "B. About 10,000 years old", "C. About 50,000 years old", "D. An estimated 80,000 years old"], "answer": 3, "explanation": "Pando is estimated to be 80,000 years old — much older than the individual tree Methuselah."}, {"question": "What percentage of Earth's land animals live in forests?", "options": ["A. About 31%", "B. About 50%", "C. About 80%", "D. About 95%"], "answer": 2, "explanation": "The passage says forests are home to about 80% of Earth's land animals."}]}, {"id": 14, "topic": "Nature", "emoji": "🌋", "title": "Volcanoes: Earth's Fire Mountains", "body": "Volcanoes are openings in Earth's crust through which hot molten rock, called magma, can escape. When magma reaches the surface, it is called lava. Volcanoes can be found on every continent and even on the ocean floor. There are about 1,500 potentially active volcanoes on Earth today.\n\nVolcanoes form where tectonic plates — the large moving pieces of Earth's crust — meet or pull apart. The Ring of Fire is a region around the Pacific Ocean where about 75% of the world's volcanoes are found. Countries like Japan, Indonesia, and Chile sit on this volcanic ring.\n\nNot all volcanic eruptions are the same. Some volcanoes erupt slowly, releasing lava that flows steadily downhill. Others explode violently, shooting ash, rock, and gases miles into the air. The 1980 eruption of Mount St. Helens in Washington State blew away the entire side of the mountain and sent ash across 11 states.\n\nDespite their destructive power, volcanoes also create. Volcanic rock breaks down into extremely fertile soil, which is why people have farmed near volcanoes for thousands of years. The Hawaiian Islands were entirely formed by volcanic activity. Volcanic gases also helped create Earth's early atmosphere billions of years ago.", "vocab": [{"word": "magma", "definition": "Hot melted rock found beneath Earth's surface."}, {"word": "lava", "definition": "Magma that has reached Earth's surface through a volcano."}, {"word": "tectonic plates", "definition": "The large moving sections of Earth's outer crust."}, {"word": "Ring of Fire", "definition": "A region around the Pacific Ocean known for its many volcanoes and earthquakes."}, {"word": "eruption", "definition": "The sudden, often violent release of lava, ash, and gases from a volcano."}, {"word": "fertile", "definition": "Rich in nutrients and able to support plant growth."}], "questions": [{"question": "What is lava?", "options": ["A. Hot gas released by volcanoes", "B. Volcanic ash that falls from the sky", "C. Magma that has reached Earth's surface", "D. The crater at the top of a volcano"], "answer": 2, "explanation": "The passage says when magma reaches the surface, it is called lava."}, {"question": "Where is the Ring of Fire?", "options": ["A. Around the Atlantic Ocean", "B. Around the Pacific Ocean", "C. In the middle of Africa", "D. Along the equator"], "answer": 1, "explanation": "The Ring of Fire is a region around the Pacific Ocean where about 75% of Earth's volcanoes are found."}, {"question": "What happened during the 1980 eruption of Mount St. Helens?", "options": ["A. It created a new island", "B. It melted nearby glaciers only", "C. It blew away an entire side of the mountain and sent ash across 11 states", "D. It caused a tsunami in the Pacific"], "answer": 2, "explanation": "The 1980 eruption blew away the entire side of the mountain and sent ash across 11 states."}, {"question": "Why do people farm near volcanoes despite the danger?", "options": ["A. The heat helps crops grow faster", "B. Volcanic rock breaks down into very fertile soil", "C. There are fewer pests near volcanoes", "D. Volcanic areas always have plenty of water"], "answer": 1, "explanation": "Volcanic rock breaks down into extremely fertile soil, making it great for farming."}, {"question": "How were the Hawaiian Islands formed?", "options": ["A. By tectonic plates colliding", "B. By volcanic activity", "C. By coral reef growth", "D. By glaciers carving the land"], "answer": 1, "explanation": "The passage says the Hawaiian Islands were entirely formed by volcanic activity."}]}, {"id": 15, "topic": "Technology", "emoji": "🤖", "title": "Artificial Intelligence: Teaching Computers to Think", "body": "Artificial intelligence, or AI, is the ability of computers to do tasks that normally require human intelligence — things like recognizing faces, translating languages, playing chess, or making decisions. AI is not magic; it is based on mathematics and large amounts of data.\n\nMost modern AI uses a method called machine learning. Instead of programming every single rule, engineers feed the computer millions of examples. The computer finds patterns in the data on its own. For example, to teach an AI to recognize cats, you show it millions of cat photos until it learns what features make something a cat.\n\nAI is already part of everyday life. When you ask a voice assistant a question, when Netflix suggests shows you might like, when a spam filter removes unwanted emails — these all use AI. Self-driving cars use AI to see road signs, other vehicles, and pedestrians.\n\nAI can do many things faster and more accurately than humans. It can scan thousands of medical images to detect cancer early, or translate books between languages in seconds. However, AI also raises important questions. Can AI be fair and unbiased? Who is responsible when AI makes a mistake? As AI becomes more powerful, these questions become more important for society to answer.", "vocab": [{"word": "artificial intelligence", "definition": "The ability of computers to perform tasks that usually require human thinking."}, {"word": "machine learning", "definition": "A type of AI where computers learn from examples and data rather than step-by-step instructions."}, {"word": "data", "definition": "Facts and information, especially when collected and stored by computers."}, {"word": "pattern", "definition": "A repeated arrangement or set of features that can be identified and predicted."}, {"word": "pedestrian", "definition": "A person who is walking, especially in a city or on a road."}, {"word": "unbiased", "definition": "Fair and not favoring one side or group over another."}], "questions": [{"question": "What is artificial intelligence?", "options": ["A. Robots that look like humans", "B. The ability of computers to do tasks that require human intelligence", "C. A new type of computer chip", "D. Software that connects computers together"], "answer": 1, "explanation": "The passage defines AI as the ability of computers to do tasks that normally require human intelligence."}, {"question": "How does machine learning work?", "options": ["A. A programmer writes every single rule the computer must follow", "B. The computer is taught by a human teacher directly", "C. The computer finds patterns in millions of examples on its own", "D. The computer copies what other computers do"], "answer": 2, "explanation": "In machine learning, engineers feed the computer millions of examples and the computer finds patterns in the data on its own."}, {"question": "Which of the following is an example of AI in everyday life?", "options": ["A. Using a pencil to write", "B. Reading a physical book", "C. Netflix suggesting shows you might like", "D. Riding a bicycle"], "answer": 2, "explanation": "The passage mentions Netflix suggesting shows as one example of AI used in everyday life."}, {"question": "What is one way AI helps in medicine?", "options": ["A. AI performs surgeries automatically", "B. AI prescribes medicine to patients", "C. AI scans medical images to detect cancer early", "D. AI replaces all doctors and nurses"], "answer": 2, "explanation": "The passage says AI can scan thousands of medical images to detect cancer early."}, {"question": "What important question does the passage raise about AI?", "options": ["A. Whether AI will become conscious", "B. Whether AI can be fair and who is responsible when it makes mistakes", "C. Whether AI will replace all human jobs", "D. Whether AI should be used in schools"], "answer": 1, "explanation": "The passage asks whether AI can be fair and unbiased, and who is responsible when AI makes a mistake."}]}, {"id": 16, "topic": "History", "emoji": "🏛️", "title": "Ancient Egypt: Land of the Pharaohs", "body": "Ancient Egypt was one of the world's greatest civilizations, lasting over 3,000 years. It rose along the Nile River in northeastern Africa. Every year, the Nile flooded its banks, depositing rich black soil that allowed farmers to grow abundant crops in the middle of the desert. This reliable flood cycle was the foundation of Egyptian society.\n\nAt the head of Egyptian society was the pharaoh — a king believed to be a living god. Pharaohs ruled with absolute power and were responsible for maintaining order, called Ma'at. When a pharaoh died, Egyptians believed they traveled to the afterlife. To protect their bodies for this journey, they used a complex process called mummification, which preserved the body by removing organs and drying it with special salts.\n\nThe ancient Egyptians were remarkable engineers. The Great Pyramid of Giza, built for Pharaoh Khufu around 2560 BCE, is made of 2.3 million stone blocks, some weighing up to 80 tons. How workers moved these stones without modern machinery remains one of history's great mysteries.\n\nEgyptians developed one of the earliest writing systems, called hieroglyphics. They wrote on papyrus — a paper-like material made from reeds. Egyptian contributions to mathematics, medicine, and architecture influenced many later civilizations, including the Greeks and Romans.", "vocab": [{"word": "civilization", "definition": "A complex human society with cities, laws, art, and writing."}, {"word": "pharaoh", "definition": "The ruler of ancient Egypt, believed to be a living god."}, {"word": "mummification", "definition": "The ancient Egyptian process of preserving a dead body."}, {"word": "afterlife", "definition": "Life believed to continue after death."}, {"word": "hieroglyphics", "definition": "The ancient Egyptian writing system using picture symbols."}, {"word": "papyrus", "definition": "A paper-like writing material made from reeds by ancient Egyptians."}], "questions": [{"question": "Why was the annual flooding of the Nile important to ancient Egypt?", "options": ["A. It provided fish for Egyptians to eat", "B. It deposited rich soil for farming in the desert", "C. It prevented enemies from crossing the river", "D. It filled the canals that watered gardens"], "answer": 1, "explanation": "The Nile's annual floods deposited rich black soil, allowing farmers to grow crops in the desert — the foundation of Egyptian society."}, {"question": "What did ancient Egyptians believe happened to pharaohs after death?", "options": ["A. They were reborn as animals", "B. They became stars in the sky", "C. They traveled to the afterlife", "D. They became part of the Nile River"], "answer": 2, "explanation": "Egyptians believed pharaohs traveled to the afterlife after death, which is why they mummified their bodies."}, {"question": "How many stone blocks is the Great Pyramid of Giza made of?", "options": ["A. About 230,000", "B. About 2.3 million", "C. About 23 million", "D. About 230 million"], "answer": 1, "explanation": "The Great Pyramid is made of 2.3 million stone blocks, some weighing up to 80 tons."}, {"question": "What are hieroglyphics?", "options": ["A. Ancient Egyptian coins", "B. Decorations on pyramid walls only", "C. The ancient Egyptian writing system using picture symbols", "D. A type of ancient Egyptian math"], "answer": 2, "explanation": "Hieroglyphics are the ancient Egyptian writing system that used picture symbols."}, {"question": "What was papyrus used for?", "options": ["A. Building pyramids", "B. Making clothing", "C. Writing on, like paper", "D. Wrapping mummies"], "answer": 2, "explanation": "Papyrus was a paper-like material made from reeds that Egyptians wrote on."}]}, {"id": 17, "topic": "Food & Health", "emoji": "🍎", "title": "Why We Need to Eat Vegetables", "body": "Vegetables might not always be a child's favorite food, but they are incredibly important for a healthy body. Vegetables are packed with vitamins, minerals, and fiber — nutrients that help your body grow, fight disease, and function properly. Eating a variety of colorful vegetables every day is one of the best things you can do for your health.\n\nDifferent colored vegetables provide different nutrients. Orange and yellow vegetables like carrots and sweet potatoes are rich in beta-carotene, which your body converts to vitamin A — important for good eyesight. Dark green vegetables like spinach and broccoli are packed with iron, calcium, and vitamins C and K. Red vegetables like tomatoes contain lycopene, which helps protect the he
