art.\n\nFiber is another crucial ingredient found in vegetables. Fiber helps food move through your digestive system, keeping you feeling full longer and preventing constipation. Fiber also feeds the helpful bacteria in your gut, which are important for your immune system.\n\nStudies show that people who eat more vegetables have lower rates of heart disease, diabetes, and certain cancers. Nutrition experts recommend that half of every meal should be fruits and vegetables. Trying new vegetables with different cooking methods — like roasting, which brings out natural sweetness — can make vegetables much more enjoyable.", "vocab": [{"word": "vitamins", "definition": "Nutrients found in food that the body needs in small amounts to work properly."}, {"word": "minerals", "definition": "Natural substances found in food that help the body function, like iron and calcium."}, {"word": "beta-carotene", "definition": "A natural pigment in orange vegetables that the body turns into vitamin A."}, {"word": "fiber", "definition": "A nutrient in plant foods that aids digestion and keeps you feeling full."}, {"word": "digestive system", "definition": "The organs that break down food so the body can use it for energy."}, {"word": "immune system", "definition": "The body's defense system that fights off illness and infection."}], "questions": [{"question": "What do orange and yellow vegetables like carrots provide?", "options": ["A. Vitamin C and calcium", "B. Iron and fiber", "C. Beta-carotene which becomes vitamin A", "D. Lycopene for heart health"], "answer": 2, "explanation": "Orange and yellow vegetables are rich in beta-carotene, which the body converts to vitamin A, important for eyesight."}, {"question": "What does fiber do for the body?", "options": ["A. It builds strong bones", "B. It improves eyesight", "C. It helps food move through the digestive system and keeps you full", "D. It makes your skin glow"], "answer": 2, "explanation": "Fiber helps food move through the digestive system, keeps you feeling full longer, and feeds helpful gut bacteria."}, {"question": "What nutrient in red vegetables like tomatoes helps protect the heart?", "options": ["A. Beta-carotene", "B. Vitamin K", "C. Iron", "D. Lycopene"], "answer": 3, "explanation": "Red vegetables contain lycopene, which the passage says helps protect the heart."}, {"question": "What do nutrition experts recommend about meals?", "options": ["A. Only eat vegetables and no other foods", "B. Half of every meal should be fruits and vegetables", "C. Eat vegetables only at dinner", "D. Eat at least one serving of vegetables per week"], "answer": 1, "explanation": "Nutrition experts recommend that half of every meal should be fruits and vegetables."}, {"question": "Why does roasting vegetables make them more enjoyable?", "options": ["A. It makes them crunchier", "B. It removes bitter flavors", "C. It brings out their natural sweetness", "D. It adds extra vitamins"], "answer": 2, "explanation": "The passage says roasting brings out the natural sweetness in vegetables, making them more enjoyable."}]}, {"id": 18, "topic": "Sports", "emoji": "⚽", "title": "Soccer: The World's Most Popular Sport", "body": "Soccer — called football in most countries outside the United States — is the most popular sport on Earth. More than 4 billion people watch or play soccer worldwide. It is played in over 200 countries by more than 270 million players of all ages and backgrounds. The FIFA World Cup, held every four years, is the most-watched sporting event in the world.\n\nSoccer is a simple game with simple equipment — you only need a ball and a goal to play. Two teams of 11 players each try to kick, head, or chest the ball into the opponent's net. Only the goalkeeper is allowed to use their hands. A match lasts 90 minutes, divided into two 45-minute halves.\n\nThe sport traces its modern rules back to England in 1863, when the Football Association was established and wrote the first official rulebook. However, ball games similar to soccer were played thousands of years ago in China, Greece, and Mesoamerica.\n\nSoccer teaches teamwork, discipline, and resilience. Studies show that children who play team sports have better social skills and academic performance. Soccer is also excellent exercise — top players run an average of 7 miles per game! Its global reach makes soccer a unique language that connects people across cultures and countries.", "vocab": [{"word": "opponent", "definition": "A person or team that you compete against in a game or sport."}, {"word": "goalkeeper", "definition": "The player who guards the goal and is the only player allowed to use hands."}, {"word": "Football Association", "definition": "The organization established in England in 1863 that wrote the first official soccer rules."}, {"word": "Mesoamerica", "definition": "A historical region in Central America where ancient civilizations thrived."}, {"word": "resilience", "definition": "The ability to recover quickly from difficulties and keep going."}, {"word": "discipline", "definition": "Self-control and the ability to follow rules and train consistently."}], "questions": [{"question": "How many people watch or play soccer worldwide?", "options": ["A. More than 400 million", "B. More than 1 billion", "C. More than 4 billion", "D. More than 7 billion"], "answer": 2, "explanation": "The passage says more than 4 billion people watch or play soccer worldwide."}, {"question": "How long does a soccer match last?", "options": ["A. 60 minutes", "B. 80 minutes", "C. 90 minutes", "D. 120 minutes"], "answer": 2, "explanation": "A soccer match lasts 90 minutes, divided into two 45-minute halves."}, {"question": "When were modern soccer rules first written?", "options": ["A. In ancient China", "B. In 1763 in France", "C. In 1863 in England", "D. In 1900 in Brazil"], "answer": 2, "explanation": "The Football Association established the first official rulebook in England in 1863."}, {"question": "Who is the only player allowed to use hands in soccer?", "options": ["A. The team captain", "B. The goalkeeper", "C. Any player within their own half", "D. Any player during a throw-in"], "answer": 1, "explanation": "In soccer, only the goalkeeper is allowed to use their hands."}, {"question": "About how many miles do top soccer players run in a single game?", "options": ["A. About 2 miles", "B. About 4 miles", "C. About 7 miles", "D. About 12 miles"], "answer": 2, "explanation": "The passage says top soccer players run an average of 7 miles per game."}]}, {"id": 19, "topic": "World Cultures", "emoji": "🌍", "title": "Japan: A Land of Contrasts", "body": "Japan is a country of fascinating contrasts — ancient traditions exist side by side with cutting-edge technology. This island nation in East Asia has a population of about 125 million people and consists of four main islands and thousands of smaller ones. Tokyo, Japan's capital, is one of the largest cities in the world.\n\nJapanese culture places great value on respect, harmony, and attention to detail. These values show up in everything from the formal tea ceremony — a ritualized way of preparing and serving tea — to the art of origami, the folding of paper into beautiful shapes. Even everyday manners reflect this cultural emphasis: it is polite to bow when greeting someone, and speaking quietly in public is considered respectful.\n\nJapan has given the world many gifts. Sushi, karate, anime, and manga are all Japanese in origin. Japan is also home to some of the world's greatest technological innovations, including bullet trains that travel at 200 miles per hour and some of the most advanced robots in the world.\n\nNature plays a huge role in Japanese culture. Cherry blossom season, called Hanami, is celebrated every spring when pink blossoms cover the trees. Families and friends gather to eat, talk, and appreciate the brief beauty of the flowers, which are seen as a symbol of the fleeting nature of life.", "vocab": [{"word": "contrasts", "definition": "Clear differences between two things when compared."}, {"word": "ritualized", "definition": "Done in a formal, carefully planned way with specific steps."}, {"word": "origami", "definition": "The Japanese art of folding paper into decorative shapes and figures."}, {"word": "innovation", "definition": "A new idea, method, or invention that improves something."}, {"word": "Hanami", "definition": "The Japanese tradition of enjoying cherry blossoms in spring."}, {"word": "fleeting", "definition": "Lasting for only a short time; passing quickly."}], "questions": [{"question": "What makes Japan a 'land of contrasts'?", "options": ["A. It has both mountains and beaches", "B. Ancient traditions exist alongside cutting-edge technology", "C. It has both very hot and very cold weather", "D. Some people are rich and some are poor"], "answer": 1, "explanation": "The passage says Japan is a land of contrasts because ancient traditions exist side by side with cutting-edge technology."}, {"question": "What does bowing in Japan show?", "options": ["A. That you are ready to fight", "B. That you are sad", "C. Respect when greeting someone", "D. That you are asking for help"], "answer": 2, "explanation": "The passage says it is polite to bow when greeting someone in Japan — it shows respect."}, {"question": "What is origami?", "options": ["A. Japanese cooking", "B. A Japanese martial art", "C. The Japanese art of paper folding", "D. A type of Japanese music"], "answer": 2, "explanation": "Origami is the Japanese art of folding paper into beautiful shapes."}, {"question": "How fast do Japanese bullet trains travel?", "options": ["A. About 100 miles per hour", "B. About 150 miles per hour", "C. About 200 miles per hour", "D. About 300 miles per hour"], "answer": 2, "explanation": "The passage says Japanese bullet trains travel at 200 miles per hour."}, {"question": "What do cherry blossoms symbolize in Japanese culture?", "options": ["A. Good luck and long life", "B. The fleeting nature of life", "C. The arrival of summer", "D. Friendship between families"], "answer": 1, "explanation": "Cherry blossoms are seen as a symbol of the fleeting (brief) nature of life."}]}, {"id": 20, "topic": "Art & Music", "emoji": "🎨", "title": "How Music Affects the Brain", "body": "Music is one of the most powerful forces in human experience. When you hear your favorite song, your brain releases a chemical called dopamine — the same chemical released when you eat something delicious or achieve a goal. This is why music can make us feel so happy, energized, or emotional.\n\nResearchers have found that learning to play a musical instrument changes the structure of the brain. Musicians have larger and better-connected areas of the brain responsible for hearing, movement, and memory. Studies show that children who study music for several years do better in reading, mathematics, and other academic subjects.\n\nMusic also affects our emotions deeply. Slow, quiet music tends to calm us down and lower heart rate and blood pressure. Fast, energetic music can increase heart rate, boost energy, and improve athletic performance. Many athletes listen to music before competing to get into the right mental state.\n\nMusic is a universal human experience — every culture on Earth has developed some form of music. Scientists believe humans may have been making music for at least 40,000 years; ancient flutes made of bone have been discovered in Europe. Music helps people express feelings that words alone cannot capture, and it brings communities together across generations and cultures.", "vocab": [{"word": "dopamine", "definition": "A brain chemical that creates feelings of pleasure and reward."}, {"word": "structure", "definition": "The way something is built or organized."}, {"word": "academic", "definition": "Related to school subjects and learning."}, {"word": "blood pressure", "definition": "The force of blood pushing against the walls of blood vessels."}, {"word": "universal", "definition": "Shared by or relating to everyone, everywhere."}, {"word": "generations", "definition": "Groups of people born and living around the same time; also all the people born at a similar time."}], "questions": [{"question": "What brain chemical is released when you hear your favorite song?", "options": ["A. Adrenaline", "B. Serotonin", "C. Dopamine", "D. Cortisol"], "answer": 2, "explanation": "The passage says listening to music releases dopamine — the same chemical released when you eat something delicious or achieve a goal."}, {"question": "What effect does learning a musical instrument have on the brain?", "options": ["A. It only improves music-related brain areas", "B. It has no proven effect on the brain", "C. It enlarges and better-connects areas for hearing, movement, and memory", "D. It makes the brain smaller but more efficient"], "answer": 2, "explanation": "Musicians have larger and better-connected brain areas for hearing, movement, and memory — learning an instrument changes brain structure."}, {"question": "How does fast, energetic music affect the body?", "options": ["A. It lowers heart rate and calms you", "B. It increases heart rate and boosts energy", "C. It helps you fall asleep", "D. It has no physical effect"], "answer": 1, "explanation": "Fast, energetic music can increase heart rate, boost energy, and improve athletic performance."}, {"question": "How long have humans possibly been making music?", "options": ["A. About 5,000 years", "B. About 10,000 years", "C. About 40,000 years", "D. About 100,000 years"], "answer": 2, "explanation": "Scientists believe humans may have been making music for at least 40,000 years — ancient bone flutes have been discovered in Europe."}, {"question": "Which statement about music is true according to the passage?", "options": ["A. Only certain cultures have developed music", "B. Music only affects emotions, not the body", "C. Music is a universal human experience found in every culture", "D. Only professional musicians benefit from music"], "answer": 2, "explanation": "The passage says music is a universal human experience — every culture on Earth has developed some form of music."}]}, {"id": 21, "topic": "Animals", "emoji": "🐺", "title": "Wolves: The Pack Hunters", "body": "Wolves are one of the most social and intelligent wild animals on Earth. They live in family groups called packs, which usually have 6 to 10 members. Each pack is led by an alpha pair — the dominant male and female who are usually the parents of the other wolves. Every wolf in the pack has a specific role and knows its place in the social order.\n\nWolves are remarkable hunters. They work together to chase and tire out large prey like elk, deer, and bison. A wolf can travel up to 30 miles in a single day while hunting. Their stamina — the ability to keep going for long periods — is more important than their speed. Wolves can run at 35 miles per hour but usually pursue prey at a steady trot.\n\nWolves communicate through howling, growling, whimpering, and body language. Howling allows wolves to communicate over long distances, announce their location to the pack, and warn rival packs to stay away. A wolf's howl can be heard up to 10 miles away.\n\nWolves play a vital role in their ecosystems. When wolves were reintroduced to Yellowstone National Park in 1995 after being absent for 70 years, they changed the entire ecosystem. By hunting deer and elk, they prevented overgrazing, which allowed plants and trees to grow back, which in turn brought back birds, beavers, and even changed the course of rivers. Scientists call this a trophic cascade.", "vocab": [{"word": "pack", "definition": "A group of wolves that live and hunt together."}, {"word": "alpha", "definition": "The dominant leader of a wolf pack."}, {"word": "stamina", "definition": "The ability to keep doing something physically demanding for a long time."}, {"word": "rival", "definition": "A competing group or individual."}, {"word": "reintroduced", "definition": "Brought back to an area where a species previously lived."}, {"word": "trophic cascade", "definition": "A chain of effects in an ecosystem caused by adding or removing a predator."}], "questions": [{"question": "What is an alpha pair in a wolf pack?", "options": ["A. The two fastest wolves", "B. The two oldest wolves", "C. The dominant male and female leaders", "D. The two largest wolves"], "answer": 2, "explanation": "The alpha pair is the dominant male and female that lead the pack — they are usually the parents of the other wolves."}, {"question": "How far can a wolf travel in a single day while hunting?", "options": ["A. Up to 10 miles", "B. Up to 30 miles", "C. Up to 50 miles", "D. Up to 100 miles"], "answer": 1, "explanation": "A wolf can travel up to 30 miles in a single day while hunting."}, {"question": "Why is a wolf's stamina more important than its speed?", "options": ["A. Wolves can't run very fast", "B. Prey animals are faster than wolves", "C. Wolves chase and tire out prey over long distances rather than sprinting", "D. Speed uses too much energy"], "answer": 2, "explanation": "Wolves pursue prey at a steady trot over long distances to tire them out — stamina matters more than top speed."}, {"question": "What happened when wolves were reintroduced to Yellowstone in 1995?", "options": ["A. They ate too many animals and caused damage", "B. They had no effect on the ecosystem", "C. They changed the entire ecosystem through a trophic cascade", "D. They quickly died out again"], "answer": 2, "explanation": "The wolves changed the entire ecosystem — by controlling deer and elk, they allowed plants to grow back, which brought back birds, beavers, and even changed rivers."}, {"question": "How far can a wolf's howl be heard?", "options": ["A. Up to 1 mile", "B. Up to 5 miles", "C. Up to 10 miles", "D. Up to 20 miles"], "answer": 2, "explanation": "A wolf's howl can be heard up to 10 miles away."}]}, {"id": 22, "topic": "Animals", "emoji": "🐸", "title": "Frogs: Masters of Adaptation", "body": "The Frogs: Masters of Adaptation is one of the most fascinating creatures in the animal kingdom. Found in diverse habitats around the world, these remarkable animals have developed extraordinary adaptations that allow them to thrive in their environments.\n\nScientists who study these animals have discovered amazing behaviors. They use sophisticated communication methods, work in cooperative groups, and show problem-solving abilities that continue to surprise researchers. Their social structures are complex and carefully organized.\n\nLike many animals today, Frogs: Masters of Adaptation face challenges from habitat loss and climate change. Conservation efforts around the world are working to protect these species and their natural habitats for future generations.\n\nLearning about these incredible creatures reminds us of the incredible diversity of life on Earth. Every species plays an important role in its ecosystem, and protecting them means protecting the natural world we all share.", "vocab": [{"word": "adaptation", "definition": "A feature that helps a living thing survive in its environment."}, {"word": "habitat", "definition": "The natural place where an animal lives."}, {"word": "predator", "definition": "An animal that hunts and eats other animals."}, {"word": "prey", "definition": "An animal that is hunted by another animal for food."}, {"word": "species", "definition": "A group of animals that are similar and can reproduce together."}, {"word": "conservation", "definition": "Protecting animals and their environments from harm."}], "questions": [{"question": "What is the main subject of this passage?", "options": ["A. Frogs: Masters of Adaptation", "B. A fictional story about animals", "C. How to perform a science experiment", "D. A biography of a famous person"], "answer": 0, "explanation": "The passage is clearly about Frogs: Masters of Adaptation, providing f // ── AVATARS & COLORS ──
const AVATARS = ["🦁","🐼","🐸","🦊","🐧","🦋","🐬","🦄","🐙","🦕","🚀","⭐"];
const COLORS  = ["#3b82f6","#22c55e","#f97316","#8b5cf6","#ec4899","#ef4444","#0891b2","#b45309","#6366f1","#16a34a","#d97706","#7c3aed"];

// ── STATE ──
let users = JSON.parse(localStorage.getItem("rs_users") || "[]");
let currentUserId = null;
let selectedAvatar = AVATARS[0];
let currentArticle = null;
let currentQIndex = 0;
let userAnswers = [];
let timerInterval = null;
let timerSeconds = 0;
let readingTime = 0;
let speechSynth = window.speechSynthesis;
let isSpeaking = false;
let activeFilter = "All";
let searchTerm = "";

// ── USER UTILS ──
function saveUsers() { localStorage.setItem("rs_users", JSON.stringify(users)); }

function currentUser() { return users.find(u => u.id === currentUserId) || null; }

function userHistory() {
  const u = currentUser();
  return u ? (u.history || []) : [];
}

function addToHistory(entry) {
  const u = currentUser();
  if (!u) return;
  if (!u.history) u.history = [];
  u.history = u.history.filter(h => h.articleId !== entry.articleId);
  u.history.unshift(entry);
  if (u.history.length > 200) u.history.pop();
  saveUsers();
}

function getScoreMap() {
  const map = {};
  userHistory().forEach(h => { map[h.articleId] = h; });
  return map;
}

// ── PROFILE SCREEN ──
function renderProfileScreen() {
  // Build avatar picker
  const picker = document.getElementById("avatar-picker");
  picker.innerHTML = AVATARS.map((a,i) =>
    `<button class="av-btn${i===0?' selected':''}" onclick="pickAvatar('${a}',this)">${a}</button>`
  ).join("");

  // Build user list
  renderUserList();
}

function renderUserList() {
  const list = document.getElementById("user-list");
  if (!users.length) {
    list.innerHTML = '<p style="color:var(--muted);font-size:14px;text-align:center;">No readers yet — add one below!</p>';
    return;
  }
  list.innerHTML = users.map(u => {
    const done = (u.history||[]).length;
    const avg = done ? Math.round((u.history||[]).reduce((s,h) => s + h.score/h.total, 0) / done * 100) : 0;
    return `<div class="user-card" onclick="loginUser('${u.id}')">
      <div class="user-avatar" style="background:${u.color}">${u.avatar}</div>
      <div class="user-info">
        <div class="u-name">${u.name}</div>
        <div class="u-stats">${done} articles done · avg ${avg}%</div>
      </div>
      <button class="user-delete" onclick="event.stopPropagation();deleteUser('${u.id}')" title="Delete">🗑</button>
    </div>`;
  }).join("");
}

function pickAvatar(av, btn) {
  selectedAvatar = av;
  document.querySelectorAll(".av-btn").forEach(b => b.classList.remove("selected"));
  btn.classList.add("selected");
}

function createUser() {
  const name = document.getElementById("new-name").value.trim();
  if (!name) { alert("Please enter a name!"); return; }
  const id = "u_" + Date.now();
  const colorIdx = users.length % COLORS.length;
  const user = { id, name, avatar: selectedAvatar, color: COLORS[colorIdx], history: [] };
  users.push(user);
  saveUsers();
  document.getElementById("new-name").value = "";
  loginUser(id);
}

function deleteUser(id) {
  if (!confirm("Delete this reader and all their scores?")) return;
  users = users.filter(u => u.id !== id);
  saveUsers();
  renderUserList();
}

function loginUser(id) {
  currentUserId = id;
  const u = currentUser();
  document.getElementById("profile-screen").style.display = "none";
  document.getElementById("app").style.display = "block";
  updateUserHeader();
  initApp();
}

function switchUser() {
  stopTimer();
  if (isSpeaking) { speechSynth.cancel(); isSpeaking = false; }
  document.getElementById("app").style.display = "none";
  document.getElementById("profile-screen").style.display = "flex";
  renderUserList();
}

function updateUserHeader() {
  const u = currentUser();
  if (!u) return;
  document.getElementById("cu-dot").style.background = u.color;
  document.getElementById("cu-dot").textContent = u.avatar;
  document.getElementById("cu-name").textContent = u.name;
}

// ── APP INIT ──
function initApp() {
  showSection("start");
  updateWelcomeBar();
  if (!document.getElementById("filter-row").children.length) buildFilters();
  filterArticles();
}

function updateWelcomeBar() {
  const u = currentUser();
  if (!u) return;
  const done = (u.history||[]).length;
  const total = ALL_ARTICLES.length;
  const avg = done ? Math.round((u.history||[]).reduce((s,h) => s+h.score/h.total,0)/done*100) : 0;
  const remaining = total - done;
  const greetings = ["Keep it up","Great job","You're doing amazing","Nice work"];
  const g = done ? greetings[Math.floor(Math.random()*greetings.length)] : "Welcome";
  document.getElementById("welcome-msg").textContent = `${u.avatar} ${g}, ${u.name}!`;
  document.getElementById("welcome-sub").textContent = done ? `${done}/${total} articles completed · ${remaining} left to explore` : `${total} articles ready for you to explore!`;
  document.getElementById("wb-stats").innerHTML = done ? `
    <div class="wb-stat"><div class="ws-num">${done}</div><div class="ws-label">Done</div></div>
    <div class="wb-stat"><div class="ws-num">${remaining}</div><div class="ws-label">To Go</div></div>
    <div class="wb-stat"><div class="ws-num">${avg}%</div><div class="ws-label">Avg Score</div></div>
  ` : `<div class="wb-stat"><div class="ws-num">${total}</div><div class="ws-label">Stories</div></div>`;
}

function buildFilters() {
  const topics = ["All", ...new Set(ALL_ARTICLES.map(a => a.topic))];
  const filterRow = document.getElementById("filter-row");
  filterRow.innerHTML = "";
  topics.forEach(t => {
    const btn = document.createElement("button");
    btn.className = "filter-btn" + (t==="All" ? " active" : "");
    btn.textContent = t==="All" ? "🌟 All" : t;
    btn.onclick = () => {
      activeFilter = t;
      document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      filterArticles();
    };
    filterRow.appendChild(btn);
  });
}

function filterArticles() {
  searchTerm = document.getElementById("search-bar").value.toLowerCase();
  const filtered = ALL_ARTICLES.filter(a => {
    const matchTopic = activeFilter==="All" || a.topic===activeFilter;
    const matchSearch = !searchTerm || a.title.toLowerCase().includes(searchTerm) || a.topic.toLowerCase().includes(searchTerm);
    return matchTopic && matchSearch;
  });
  document.getElementById("articles-count").textContent = filtered.length + " articles";
  renderGrid(filtered);
}

function renderGrid(articles) {
  const grid = document.getElementById("articles-grid");
  const scores = getScoreMap();
  grid.innerHTML = articles.map(a => {
    const s = scores[a.id];
    const scoreHTML = s
      ? `<span class="mini-score ${scoreLevel(s.score,s.total)}">${s.score}/${s.total}</span>`
      : `<span style="font-size:11px;color:var(--muted);font-weight:600;">Not done</span>`;
    const done = s ? " completed" : "";
    return `<div class="article-card-mini${done}" onclick="openArticle(${a.id})">
      <div class="mini-header"><div class="mini-emoji">${a.emoji}</div>
      <div><div class="mini-title">${a.title}</div><div class="mini-topic">${a.topic}</div></div></div>
      <div class="mini-footer"><span class="mini-badge">${a.questions.length} Qs</span>${scoreHTML}</div>
    </div>`;
  }).join("");
}

function scoreLevel(s,t){const p=s/t;return p>=.8?"great":p>=.6?"ok":"low";}

// ── ARTICLE ──
function openArticle(id) {
  currentArticle = ALL_ARTICLES.find(a => a.id===id);
  if (!currentArticle) return;
  renderArticle(currentArticle);
  showSection("reading");
  startTimer();
}

function renderArticle(data) {
  document.getElementById("article-title").textContent = data.title;
  document.getElementById("badge-topic").textContent = data.emoji+" "+data.topic;
  const bodyEl = document.getElementById("article-body");
  const vocabMap = {};
  (data.vocab||[]).forEach(v => { vocabMap[v.word.toLowerCase()] = v.definition; });
  const paras = data.body.split(/\n\n+/);
  let html = "";
  paras.forEach(para => {
    if (!para.trim()) return;
    const tokens = para.split(/(\s+)/);
    let ph = "";
    tokens.forEach(token => {
      const clean = token.replace(/[^a-zA-Z\'\-]/g,"").toLowerCase();
      if (vocabMap[clean]) {
        ph += `<span class="vocab-word" data-word="${token.replace(/[^a-zA-Z\'\-]/g,"")}" data-def="${vocabMap[clean]}">${token}</span>`;
      } else { ph += token; }
    });
    html += `<p>${ph}</p>`;
  });
  bodyEl.innerHTML = html;
  document.getElementById("badge-words").textContent = "~"+data.body.split(/\s+/).length+" words";
  bodyEl.querySelectorAll(".vocab-word").forEach(el => {
    el.addEventListener("mouseover", showTip);
    el.addEventListener("mousemove", moveTip);
    el.addEventListener("mouseleave", hideTip);
    el.addEventListener("click", showTip);
  });
}

const tooltip = document.getElementById("tooltip");
function showTip(e){const el=e.currentTarget;document.getElementById("tooltip-word").textContent=el.dataset.word;document.getElementById("tooltip-def").textContent=el.dataset.def;tooltip.classList.add("visible");posTip(e);}
function moveTip(e){posTip(e);}
function hideTip(){tooltip.classList.remove("visible");}
function posTip(e){let x=e.clientX+12,y=e.clientY-10;if(x+260>window.innerWidth)x=e.clientX-260;if(y+80>window.innerHeight)y=e.clientY-80;tooltip.style.left=x+"px";tooltip.style.top=y+"px";}

function startTimer(){timerSeconds=0;clearInterval(timerInterval);timerInterval=setInterval(()=>{timerSeconds++;const m=Math.floor(timerSeconds/60),s=timerSeconds%60;document.getElementById("timer-display").textContent=m+":"+String(s).padStart(2,"0");},1000);}
function stopTimer(){clearInterval(timerInterval);readingTime=timerSeconds;}

function toggleTTS(){
  if(isSpeaking){speechSynth.cancel();isSpeaking=false;document.getElementById("tts-btn").textContent="🔊 Read Aloud";document.getElementById("tts-btn").classList.remove("speaking");}
  else{const text=currentArticle.title+". "+currentArticle.body.replace(/\n/g," ");const utt=new SpeechSynthesisUtterance(text);utt.rate=.88;utt.pitch=1.05;utt.lang="en-US";utt.onend=()=>{isSpeaking=false;document.getElementById("tts-btn").textContent="🔊 Read Aloud";document.getElementById("tts-btn").classList.remove("speaking");};speechSynth.speak(utt);isSpeaking=true;document.getElementById("tts-btn").textContent="⏹ Stop";document.getElementById("tts-btn").classList.add("speaking");}
}

// ── QUIZ ──
function startQuiz(){
  stopTimer();if(isSpeaking){speechSynth.cancel();isSpeaking=false;}
  currentQIndex=0;userAnswers=new Array(currentArticle.questions.length).fill(null);
  showSection("quiz");renderQuestion(0);
}

function renderQuestion(idx){
  const q=currentArticle.questions[idx];const total=currentArticle.questions.length;
  document.getElementById("q-counter").textContent="Question "+(idx+1)+" of "+total;
  document.getElementById("progress-bar").style.width=(idx/total*100)+"%";
  const labels=["A","B","C","D"];
  let html=`<div class="question-card"><div class="q-number">Question ${idx+1}</div><div class="q-text">${q.question}</div><div class="options" id="opts-${idx}">`;
  q.options.forEach((opt,i)=>{const optText=opt.replace(/^[A-D]\.\s*/,"");html+=`<button class="option-btn" id="opt-${idx}-${i}" onclick="selectAnswer(${idx},${i})"><span class="option-label">${labels[i]}</span>${optText}</button>`;});
  html+=`</div><div class="explanation" id="exp-${idx}"></div></div>`;
  document.getElementById("questions-container").innerHTML=html;
  document.getElementById("btn-next").style.display="none";
  document.getElementById("btn-submit").style.display="none";
  if(userAnswers[idx]!==null)revealAnswer(idx,userAnswers[idx]);
}

function selectAnswer(qi,oi){if(userAnswers[qi]!==null)return;userAnswers[qi]=oi;revealAnswer(qi,oi);}

function revealAnswer(qi,oi){
  const q=currentArticle.questions[qi];const opts=document.querySelectorAll("#opts-"+qi+" .option-btn");
  opts.forEach((btn,i)=>{btn.disabled=true;if(i===q.answer)btn.classList.add("correct");else if(i===oi&&oi!==q.answer)btn.classList.add("wrong");});
  const expEl=document.getElementById("exp-"+qi);const ok=oi===q.answer;
  expEl.textContent=(ok?"✅ Correct! ":"❌ Not quite. ")+q.explanation;
  expEl.className="explanation show"+(ok?"":" wrong-exp");
  const isLast=qi===currentArticle.questions.length-1;
  document.getElementById(isLast?"btn-submit":"btn-next").style.display="inline-flex";
  document.getElementById(isLast?"btn-next":"btn-submit").style.display="none";
}

function nextQuestion(){if(currentQIndex<currentArticle.questions.length-1){currentQIndex++;renderQuestion(currentQIndex);document.getElementById("questions-container").scrollIntoView({behavior:"smooth",block:"start"});}}

function submitQuiz(){
  const score=userAnswers.filter((a,i)=>a===currentArticle.questions[i].answer).length;
  const total=currentArticle.questions.length;
  const pct=Math.round(score/total*100);
  addToHistory({articleId:currentArticle.id,title:currentArticle.title,topic:currentArticle.topic,score,total,readingTime,date:new Date().toLocaleDateString()});
  showResults(score,total,pct);
}

function showResults(score,total,pct){
  showSection("result");
  const lvl=pct>=80?"great":pct>=60?"ok":"low";
  document.getElementById("score-circle").className="score-circle "+lvl;
  document.getElementById("score-num").textContent=score;
  document.getElementById("score-denom").textContent="/ "+total;
  const msgs={great:{emoji:"🎉",title:"Outstanding!",sub:"You\'re a reading superstar!"},ok:{emoji:"👍",title:"Good Job!",sub:"Nice work! Keep practicing."},low:{emoji:"💪",title:"Keep Trying!",sub:"Reading takes practice. You got this!"}};
  document.getElementById("result-emoji").textContent=msgs[lvl].emoji;
  document.getElementById("result-title").textContent=msgs[lvl].title;
  document.getElementById("result-sub").textContent=msgs[lvl].sub;
  const m=Math.floor(readingTime/60),s=readingTime%60;
  document.getElementById("result-stats").innerHTML=`<div class="stat-pill">⏱️ ${m}:${String(s).padStart(2,"0")}</div><div class="stat-pill">✅ ${score}/${total}</div><div class="stat-pill">📊 ${pct}%</div>`;
}

function reviewQuiz(){showSection("quiz");currentQIndex=0;renderQuestion(0);userAnswers.forEach((a,i)=>{if(a!==null&&i===0)revealAnswer(i,a);});}
function readAgain(){showSection("reading");startTimer();}

function openHistory(){
  const h=userHistory();const u=currentUser();
  const list=document.getElementById("history-list");
  if(!h.length){list.innerHTML='<div class="history-empty">📭 No scores yet! Complete a quiz to see your history.</div>';
  }else{list.innerHTML=`<p style="color:var(--muted);font-size:13px;margin-bottom:12px;">Showing <strong>${u.name}</strong>'s scores (${h.length} articles)</p>`+h.map(hh=>{const pct=Math.round(hh.score/hh.total*100);const lvl=pct>=80?"great":pct>=60?"ok":"low";const m=Math.floor((hh.readingTime||0)/60),s=(hh.readingTime||0)%60;return`<div class="history-item"><div><div class="h-title">${hh.title}</div><div class="h-meta">📚 ${hh.topic} · ⏱️ ${m}:${String(s).padStart(2,"0")} · 📅 ${hh.date}</div></div><span class="score-badge ${lvl}">${hh.score}/${hh.total}</span></div>`;}).join("");}
  document.getElementById("history-modal").classList.add("open");
}
function closeHistory(){document.getElementById("history-modal").classList.remove("open");}
document.getElementById("history-modal").addEventListener("click",e=>{if(e.target===e.currentTarget)closeHistory();});

function showSection(name){
  ["start","reading","quiz","result"].forEach(s=>{document.getElementById(s+"-section").style.display="none";});
  document.getElementById(name+"-section").style.display="block";
  window.scrollTo({top:0,behavior:"smooth"});
  if(name==="start"){updateWelcomeBar();renderGrid(getFilteredArticles());}
}

function getFilteredArticles(){
  return ALL_ARTICLES.filter(a=>{
    const matchTopic=activeFilter==="All"||a.topic===activeFilter;
    const matchSearch=!searchTerm||a.title.toLowerCase().includes(searchTerm)||a.topic.toLowerCase().includes(searchTerm);
    return matchTopic&&matchSearch;
  });
}

function goHome(){
  stopTimer();if(isSpeaking){speechSynth.cancel();isSpeaking=false;}
  showSection("start");
}

// ── BOOT ──
renderProfileScreen();
</script>
