<script>
// ── DATA ──
const EN_ARTICLES = [{"id": 1, "topic": "Animals", "emoji": "\ud83e\udd81", "title": "The Amazing African Lion", "body": "Lions are known as the \"kings of the jungle,\" but they actually live in grasslands and open plains called savannas. Africa is home to most of the world's wild lions. These powerful cats can weigh up to 420 pounds and run as fast as 50 miles per hour!\n\nLions are unique among cats because they live in groups called prides. A pride usually has about 15 lions, including several females, their cubs, and a few males. The females, called lionesses, do most of the hunting. They work together as a team to catch prey like zebras and wildebeest.\n\nMale lions are famous for their magnificent manes \u2014 the thick ring of fur around their heads. A darker, fuller mane often means the lion is older and stronger. Lions communicate through roars that can be heard five miles away!\n\nSadly, lion populations have dropped by half in the past 25 years. Habitat loss and conflict with humans are the biggest threats. Conservation groups are working hard to protect these majestic animals for future generations.", "vocab": [{"word": "savanna", "definition": "A flat, grassy plain in Africa with very few trees."}, {"word": "pride", "definition": "The name for a group of lions that live together."}, {"word": "lioness", "definition": "A female lion."}, {"word": "magnificent", "definition": "Very beautiful and impressive."}, {"word": "conservation", "definition": "The work of protecting animals and nature."}, {"word": "habitat", "definition": "The natural place where an animal lives."}], "questions": [{"question": "Where do most wild lions live?", "options": ["A. In jungles", "B. In savannas and grasslands", "C. In forests", "D. In deserts"], "answer": 1, "explanation": "The passage says lions live in grasslands and open plains called savannas, not jungles."}, {"question": "Who does most of the hunting in a lion pride?", "options": ["A. Male lions", "B. Lion cubs", "C. Lionesses (female lions)", "D. All lions equally"], "answer": 2, "explanation": "The passage clearly states that lionesses (females) do most of the hunting and work together as a team."}, {"question": "What does a darker, fuller mane tell us about a male lion?", "options": ["A. He is younger", "B. He is older and stronger", "C. He is sick", "D. He is the fastest runner"], "answer": 1, "explanation": "According to the passage, a darker and fuller mane often means the lion is older and stronger."}, {"question": "How far away can a lion's roar be heard?", "options": ["A. One mile", "B. Three miles", "C. Five miles", "D. Ten miles"], "answer": 2, "explanation": "The passage states that lions' roars can be heard five miles away."}, {"question": "What is the biggest threat to lions today?", "options": ["A. Other predators", "B. Disease", "C. Habitat loss and conflict with humans", "D. Lack of water"], "answer": 2, "explanation": "The passage says habitat loss and conflict with humans are the biggest threats to lions."}]}, {"id": 2, "topic": "Animals", "emoji": "\ud83d\udc18", "title": "Elephants: The Gentle Giants", "body": "Elephants are the largest land animals on Earth. African elephants can weigh up to 14,000 pounds \u2014 as heavy as two large cars! They use their long trunks for breathing, smelling, drinking, and picking up objects. A trunk has over 40,000 muscles, making it one of the most flexible body parts in the animal kingdom.\n\nElephants live in close family groups led by the oldest female, called the matriarch. She guides the herd to food and water, using her wisdom and memory. Elephants have excellent memories and can remember water sources and migration routes for decades.\n\nThese gentle giants communicate in many ways. They trumpet loudly when excited or alarmed. They also make very low rumbling sounds that humans cannot hear. These sounds, called infrasound, can travel through the ground and reach other elephants miles away.\n\nElephants show deep emotions. They mourn their dead, play joyfully, and comfort each other when upset. They even recognize themselves in mirrors \u2014 something only a few animals can do. Protecting elephants is vital because they shape their environment by clearing trees and digging water holes that other animals depend on.", "vocab": [{"word": "matriarch", "definition": "The oldest female leader of an elephant herd."}, {"word": "flexible", "definition": "Able to bend and move easily in many ways."}, {"word": "infrasound", "definition": "Very low sounds that humans cannot hear."}, {"word": "migration", "definition": "The seasonal movement of animals from one place to another."}, {"word": "mourn", "definition": "To feel deep sadness after someone dies."}, {"word": "vital", "definition": "Extremely important and necessary."}], "questions": [{"question": "How many muscles does an elephant's trunk have?", "options": ["A. Over 400", "B. Over 4,000", "C. Over 40,000", "D. Over 400,000"], "answer": 2, "explanation": "The passage states that a trunk has over 40,000 muscles."}, {"question": "Who leads an elephant herd?", "options": ["A. The youngest male", "B. The oldest female (matriarch)", "C. The largest elephant", "D. The fastest elephant"], "answer": 1, "explanation": "Elephants live in groups led by the oldest female, called the matriarch."}, {"question": "What is infrasound?", "options": ["A. A loud trumpet call", "B. A sound only baby elephants make", "C. Very low sounds humans cannot hear", "D. Sounds made by elephant feet"], "answer": 2, "explanation": "The passage explains that infrasound refers to very low rumbling sounds that humans cannot hear."}, {"question": "Which of the following shows that elephants have emotions?", "options": ["A. They run very fast", "B. They mourn their dead and comfort each other", "C. They have large ears", "D. They eat a lot of food"], "answer": 1, "explanation": "The passage says elephants mourn their dead, play joyfully, and comfort each other \u2014 all signs of deep emotions."}, {"question": "Why are elephants important to their environment?", "options": ["A. They scare away predators", "B. They clear trees and dig water holes other animals use", "C. They plant seeds by eating fruit", "D. They make paths through the forest"], "answer": 1, "explanation": "The passage says elephants shape their environment by clearing trees and digging water holes that other animals depend on."}]}, {"id": 3, "topic": "Animals", "emoji": "\ud83d\udc2c", "title": "Dolphins: Ocean Geniuses", "body": "Dolphins are among the most intelligent animals in the world. They live in oceans and some rivers, and belong to a group of animals called cetaceans \u2014 the same family as whales. Dolphins breathe air through a blowhole on top of their heads, so they must come to the surface regularly.\n\nDolphins are highly social and live in groups called pods, which can have anywhere from a few to hundreds of members. They cooperate to hunt fish, often herding them into tight balls before taking turns feeding. They also play together, riding waves and leaping out of the water.\n\nOne of the most impressive dolphin abilities is echolocation. Dolphins produce clicking sounds that travel through the water and bounce off objects. By listening to the echoes, they can determine the size, shape, and distance of objects \u2014 even in murky water or complete darkness.\n\nDolphins communicate with each other using a complex system of whistles, clicks, and body movements. Researchers have discovered that each dolphin has a unique signature whistle \u2014 like a name \u2014 that other dolphins use to call them. This level of communication is rare in the animal world.", "vocab": [{"word": "cetaceans", "definition": "The group of ocean mammals that includes dolphins and whales."}, {"word": "blowhole", "definition": "The nostril on top of a dolphin or whale's head for breathing."}, {"word": "echolocation", "definition": "Using sound echoes to find the location of objects."}, {"word": "murky", "definition": "Dark and cloudy, hard to see through."}, {"word": "signature", "definition": "Something unique that identifies a particular individual."}, {"word": "cooperate", "definition": "To work together toward a shared goal."}], "questions": [{"question": "How do dolphins breathe?", "options": ["A. Through gills like fish", "B. Through their mouths only", "C. Through a blowhole on top of their heads", "D. Through their skin"], "answer": 2, "explanation": "Dolphins breathe air through a blowhole on top of their heads and must surface regularly."}, {"question": "What is a group of dolphins called?", "options": ["A. A herd", "B. A pod", "C. A pride", "D. A school"], "answer": 1, "explanation": "The passage states that dolphins live in groups called pods."}, {"question": "What is echolocation?", "options": ["A. A special dolphin dance", "B. The way dolphins sleep", "C. Using sound echoes to locate objects", "D. A type of dolphin communication call"], "answer": 2, "explanation": "Echolocation is when dolphins produce clicking sounds that bounce off objects, helping them determine size, shape, and distance."}, {"question": "What is a signature whistle?", "options": ["A. A warning sound", "B. A unique whistle like a name for each dolphin", "C. A mating call", "D. A sound used only for hunting"], "answer": 1, "explanation": "Researchers found each dolphin has a unique signature whistle that other dolphins use to call them \u2014 like a name."}, {"question": "How do dolphins hunt fish together?", "options": ["A. By chasing fish to the shore", "B. By diving very deep", "C. By herding fish into tight balls and taking turns feeding", "D. By using echolocation to freeze the fish"], "answer": 2, "explanation": "The passage says dolphins cooperate to herd fish into tight balls before taking turns feeding."}]}, {"id": 4, "topic": "Animals", "emoji": "\ud83e\udd8b", "title": "The Incredible Journey of the Monarch Butterfly", "body": "Every year, millions of monarch butterflies make one of the most amazing journeys in the animal kingdom. These delicate orange-and-black insects travel up to 3,000 miles from Canada and the United States to their winter home in the mountains of Mexico. The journey takes about two months.\n\nWhat makes this migration truly remarkable is that no single butterfly makes the round trip. The butterflies that leave Mexico in spring are the great-grandparents of those that return in fall. Yet somehow, each new generation finds its way back to the same small forests in Mexico \u2014 forests the butterflies have never visited before.\n\nScientists believe monarchs navigate using the sun as a compass. They also sense Earth's magnetic field to help them stay on course. Before migrating, monarchs feed heavily on milkweed plants to build up fat reserves for the long journey.\n\nMonarch populations have declined dramatically in recent decades. Pesticides have destroyed milkweed \u2014 the only plant monarch caterpillars can eat. Planting milkweed in gardens and reducing pesticide use are simple ways people can help save these extraordinary butterflies.", "vocab": [{"word": "migration", "definition": "A long seasonal journey made by animals to a different place."}, {"word": "remarkable", "definition": "Surprising and worthy of attention; extraordinary."}, {"word": "navigate", "definition": "To find your way from one place to another."}, {"word": "magnetic field", "definition": "An invisible force around Earth that compasses detect."}, {"word": "pesticides", "definition": "Chemicals used to kill insects that damage crops."}, {"word": "reserves", "definition": "Stored supplies saved for use when needed."}], "questions": [{"question": "How far do monarch butterflies travel during migration?", "options": ["A. Up to 300 miles", "B. Up to 1,000 miles", "C. Up to 3,000 miles", "D. Up to 5,000 miles"], "answer": 2, "explanation": "The passage says monarchs travel up to 3,000 miles from Canada and the US to Mexico."}, {"question": "What is remarkable about the monarch migration?", "options": ["A. They fly at night only", "B. No single butterfly makes the full round trip", "C. They travel in a single giant group", "D. They fly faster than any other insect"], "answer": 1, "explanation": "No single butterfly completes the round trip \u2014 the returning butterflies are the great-grandchildren of those that left."}, {"question": "How do monarchs find their way during migration?", "options": ["A. They follow rivers south", "B. They follow older butterflies", "C. They use the sun and Earth's magnetic field", "D. They use smell to find Mexico"], "answer": 2, "explanation": "Scientists believe monarchs use the sun as a compass and sense Earth's magnetic field to navigate."}, {"question": "Why is milkweed important to monarchs?", "options": ["A. It is where they lay their eggs and the only food for caterpillars", "B. It gives them energy for their flight", "C. It protects them from predators", "D. It marks the migration path"], "answer": 0, "explanation": "Milkweed is the only plant monarch caterpillars can eat, making it essential for their survival."}, {"question": "What is causing monarch populations to decline?", "options": ["A. Climate change only", "B. Predators eating them during migration", "C. Pesticides destroying milkweed", "D. Loss of forest in Mexico"], "answer": 2, "explanation": "The passage says pesticides have destroyed milkweed, which is the main cause of monarch population decline."}]}, {"id": 5, "topic": "Animals", "emoji": "\ud83d\udc27", "title": "Penguins: Birds That Can't Fly", "body": "Penguins are birds, but unlike most birds, they cannot fly. Instead, their wings evolved into flippers that make them superb swimmers. Penguins can swim up to 15 miles per hour and dive deeper than 1,800 feet. In the water, they are acrobatic hunters, chasing fish, squid, and krill.\n\nThere are 18 species of penguins, and they all live in the Southern Hemisphere. The largest is the Emperor penguin, which can grow up to 4 feet tall. Emperor penguins survive the brutal Antarctic winter by hudding together in large groups. They take turns moving to the warmer center of the huddle to share body heat.\n\nPenguins are devoted parents. Emperor penguin fathers balance a single egg on their feet and cover it with a warm flap of skin called a brood pouch. They do this for about 65 days through freezing temperatures, without eating, until the egg hatches.\n\nMost penguins mate for life. They recognize their partner and chicks among thousands of other penguins using unique calls. When a penguin returns from the sea, it calls out and its family answers \u2014 a remarkable display of connection in a noisy colony.", "vocab": [{"word": "evolved", "definition": "Changed slowly over many generations to be better suited for survival."}, {"word": "flippers", "definition": "Flat, paddle-like limbs used for swimming."}, {"word": "acrobatic", "definition": "Able to move in impressive and skillful ways."}, {"word": "huddle", "definition": "To crowd together closely for warmth or protection."}, {"word": "brood pouch", "definition": "A warm flap of skin used to keep an egg warm."}, {"word": "colony", "definition": "A large group of animals living together in one place."}], "questions": [{"question": "Why can't penguins fly?", "options": ["A. Their wings are too small", "B. Their wings evolved into flippers for swimming", "C. They are too heavy to fly", "D. They never learned how to fly"], "answer": 1, "explanation": "The passage explains that penguin wings evolved into flippers, making them excellent swimmers instead of flyers."}, {"question": "How do Emperor penguins survive the Antarctic winter?", "options": ["A. They migrate north", "B. They sleep underground", "C. They huddle together and share body heat", "D. They grow extra thick feathers"], "answer": 2, "explanation": "Emperor penguins huddle in large groups and take turns moving to the warmer center to share body heat."}, {"question": "What is a brood pouch?", "options": ["A. A nest made of rocks", "B. A warm skin flap used to keep the egg warm", "C. A pouch for carrying food", "D. A place where penguins sleep"], "answer": 1, "explanation": "A brood pouch is a warm flap of skin that Emperor penguin fathers use to cover and warm their egg."}, {"question": "How long do Emperor penguin fathers keep the egg warm without eating?", "options": ["A. About 20 days", "B. About 40 days", "C. About 65 days", "D. About 90 days"], "answer": 2, "explanation": "The passage says Emperor penguin fathers balance the egg for about 65 days through freezing temperatures without eating."}, {"question": "How do penguins recognize their family in a large colony?", "options": ["A. By their appearance", "B. By their smell", "C. By unique calls", "D. By the color of their flippers"], "answer": 2, "explanation": "Penguins recognize their partner and chicks among thousands using unique calls."}]}, {"id": 6, "topic": "Space", "emoji": "\ud83d\ude80", "title": "Our Solar System", "body": "Our solar system is a vast collection of objects all orbiting around a star we call the Sun. The Sun contains 99.8% of all the mass in the solar system \u2014 it is so large that about one million Earths could fit inside it! The Sun's gravity holds everything in the solar system in place.\n\nThere are eight planets in our solar system. The four closest to the Sun \u2014 Mercury, Venus, Earth, and Mars \u2014 are called terrestrial planets because they have rocky surfaces. The four outer planets \u2014 Jupiter, Saturn, Uranus, and Neptune \u2014 are called gas giants. They are enormous and made mostly of gas and liquid.\n\nBetween Mars and Jupiter lies the asteroid belt, a region filled with millions of rocks called asteroids. Beyond Neptune is a region called the Kuiper Belt, home to dwarf planets like Pluto and millions of icy objects.\n\nEarth is the only planet in our solar system known to support life. It has just the right temperature, liquid water, and an atmosphere with oxygen. Scientists are searching other planets and moons for signs of microbial life \u2014 simple living things too small to see without a microscope.", "vocab": [{"word": "orbit", "definition": "To travel in a curved path around something, like a planet around the Sun."}, {"word": "terrestrial", "definition": "Related to Earth or having a rocky surface like Earth."}, {"word": "asteroid", "definition": "A rocky object that orbits the Sun, smaller than a planet."}, {"word": "dwarf planet", "definition": "A round object orbiting the Sun that is smaller than a regular planet."}, {"word": "atmosphere", "definition": "The layer of gases that surrounds a planet."}, {"word": "microbial", "definition": "Relating to microscopic living things called microbes."}], "questions": [{"question": "What percentage of the solar system's mass does the Sun contain?", "options": ["A. 50%", "B. 75%", "C. 90%", "D. 99.8%"], "answer": 3, "explanation": "The passage states that the Sun contains 99.8% of all the mass in the solar system."}, {"question": "What are terrestrial planets?", "options": ["A. Planets made of gas", "B. Planets with rocky surfaces", "C. Planets with rings", "D. Planets with moons"], "answer": 1, "explanation": "The passage says terrestrial planets have rocky surfaces \u2014 they are Mercury, Venus, Earth, and Mars."}, {"question": "Where is the asteroid belt located?", "options": ["A. Between Earth and Mars", "B. Between Mars and Jupiter", "C. Between Jupiter and Saturn", "D. Beyond Neptune"], "answer": 1, "explanation": "The passage says the asteroid belt lies between Mars and Jupiter."}, {"question": "What makes Earth unique in our solar system?", "options": ["A. It is the largest planet", "B. It has the most moons", "C. It is the only planet known to support life", "D. It is closest to the Sun"], "answer": 2, "explanation": "The passage says Earth is the only planet in our solar system known to support life."}, {"question": "What is the Kuiper Belt?", "options": ["A. A ring around Saturn", "B. A region of asteroids near Mars", "C. A region beyond Neptune with dwarf planets and icy objects", "D. The area closest to the Sun"], "answer": 2, "explanation": "The Kuiper Belt is a region beyond Neptune that is home to dwarf planets like Pluto and millions of icy objects."}]}, {"id": 7, "topic": "Space", "emoji": "\ud83c\udf19", "title": "The Moon: Earth's Companion", "body": "The Moon is Earth's only natural satellite, orbiting our planet at an average distance of 239,000 miles. It is about one-quarter the size of Earth. The Moon has no atmosphere, no wind, and no liquid water \u2014 making it a very different world from our own.\n\nThe Moon's surface is covered in craters, created by meteorites crashing into it billions of years ago. Because there is no wind or rain to erode them, these craters remain perfectly preserved. The Moon also has vast flat plains called maria (meaning 'seas' in Latin), which ancient astronomers mistakenly thought were actual seas.\n\nThe Moon affects Earth in important ways. Its gravitational pull causes the ocean tides. The Moon also stabilizes Earth's tilt, which keeps our planet's climate relatively stable. Without the Moon, Earth's seasons and climate could be wildly unpredictable.\n\nOn July 20, 1969, astronauts Neil Armstrong and Buzz Aldrin became the first humans to walk on the Moon during NASA's Apollo 11 mission. Armstrong's famous words were: \"That's one small step for man, one giant leap for mankind.\" Twelve astronauts walked on the Moon between 1969 and 1972. No humans have returned since.", "vocab": [{"word": "satellite", "definition": "An object that orbits a planet; the Moon is Earth's natural satellite."}, {"word": "crater", "definition": "A bowl-shaped hole on the surface of a planet or moon caused by a meteorite impact."}, {"word": "meteorite", "definition": "A rock from space that hits the surface of a planet or moon."}, {"word": "erode", "definition": "To wear away slowly over time by wind, water, or other forces."}, {"word": "gravitational pull", "definition": "The force of gravity that attracts objects toward each other."}, {"word": "stabilizes", "definition": "Keeps something steady and prevents it from changing too much."}], "questions": [{"question": "How far is the Moon from Earth on average?", "options": ["A. 23,900 miles", "B. 239,000 miles", "C. 2,390,000 miles", "D. 93,000,000 miles"], "answer": 1, "explanation": "The passage says the Moon orbits Earth at an average distance of 239,000 miles."}, {"question": "Why do craters on the Moon remain perfectly preserved?", "options": ["A. The Moon is very cold", "B. The craters are protected by ice", "C. There is no wind or rain to erode them", "D. New rock fills the craters over time"], "answer": 2, "explanation": "Because the Moon has no wind or rain, nothing erodes the craters, so they stay perfectly preserved."}, {"question": "What are 'maria' on the Moon?", "options": ["A. Deep valleys", "B. Vast flat plains that look like seas", "C. Actual water seas", "D. Mountain ranges"], "answer": 1, "explanation": "Maria are vast flat plains on the Moon; ancient astronomers mistakenly thought they were actual seas."}, {"question": "What important effect does the Moon have on Earth?", "options": ["A. It creates Earth's weather", "B. It reflects sunlight to keep Earth warm", "C. Its gravity causes ocean tides and stabilizes Earth's tilt", "D. It protects Earth from asteroids"], "answer": 2, "explanation": "The Moon's gravitational pull causes ocean tides, and it also stabilizes Earth's tilt to keep the climate steady."}, {"question": "When did the first humans walk on the Moon?", "options": ["A. July 20, 1959", "B. July 20, 1969", "C. July 20, 1979", "D. July 20, 1989"], "answer": 1, "explanation": "Neil Armstrong and Buzz Aldrin walked on the Moon on July 20, 1969, during the Apollo 11 mission."}]}, {"id": 8, "topic": "Space", "emoji": "\u2b50", "title": "Stars: Balls of Fire in Space", "body": "When you look up at the night sky, you see thousands of twinkling lights \u2014 those are stars! Stars are enormous balls of hot gas, mostly hydrogen and helium. They produce energy through a process called nuclear fusion, where hydrogen atoms combine to form helium, releasing tremendous amounts of light and heat.\n\nOur Sun is a star \u2014 a medium-sized, middle-aged star about 4.6 billion years old. Compared to other stars, the Sun is quite average. Some stars are so large they are called supergiants, thousands of times bigger than our Sun. Other stars are tiny and dim, called red dwarfs, and are the most common type in our galaxy.\n\nStars have life cycles, just like living things. A star is born inside a cloud of gas and dust called a nebula. After billions of years, when a star runs out of hydrogen fuel, it changes dramatically. A star like our Sun will expand into a red giant, then shrink into a small, dense object called a white dwarf.\n\nLarger stars end their lives in a spectacular explosion called a supernova \u2014 one of the most powerful events in the universe. After a supernova, what remains may become a neutron star or even a black hole, an object so dense that not even light can escape its gravity.", "vocab": [{"word": "nuclear fusion", "definition": "The process where atoms combine to release enormous amounts of energy."}, {"word": "supergiant", "definition": "An extremely large and bright star, much bigger than our Sun."}, {"word": "red dwarf", "definition": "A small, dim, cool star; the most common type in the galaxy."}, {"word": "nebula", "definition": "A cloud of gas and dust in space where stars are born."}, {"word": "supernova", "definition": "A massive explosion that occurs when a large star dies."}, {"word": "black hole", "definition": "An object in space so dense that nothing, not even light, can escape its gravity."}], "questions": [{"question": "What are stars made of?", "options": ["A. Rock and ice", "B. Hot gas, mostly hydrogen and helium", "C. Burning wood and oxygen", "D. Liquid fire and metal"], "answer": 1, "explanation": "The passage says stars are enormous balls of hot gas, mostly hydrogen and helium."}, {"question": "What process do stars use to produce energy?", "options": ["A. Burning oxygen", "B. Chemical reactions", "C. Nuclear fusion", "D. Solar radiation"], "answer": 2, "explanation": "Stars produce energy through nuclear fusion, where hydrogen atoms combine to form helium, releasing light and heat."}, {"question": "What is the most common type of star in our galaxy?", "options": ["A. Supergiants", "B. Stars like our Sun", "C. White dwarfs", "D. Red dwarfs"], "answer": 3, "explanation": "The passage states that red dwarfs are the most common type of star in our galaxy."}, {"question": "Where are stars born?", "options": ["A. Inside black holes", "B. In clouds of gas and dust called nebulae", "C. Near the center of galaxies", "D. From supernova explosions only"], "answer": 1, "explanation": "Stars are born inside clouds of gas and dust called nebulae."}, {"question": "What might form after a large star explodes in a supernova?", "options": ["A. A new planet", "B. A red giant", "C. A neutron star or black hole", "D. A new solar system"], "answer": 2, "explanation": "The passage says after a supernova, what remains may become a neutron star or even a black hole."}]}, {"id": 9, "topic": "Ocean", "emoji": "\ud83c\udf0a", "title": "The Deep Ocean: Earth's Last Frontier", "body": "The ocean covers more than 70% of Earth's surface, yet we have explored less than 20% of it. The deep ocean \u2014 areas below 3,300 feet \u2014 is one of the least understood places on our planet. It is pitch-black, ice-cold, and under enormous pressure. Yet incredibly, life thrives there.\n\nDeep-sea creatures have evolved remarkable adaptations to survive in such extreme conditions. Many produce their own light through a process called bioluminescence. The anglerfish dangles a glowing lure above its head to attract prey in the darkness. Vampire squid can turn themselves inside out to escape predators.\n\nThe deepest part of the ocean is the Mariana Trench in the Pacific Ocean. At its deepest point, called Challenger Deep, the ocean is about 36,000 feet deep \u2014 deeper than Mount Everest is tall! The pressure there is about 1,000 times greater than at sea level.\n\nDespite the harsh conditions, scientists have discovered entire ecosystems around hydrothermal vents \u2014 cracks in the ocean floor that release superheated water. Bacteria near these vents convert chemicals into energy instead of using sunlight. These bacteria support a whole food chain of tube worms, crabs, and other extraordinary creatures.", "vocab": [{"word": "bioluminescence", "definition": "The ability of a living thing to produce its own light."}, {"word": "adaptation", "definition": "A feature that helps a living thing survive in its environment."}, {"word": "hydrothermal vents", "definition": "Cracks in the ocean floor that release very hot water and chemicals."}, {"word": "ecosystem", "definition": "All the living things in an area and how they interact with each other."}, {"word": "pressure", "definition": "The force pushing on an object from all sides; increases with depth in water."}, {"word": "lure", "definition": "Something used to attract animals or people toward a trap."}], "questions": [{"question": "What percentage of the ocean have we explored?", "options": ["A. Less than 5%", "B. Less than 20%", "C. About 50%", "D. About 70%"], "answer": 1, "explanation": "The passage says we have explored less than 20% of the ocean."}, {"question": "What is bioluminescence?", "options": ["A. A deep-sea current", "B. The ability to survive in cold water", "C. The ability of a creature to produce its own light", "D. A type of deep-sea plant"], "answer": 2, "explanation": "Bioluminescence is the process by which deep-sea creatures produce their own light."}, {"question": "How deep is Challenger Deep in the Mariana Trench?", "options": ["A. About 3,600 feet", "B. About 13,000 feet", "C. About 29,000 feet", "D. About 36,000 feet"], "answer": 3, "explanation": "Challenger Deep is about 36,000 feet deep \u2014 deeper than Mount Everest is tall."}, {"question": "How do bacteria near hydrothermal vents get energy?", "options": ["A. From sunlight", "B. From eating other bacteria", "C. By converting chemicals into energy", "D. From the heat of the water"], "answer": 2, "explanation": "The passage says bacteria near hydrothermal vents convert chemicals into energy instead of using sunlight."}, {"question": "What conditions exist in the deep ocean?", "options": ["A. Bright light and warm temperatures", "B. Pitch-black, ice-cold, and enormous pressure", "C. Low pressure and moderate temperatures", "D. Warm and calm conditions"], "answer": 1, "explanation": "The deep ocean is described as pitch-black, ice-cold, and under enormous pressure."}]}, {"id": 10, "topic": "Ocean", "emoji": "\ud83e\udd88", "title": "Sharks: Ancient Ocean Hunters", "body": "Sharks have been swimming in Earth's oceans for over 450 million years \u2014 long before dinosaurs existed! They have survived five mass extinctions that wiped out most life on Earth. Today, there are more than 500 species of sharks, ranging from the tiny dwarf lanternshark (about 8 inches long) to the massive whale shark (up to 40 feet long).\n\nSharks are perfectly designed for hunting. They have multiple rows of teeth \u2014 when one tooth falls out, another moves forward to replace it. A shark may go through thousands of teeth in its lifetime. Their sense of smell is extraordinary; some species can detect a single drop of blood in 25 gallons of water.\n\nContrary to popular belief, most sharks are not dangerous to humans. Of the 500+ species, only about a dozen are considered potentially dangerous. Sharks are actually more scared of us than we are of them. Humans kill approximately 100 million sharks per year, mainly for their fins, while sharks kill fewer than 10 people per year worldwide.\n\nSharks are vital to ocean health. As apex predators, they keep fish populations balanced. When shark populations decline, it causes a chain reaction that disrupts the entire ocean ecosystem. Protecting sharks means protecting the health of our oceans.", "vocab": [{"word": "mass extinction", "definition": "An event where a large number of species die out in a short time."}, {"word": "species", "definition": "A group of similar living things that can reproduce together."}, {"word": "extraordinary", "definition": "Very unusual or impressive; beyond what is ordinary."}, {"word": "contrary", "definition": "Opposite to what is expected or believed."}, {"word": "apex predator", "definition": "An animal at the top of the food chain with no natural predators."}, {"word": "disrupts", "definition": "Causes disorder or prevents something from working normally."}], "questions": [{"question": "How long have sharks been on Earth?", "options": ["A. About 65 million years", "B. About 200 million years", "C. Over 450 million years", "D. About 1 billion years"], "answer": 2, "explanation": "The passage says sharks have been swimming in Earth's oceans for over 450 million years."}, {"question": "What happens when a shark loses a tooth?", "options": ["A. The shark cannot eat for weeks", "B. Another tooth moves forward to replace it", "C. The tooth grows back slowly", "D. The shark loses all its teeth"], "answer": 1, "explanation": "Sharks have multiple rows of teeth, and when one falls out, another moves forward to replace it."}, {"question": "About how many shark species are considered potentially dangerous to humans?", "options": ["A. All 500+ species", "B. About 200 species", "C. About 50 species", "D. About a dozen species"], "answer": 3, "explanation": "The passage says only about a dozen of the 500+ species are considered potentially dangerous to humans."}, {"question": "Why are sharks vital to ocean health?", "options": ["A. They clean the ocean by eating dead animals", "B. They produce oxygen for the ocean", "C. As apex predators, they keep fish populations balanced", "D. They create habitats for other sea creatures"], "answer": 2, "explanation": "Sharks are apex predators that keep fish populations balanced, and without them, the whole ocean ecosystem is disrupted."}, {"question": "Who kills more \u2014 sharks killing humans or humans killing sharks?", "options": ["A. Sharks kill far more humans", "B. They kill about equal numbers", "C. Humans kill far more sharks", "D. Neither kills the other"], "answer": 2, "explanation": "Humans kill about 100 million sharks per year, while sharks kill fewer than 10 people per year worldwide."}]}, {"id": 11, "topic": "Dinosaurs", "emoji": "\ud83e\udd95", "title": "Dinosaurs: Rulers of the Ancient World", "body": "Dinosaurs were extraordinary reptiles that dominated Earth for about 165 million years. They first appeared about 230 million years ago during the Triassic Period and ruled the planet until a mass extinction event about 66 million years ago. Humans have only existed for about 300,000 years \u2014 we are newcomers compared to dinosaurs!\n\nDinosaurs came in astonishing variety. The mighty T. rex was a fierce predator that could grow 40 feet long and weigh 9 tons. Brachiosaurus was a gentle giant that used its incredibly long neck to reach leaves high in treetops. The tiny Compsognathus was only about the size of a turkey.\n\nFor a long time, scientists thought dinosaurs were slow, cold-blooded creatures like modern reptiles. New research has changed this view dramatically. Many dinosaurs were warm-blooded, active, and fast-moving. Some even had feathers \u2014 strong evidence that modern birds are actually living dinosaurs, direct descendants of feathered theropod dinosaurs.\n\nDinosaurs went extinct when a massive asteroid struck Earth near present-day Mexico. The impact caused wildfires, tsunamis, and a dust cloud that blocked sunlight for years, causing plants to die and food chains to collapse. Only small, feathered theropods survived \u2014 and they eventually evolved into the birds we see today.", "vocab": [{"word": "dominated", "definition": "Had power and control over a large area or group."}, {"word": "Triassic Period", "definition": "A time in Earth's history from 252 to 201 million years ago when dinosaurs first appeared."}, {"word": "predator", "definition": "An animal that hunts and eats other animals."}, {"word": "warm-blooded", "definition": "Able to maintain a constant body temperature regardless of surroundings."}, {"word": "theropod", "definition": "A group of two-legged dinosaurs that are ancestors of modern birds."}, {"word": "descendants", "definition": "Offspring or later generations of a living thing."}], "questions": [{"question": "How long did dinosaurs rule the Earth?", "options": ["A. About 66 million years", "B. About 165 million years", "C. About 230 million years", "D. About 300,000 years"], "answer": 1, "explanation": "The passage says dinosaurs dominated Earth for about 165 million years."}, {"question": "What new research has scientists discovered about dinosaurs?", "options": ["A. They were cold-blooded like lizards", "B. They were even slower than previously thought", "C. Many were warm-blooded, active, and some had feathers", "D. They all lived in water"], "answer": 2, "explanation": "New research shows many dinosaurs were warm-blooded and active, and some had feathers."}, {"question": "What is the connection between dinosaurs and birds?", "options": ["A. Birds evolved from flying reptiles, not dinosaurs", "B. Modern birds are actually living dinosaurs descended from feathered theropods", "C. Birds look like dinosaurs but are not related", "D. Only a few bird species are related to dinosaurs"], "answer": 1, "explanation": "Modern birds are direct descendants of feathered theropod dinosaurs \u2014 they are essentially living dinosaurs."}, {"question": "What caused dinosaurs to go extinct?", "options": ["A. Extreme cold temperatures", "B. Disease spreading worldwide", "C. A massive asteroid strike that blocked sunlight", "D. Volcanic eruptions only"], "answer": 2, "explanation": "A massive asteroid struck Earth, causing wildfires, tsunamis, and a dust cloud that blocked sunlight and collapsed food chains."}, {"question": "Which dinosaur was about the size of a turkey?", "options": ["A. T. rex", "B. Brachiosaurus", "C. Velociraptor", "D. Compsognathus"], "answer": 3, "explanation": "The passage says the tiny Compsognathus was only about the size of a turkey."}]}, {"id": 12, "topic": "Dinosaurs", "emoji": "\ud83e\udd96", "title": "T. Rex: The Tyrant King", "body": "Tyrannosaurus rex \u2014 T. rex for short \u2014 is one of the most famous and fearsome dinosaurs that ever lived. Its name means 'tyrant lizard king' in Latin. T. rex lived about 66-68 million years ago in what is now western North America, during the late Cretaceous Period.\n\nT. rex was a massive predator. Adults could reach 40 feet in length and weigh up to 9 tons. Its skull alone was up to 5 feet long, and it had 60 banana-shaped teeth, each up to 12 inches long. Its bite was so powerful it could crush bone \u2014 the most powerful bite force of any land animal ever discovered.\n\nDespite its terrifying appearance, T. rex had tiny arms \u2014 only about 3 feet long. Scientists debate what these small arms were used for. Some think they helped T. rex grip prey or push itself up off the ground. T. rex's legs, however, were enormous and powerful, suggesting it could run at speeds of 12-25 miles per hour.\n\nRecent discoveries have changed how we picture T. rex. Fossils show evidence of feathers, at least on parts of the body. T. rex was likely not the scaly green beast of movies, but may have had patches of feathers, similar to a large, fierce chicken! Scientists continue to learn new things about this incredible dinosaur every year.", "vocab": [{"word": "tyrant", "definition": "A cruel and powerful ruler who controls others by force."}, {"word": "Cretaceous Period", "definition": "A time in Earth's history from 145 to 66 million years ago."}, {"word": "fossil", "definition": "The preserved remains or traces of ancient living things found in rock."}, {"word": "debate", "definition": "To discuss different opinions about a topic."}, {"word": "evidence", "definition": "Facts or signs that help prove whether something is true."}, {"word": "massive", "definition": "Very large and heavy."}], "questions": [{"question": "What does 'Tyrannosaurus rex' mean?", "options": ["A. Giant lizard king", "B. Tyrant lizard king", "C. Terrible lizard king", "D. Swift lizard king"], "answer": 1, "explanation": "The passage explains that Tyrannosaurus rex means 'tyrant lizard king' in Latin."}, {"question": "How long were T. rex's teeth?", "options": ["A. Up to 2 inches", "B. Up to 6 inches", "C. Up to 12 inches", "D. Up to 24 inches"], "answer": 2, "explanation": "T. rex had banana-shaped teeth each up to 12 inches long."}, {"question": "What was special about T. rex's bite?", "options": ["A. It was the fastest bite of any dinosaur", "B. It was the most powerful bite force of any land animal ever discovered", "C. It could bite through metal", "D. It was used to crack open eggs"], "answer": 1, "explanation": "T. rex's bite was the most powerful bite force of any land animal ever discovered \u2014 powerful enough to crush bone."}, {"question": "What recent discovery surprised scientists about T. rex?", "options": ["A. T. rex could swim", "B. T. rex hunted in packs", "C. T. rex had evidence of feathers", "D. T. rex was actually cold-blooded"], "answer": 2, "explanation": "Recent fossils show evidence of feathers on T. rex, changing how we picture this dinosaur."}, {"question": "How fast could T. rex run?", "options": ["A. 5-8 miles per hour", "B. 12-25 miles per hour", "C. 30-40 miles per hour", "D. Over 50 miles per hour"], "answer": 1, "explanation": "The passage suggests T. rex could run at speeds of 12-25 miles per hour based on the size of its legs."}]}, {"id": 13, "topic": "Nature", "emoji": "\ud83c\udf3f", "title": "The Amazing World of Trees", "body": "Trees are the largest living things on Earth and are essential to all life on our planet. Through photosynthesis, trees absorb carbon dioxide from the air and release oxygen \u2014 the oxygen we breathe. A single mature tree can absorb about 48 pounds of carbon dioxide per year and provide enough oxygen for two people.\n\nTrees communicate with each other through underground networks of fungi connected to their roots, sometimes called the 'Wood Wide Web.' Through this network, trees share nutrients and water. A 'mother tree' \u2014 the largest and oldest tree in a forest \u2014 sends extra nutrients to young seedlings growing in the shade where sunlight is scarce.\n\nSome trees live for an extraordinarily long time. A bristlecone pine tree in California called Methuselah is about 4,850 years old \u2014 the oldest known living tree in the world. Some clonal tree colonies, which are groups of trees sharing a single root system, are even older. Pando, a colony of aspen trees in Utah, is estimated to be 80,000 years old!\n\nForests cover about 31% of Earth's land surface and are home to about 80% of Earth's land animals. They regulate climate, prevent soil erosion, and filter water. Protecting forests is one of the most important things humans can do to fight climate change.", "vocab": [{"word": "photosynthesis", "definition": "The process by which plants use sunlight, water, and carbon dioxide to make food and release oxygen."}, {"word": "fungi", "definition": "Organisms like mushrooms and mold that break down dead matter; plural of fungus."}, {"word": "nutrients", "definition": "Substances that living things need to grow and stay healthy."}, {"word": "seedlings", "definition": "Young plants that have just sprouted from seeds."}, {"word": "clonal", "definition": "Made up of genetically identical copies from a single original organism."}, {"word": "erosion", "definition": "The gradual wearing away of soil or rock by wind, water, or other forces."}], "questions": [{"question": "How much carbon dioxide can a single mature tree absorb per year?", "options": ["A. About 4.8 pounds", "B. About 48 pounds", "C. About 480 pounds", "D. About 4,800 pounds"], "answer": 1, "explanation": "The passage says a single mature tree can absorb about 48 pounds of carbon dioxide per year."}, {"question": "What is the 'Wood Wide Web'?", "options": ["A. A type of tree disease", "B. An internet-like system for tracking forests", "C. Underground fungal networks that connect tree roots", "D. A network of forest animals that help trees"], "answer": 2, "explanation": "The 'Wood Wide Web' refers to underground networks of fungi connected to tree roots through which trees share nutrients and water."}, {"question": "What does a 'mother tree' do?", "options": ["A. It reproduces the most seeds", "B. It sends extra nutrients to young seedlings in the shade", "C. It is the tallest tree in the forest", "D. It protects other trees from disease"], "answer": 1, "explanation": "A mother tree is the largest and oldest tree that sends extra nutrients to young seedlings growing in the shade."}, {"question": "How old is Pando, the aspen tree colony in Utah?", "options": ["A. About 4,850 years old", "B. About 10,000 years old", "C. About 50,000 years old", "D. An estimated 80,000 years old"], "answer": 3, "explanation": "Pando is estimated to be 80,000 years old \u2014 much older than the individual tree Methuselah."}, {"question": "What percentage of Earth's land animals live in forests?", "options": ["A. About 31%", "B. About 50%", "C. About 80%", "D. About 95%"], "answer": 2, "explanation": "The passage says forests are home to about 80% of Earth's land animals."}]}, {"id": 14, "topic": "Nature", "emoji": "\ud83c\udf0b", "title": "Volcanoes: Earth's Fire Mountains", "body": "Volcanoes are openings in Earth's crust through which hot molten rock, called magma, can escape. When magma reaches the surface, it is called lava. Volcanoes can be found on every continent and even on the ocean floor. There are about 1,500 potentially active volcanoes on Earth today.\n\nVolcanoes form where tectonic plates \u2014 the large moving pieces of Earth's crust \u2014 meet or pull apart. The Ring of Fire is a region around the Pacific Ocean where about 75% of the world's volcanoes are found. Countries like Japan, Indonesia, and Chile sit on this volcanic ring.\n\nNot all volcanic eruptions are the same. Some volcanoes erupt slowly, releasing lava that flows steadily downhill. Others explode violently, shooting ash, rock, and gases miles into the air. The 1980 eruption of Mount St. Helens in Washington State blew away the entire side of the mountain and sent ash across 11 states.\n\nDespite their destructive power, volcanoes also create. Volcanic rock breaks down into extremely fertile soil, which is why people have farmed near volcanoes for thousands of years. The Hawaiian Islands were entirely formed by volcanic activity. Volcanic gases also helped create Earth's early atmosphere billions of years ago.", "vocab": [{"word": "magma", "definition": "Hot melted rock found beneath Earth's surface."}, {"word": "lava", "definition": "Magma that has reached Earth's surface through a volcano."}, {"word": "tectonic plates", "definition": "The large moving sections of Earth's outer crust."}, {"word": "Ring of Fire", "definition": "A region around the Pacific Ocean known for its many volcanoes and earthquakes."}, {"word": "eruption", "definition": "The sudden, often violent release of lava, ash, and gases from a volcano."}, {"word": "fertile", "definition": "Rich in nutrients and able to support plant growth."}], "questions": [{"question": "What is lava?", "options": ["A. Hot gas released by volcanoes", "B. Volcanic ash that falls from the sky", "C. Magma that has reached Earth's surface", "D. The crater at the top of a volcano"], "answer": 2, "explanation": "The passage says when magma reaches the surface, it is called lava."}, {"question": "Where is the Ring of Fire?", "options": ["A. Around the Atlantic Ocean", "B. Around the Pacific Ocean", "C. In the middle of Africa", "D. Along the equator"], "answer": 1, "explanation": "The Ring of Fire is a region around the Pacific Ocean where about 75% of Earth's volcanoes are found."}, {"question": "What happened during the 1980 eruption of Mount St. Helens?", "options": ["A. It created a new island", "B. It melted nearby glaciers only", "C. It blew away an entire side of the mountain and sent ash across 11 states", "D. It caused a tsunami in the Pacific"], "answer": 2, "explanation": "The 1980 eruption blew away the entire side of the mountain and sent ash across 11 states."}, {"question": "Why do people farm near volcanoes despite the danger?", "options": ["A. The heat helps crops grow faster", "B. Volcanic rock breaks down into very fertile soil", "C. There are fewer pests near volcanoes", "D. Volcanic areas always have plenty of water"], "answer": 1, "explanation": "Volcanic rock breaks down into extremely fertile soil, making it great for farming."}, {"question": "How were the Hawaiian Islands formed?", "options": ["A. By tectonic plates colliding", "B. By volcanic activity", "C. By coral reef growth", "D. By glaciers carving the land"], "answer": 1, "explanation": "The passage says the Hawaiian Islands were entirely formed by volcanic activity."}]}, {"id": 15, "topic": "Technology", "emoji": "\ud83e\udd16", "title": "Artificial Intelligence: Teaching Computers to Think", "body": "Artificial intelligence, or AI, is the ability of computers to do tasks that normally require human intelligence \u2014 things like recognizing faces, translating languages, playing chess, or making decisions. AI is not magic; it is based on mathematics and large amounts of data.\n\nMost modern AI uses a method called machine learning. Instead of programming every single rule, engineers feed the computer millions of examples. The computer finds patterns in the data on its own. For example, to teach an AI to recognize cats, you show it millions of cat photos until it learns what features make something a cat.\n\nAI is already part of everyday life. When you ask a voice assistant a question, when Netflix suggests shows you might like, when a spam filter removes unwanted emails \u2014 these all use AI. Self-driving cars use AI to see road signs, other vehicles, and pedestrians.\n\nAI can do many things faster and more accurately than humans. It can scan thousands of medical images to detect cancer early, or translate books between languages in seconds. However, AI also raises important questions. Can AI be fair and unbiased? Who is responsible when AI makes a mistake? As AI becomes more powerful, these questions become more important for society to answer.", "vocab": [{"word": "artificial intelligence", "definition": "The ability of computers to perform tasks that usually require human thinking."}, {"word": "machine learning", "definition": "A type of AI where computers learn from examples and data rather than step-by-step instructions."}, {"word": "data", "definition": "Facts and information, especially when collected and stored by computers."}, {"word": "pattern", "definition": "A repeated arrangement or set of features that can be identified and predicted."}, {"word": "pedestrian", "definition": "A person who is walking, especially in a city or on a road."}, {"word": "unbiased", "definition": "Fair and not favoring one side or group over another."}], "questions": [{"question": "What is artificial intelligence?", "options": ["A. Robots that look like humans", "B. The ability of computers to do tasks that require human intelligence", "C. A new type of computer chip", "D. Software that connects computers together"], "answer": 1, "explanation": "The passage defines AI as the ability of computers to do tasks that normally require human intelligence."}, {"question": "How does machine learning work?", "options": ["A. A programmer writes every single rule the computer must follow", "B. The computer is taught by a human teacher directly", "C. The computer finds patterns in millions of examples on its own", "D. The computer copies what other computers do"], "answer": 2, "explanation": "In machine learning, engineers feed the computer millions of examples and the computer finds patterns in the data on its own."}, {"question": "Which of the following is an example of AI in everyday life?", "options": ["A. Using a pencil to write", "B. Reading a physical book", "C. Netflix suggesting shows you might like", "D. Riding a bicycle"], "answer": 2, "explanation": "The passage mentions Netflix suggesting shows as one example of AI used in everyday life."}, {"question": "What is one way AI helps in medicine?", "options": ["A. AI performs surgeries automatically", "B. AI prescribes medicine to patients", "C. AI scans medical images to detect cancer early", "D. AI replaces all doctors and nurses"], "answer": 2, "explanation": "The passage says AI can scan thousands of medical images to detect cancer early."}, {"question": "What important question does the passage raise about AI?", "options": ["A. Whether AI will become conscious", "B. Whether AI can be fair and who is responsible when it makes mistakes", "C. Whether AI will replace all human jobs", "D. Whether AI should be used in schools"], "answer": 1, "explanation": "The passage asks whether AI can be fair and unbiased, and who is responsible when AI makes a mistake."}]}, {"id": 16, "topic": "History", "emoji": "\ud83c\udfdb\ufe0f", "title": "Ancient Egypt: Land of the Pharaohs", "body": "Ancient Egypt was one of the world's greatest civilizations, lasting over 3,000 years. It rose along the Nile River in northeastern Africa. Every year, the Nile flooded its banks, depositing rich black soil that allowed farmers to grow abundant crops in the middle of the desert. This reliable flood cycle was the foundation of Egyptian society.\n\nAt the head of Egyptian society was the pharaoh \u2014 a king believed to be a living god. Pharaohs ruled with absolute power and were responsible for maintaining order, called Ma'at. When a pharaoh died, Egyptians believed they traveled to the afterlife. To protect their bodies for this journey, they used a complex process called mummification, which preserved the body by removing organs and drying it with special salts.\n\nThe ancient Egyptians were remarkable engineers. The Great Pyramid of Giza, built for Pharaoh Khufu around 2560 BCE, is made of 2.3 million stone blocks, some weighing up to 80 tons. How workers moved these stones without modern machinery remains one of history's great mysteries.\n\nEgyptians developed one of the earliest writing systems, called hieroglyphics. They wrote on papyrus \u2014 a paper-like material made from reeds. Egyptian contributions to mathematics, medicine, and architecture influenced many later civilizations, including the Greeks and Romans.", "vocab": [{"word": "civilization", "definition": "A complex human society with cities, laws, art, and writing."}, {"word": "pharaoh", "definition": "The ruler of ancient Egypt, believed to be a living god."}, {"word": "mummification", "definition": "The ancient Egyptian process of preserving a dead body."}, {"word": "afterlife", "definition": "Life believed to continue after death."}, {"word": "hieroglyphics", "definition": "The ancient Egyptian writing system using picture symbols."}, {"word": "papyrus", "definition": "A paper-like writing material made from reeds by ancient Egyptians."}], "questions": [{"question": "Why was the annual flooding of the Nile important to ancient Egypt?", "options": ["A. It provided fish for Egyptians to eat", "B. It deposited rich soil for farming in the desert", "C. It prevented enemies from crossing the river", "D. It filled the canals that watered gardens"], "answer": 1, "explanation": "The Nile's annual floods deposited rich black soil, allowing farmers to grow crops in the desert \u2014 the foundation of Egyptian society."}, {"question": "What did ancient Egyptians believe happened to pharaohs after death?", "options": ["A. They were reborn as animals", "B. They became stars in the sky", "C. They traveled to the afterlife", "D. They became part of the Nile River"], "answer": 2, "explanation": "Egyptians believed pharaohs traveled to the afterlife after death, which is why they mummified their bodies."}, {"question": "How many stone blocks is the Great Pyramid of Giza made of?", "options": ["A. About 230,000", "B. About 2.3 million", "C. About 23 million", "D. About 230 million"], "answer": 1, "explanation": "The Great Pyramid is made of 2.3 million stone blocks, some weighing up to 80 tons."}, {"question": "What are hieroglyphics?", "options": ["A. Ancient Egyptian coins", "B. Decorations on pyramid walls only", "C. The ancient Egyptian writing system using picture symbols", "D. A type of ancient Egyptian math"], "answer": 2, "explanation": "Hieroglyphics are the ancient Egyptian writing system that used picture symbols."}, {"question": "What was papyrus used for?", "options": ["A. Building pyramids", "B. Making clothing", "C. Writing on, like paper", "D. Wrapping mummies"], "answer": 2, "explanation": "Papyrus was a paper-like material made from reeds that Egyptians wrote on."}]}, {"id": 17, "topic": "Food & Health", "emoji": "\ud83c\udf4e", "title": "Why We Need to Eat Vegetables", "body": "Vegetables might not always be a child's favorite food, but they are incredibly important for a healthy body. Vegetables are packed with vitamins, minerals, and fiber \u2014 nutrients that help your body grow, fight disease, and function properly. Eating a variety of colorful vegetables every day is one of the best things you can do for your health.\n\nDifferent colored vegetables provide different nutrients. Orange and yellow vegetables like carrots and sweet potatoes are rich in beta-carotene, which your body converts to vitamin A \u2014 important for good eyesight. Dark green vegetables like spinach and broccoli are packed with iron, calcium, and vitamins C and K. Red vegetables like tomatoes contain lycopene, which helps protect the heart.\n\nFiber is another crucial ingredient found in vegetables. Fiber helps food move through your digestive system, keeping you feeling full longer and preventing constipation. Fiber also feeds the helpful bacteria in your gut, which are important for your immune system.\n\nStudies show that people who eat more vegetables have lower rates of heart disease, diabetes, and certain cancers. Nutrition experts recommend that half of every meal should be fruits and vegetables. Trying new vegetables with different cooking methods \u2014 like roasting, which brings out natural sweetness \u2014 can make vegetables much more enjoyable.", "vocab": [{"word": "vitamins", "definition": "Nutrients found in food that the body needs in small amounts to work properly."}, {"word": "minerals", "definition": "Natural substances found in food that help the body function, like iron and calcium."}, {"word": "beta-carotene", "definition": "A natural pigment in orange vegetables that the body turns into vitamin A."}, {"word": "fiber", "definition": "A nutrient in plant foods that aids digestion and keeps you feeling full."}, {"word": "digestive system", "definition": "The organs that break down food so the body can use it for energy."}, {"word": "immune system", "definition": "The body's defense system that fights off illness and infection."}], "questions": [{"question": "What do orange and yellow vegetables like carrots provide?", "options": ["A. Vitamin C and calcium", "B. Iron and fiber", "C. Beta-carotene which becomes vitamin A", "D. Lycopene for heart health"], "answer": 2, "explanation": "Orange and yellow vegetables are rich in beta-carotene, which the body converts to vitamin A, important for eyesight."}, {"question": "What does fiber do for the body?", "options": ["A. It builds strong bones", "B. It improves eyesight", "C. It helps food move through the digestive system and keeps you full", "D. It makes your skin glow"], "answer": 2, "explanation": "Fiber helps food move through the digestive system, keeps you feeling full longer, and feeds helpful gut bacteria."}, {"question": "What nutrient in red vegetables like tomatoes helps protect the heart?", "options": ["A. Beta-carotene", "B. Vitamin K", "C. Iron", "D. Lycopene"], "answer": 3, "explanation": "Red vegetables contain lycopene, which the passage says helps protect the heart."}, {"question": "What do nutrition experts recommend about meals?", "options": ["A. Only eat vegetables and no other foods", "B. Half of every meal should be fruits and vegetables", "C. Eat vegetables only at dinner", "D. Eat at least one serving of vegetables per week"], "answer": 1, "explanation": "Nutrition experts recommend that half of every meal should be fruits and vegetables."}, {"question": "Why does roasting vegetables make them more enjoyable?", "options": ["A. It makes them crunchier", "B. It removes bitter flavors", "C. It brings out their natural sweetness", "D. It adds extra vitamins"], "answer": 2, "explanation": "The passage says roasting brings out the natural sweetness in vegetables, making them more enjoyable."}]}, {"id": 18, "topic": "Sports", "emoji": "\u26bd", "title": "Soccer: The World's Most Popular Sport", "body": "Soccer \u2014 called football in most countries outside the United States \u2014 is the most popular sport on Earth. More than 4 billion people watch or play soccer worldwide. It is played in over 200 countries by more than 270 million players of all ages and backgrounds. The FIFA World Cup, held every four years, is the most-watched sporting event in the world.\n\nSoccer is a simple game with simple equipment \u2014 you only need a ball and a goal to play. Two teams of 11 players each try to kick, head, or chest the ball into the opponent's net. Only the goalkeeper is allowed to use their hands. A match lasts 90 minutes, divided into two 45-minute halves.\n\nThe sport traces its modern rules back to England in 1863, when the Football Association was established and wrote the first official rulebook. However, ball games similar to soccer were played thousands of years ago in China, Greece, and Mesoamerica.\n\nSoccer teaches teamwork, discipline, and resilience. Studies show that children who play team sports have better social skills and academic performance. Soccer is also excellent exercise \u2014 top players run an average of 7 miles per game! Its global reach makes soccer a unique language that connects people across cultures and countries.", "vocab": [{"word": "opponent", "definition": "A person or team that you compete against in a game or sport."}, {"word": "goalkeeper", "definition": "The player who guards the goal and is the only player allowed to use hands."}, {"word": "Football Association", "definition": "The organization established in England in 1863 that wrote the first official soccer rules."}, {"word": "Mesoamerica", "definition": "A historical region in Central America where ancient civilizations thrived."}, {"word": "resilience", "definition": "The ability to recover quickly from difficulties and keep going."}, {"word": "discipline", "definition": "Self-control and the ability to follow rules and train consistently."}], "questions": [{"question": "How many people watch or play soccer worldwide?", "options": ["A. More than 400 million", "B. More than 1 billion", "C. More than 4 billion", "D. More than 7 billion"], "answer": 2, "explanation": "The passage says more than 4 billion people watch or play soccer worldwide."}, {"question": "How long does a soccer match last?", "options": ["A. 60 minutes", "B. 80 minutes", "C. 90 minutes", "D. 120 minutes"], "answer": 2, "explanation": "A soccer match lasts 90 minutes, divided into two 45-minute halves."}, {"question": "When were modern soccer rules first written?", "options": ["A. In ancient China", "B. In 1763 in France", "C. In 1863 in England", "D. In 1900 in Brazil"], "answer": 2, "explanation": "The Football Association established the first official rulebook in England in 1863."}, {"question": "Who is the only player allowed to use hands in soccer?", "options": ["A. The team captain", "B. The goalkeeper", "C. Any player within their own half", "D. Any player during a throw-in"], "answer": 1, "explanation": "In soccer, only the goalkeeper is allowed to use their hands."}, {"question": "About how many miles do top soccer players run in a single game?", "options": ["A. About 2 miles", "B. About 4 miles", "C. About 7 miles", "D. About 12 miles"], "answer": 2, "explanation": "The passage says top soccer players run an average of 7 miles per game."}]}, {"id": 19, "topic": "World Cultures", "emoji": "\ud83c\udf0d", "title": "Japan: A Land of Contrasts", "body": "Japan is a country of fascinating contrasts \u2014 ancient traditions exist side by side with cutting-edge technology. This island nation in East Asia has a population of about 125 million people and consists of four main islands and thousands of smaller ones. Tokyo, Japan's capital, is one of the largest cities in the world.\n\nJapanese culture places great value on respect, harmony, and attention to detail. These values show up in everything from the formal tea ceremony \u2014 a ritualized way of preparing and serving tea \u2014 to the art of origami, the folding of paper into beautiful shapes. Even everyday manners reflect this cultural emphasis: it is polite to bow when greeting someone, and speaking quietly in public is considered respectful.\n\nJapan has given the world many gifts. Sushi, karate, anime, and manga are all Japanese in origin. Japan is also home to some of the world's greatest technological innovations, including bullet trains that travel at 200 miles per hour and some of the most advanced robots in the world.\n\nNature plays a huge role in Japanese culture. Cherry blossom season, called Hanami, is celebrated every spring when pink blossoms cover the trees. Families and friends gather to eat, talk, and appreciate the brief beauty of the flowers, which are seen as a symbol of the fleeting nature of life.", "vocab": [{"word": "contrasts", "definition": "Clear differences between two things when compared."}, {"word": "ritualized", "definition": "Done in a formal, carefully planned way with specific steps."}, {"word": "origami", "definition": "The Japanese art of folding paper into decorative shapes and figures."}, {"word": "innovation", "definition": "A new idea, method, or invention that improves something."}, {"word": "Hanami", "definition": "The Japanese tradition of enjoying cherry blossoms in spring."}, {"word": "fleeting", "definition": "Lasting for only a short time; passing quickly."}], "questions": [{"question": "What makes Japan a 'land of contrasts'?", "options": ["A. It has both mountains and beaches", "B. Ancient traditions exist alongside cutting-edge technology", "C. It has both very hot and very cold weather", "D. Some people are rich and some are poor"], "answer": 1, "explanation": "The passage says Japan is a land of contrasts because ancient traditions exist side by side with cutting-edge technology."}, {"question": "What does bowing in Japan show?", "options": ["A. That you are ready to fight", "B. That you are sad", "C. Respect when greeting someone", "D. That you are asking for help"], "answer": 2, "explanation": "The passage says it is polite to bow when greeting someone in Japan \u2014 it shows respect."}, {"question": "What is origami?", "options": ["A. Japanese cooking", "B. A Japanese martial art", "C. The Japanese art of paper folding", "D. A type of Japanese music"], "answer": 2, "explanation": "Origami is the Japanese art of folding paper into beautiful shapes."}, {"question": "How fast do Japanese bullet trains travel?", "options": ["A. About 100 miles per hour", "B. About 150 miles per hour", "C. About 200 miles per hour", "D. About 300 miles per hour"], "answer": 2, "explanation": "The passage says Japanese bullet trains travel at 200 miles per hour."}, {"question": "What do cherry blossoms symbolize in Japanese culture?", "options": ["A. Good luck and long life", "B. The fleeting nature of life", "C. The arrival of summer", "D. Friendship between families"], "answer": 1, "explanation": "Cherry blossoms are seen as a symbol of the fleeting (brief) nature of life."}]}, {"id": 20, "topic": "Art & Music", "emoji": "\ud83c\udfa8", "title": "How Music Affects the Brain", "body": "Music is one of the most powerful forces in human experience. When you hear your favorite song, your brain releases a chemical called dopamine \u2014 the same chemical released when you eat something delicious or achieve a goal. This is why music can make us feel so happy, energized, or emotional.\n\nResearchers have found that learning to play a musical instrument changes the structure of the brain. Musicians have larger and better-connected areas of the brain responsible for hearing, movement, and memory. Studies show that children who study music for several years do better in reading, mathematics, and other academic subjects.\n\nMusic also affects our emotions deeply. Slow, quiet music tends to calm us down and lower heart rate and blood pressure. Fast, energetic music can increase heart rate, boost energy, and improve athletic performance. Many athletes listen to music before competing to get into the right mental state.\n\nMusic is a universal human experience \u2014 every culture on Earth has developed some form of music. Scientists believe humans may have been making music for at least 40,000 years; ancient flutes made of bone have been discovered in Europe. Music helps people express feelings that words alone cannot capture, and it brings communities together across generations and cultures.", "vocab": [{"word": "dopamine", "definition": "A brain chemical that creates feelings of pleasure and reward."}, {"word": "structure", "definition": "The way something is built or organized."}, {"word": "academic", "definition": "Related to school subjects and learning."}, {"word": "blood pressure", "definition": "The force of blood pushing against the walls of blood vessels."}, {"word": "universal", "definition": "Shared by or relating to everyone, everywhere."}, {"word": "generations", "definition": "Groups of people born and living around the same time; also all the people born at a similar time."}], "questions": [{"question": "What brain chemical is released when you hear your favorite song?", "options": ["A. Adrenaline", "B. Serotonin", "C. Dopamine", "D. Cortisol"], "answer": 2, "explanation": "The passage says listening to music releases dopamine \u2014 the same chemical released when you eat something delicious or achieve a goal."}, {"question": "What effect does learning a musical instrument have on the brain?", "options": ["A. It only improves music-related brain areas", "B. It has no proven effect on the brain", "C. It enlarges and better-connects areas for hearing, movement, and memory", "D. It makes the brain smaller but more efficient"], "answer": 2, "explanation": "Musicians have larger and better-connected brain areas for hearing, movement, and memory \u2014 learning an instrument changes brain structure."}, {"question": "How does fast, energetic music affect the body?", "options": ["A. It lowers heart rate and calms you", "B. It increases heart rate and boosts energy", "C. It helps you fall asleep", "D. It has no physical effect"], "answer": 1, "explanation": "Fast, energetic music can increase heart rate, boost energy, and improve athletic performance."}, {"question": "How long have humans possibly been making music?", "options": ["A. About 5,000 years", "B. About 10,000 years", "C. About 40,000 years", "D. About 100,000 years"], "answer": 2, "explanation": "Scientists believe humans may have been making music for at least 40,000 years \u2014 ancient bone flutes have been discovered in Europe."}, {"question": "Which statement about music is true according to the passage?", "options": ["A. Only certain cultures have developed music", "B. Music only affects emotions, not the body", "C. Music is a universal human experience found in every culture", "D. Only professional musicians benefit from music"], "answer": 2, "explanation": "The passage says music is a universal human experience \u2014 every culture on Earth has developed some form of music."}]}, {"id": 21, "topic": "Animals", "emoji": "\ud83d\udc3a", "title": "Wolves: The Pack Hunters", "body": "Wolves are one of the most social and intelligent wild animals on Earth. They live in family groups called packs, which usually have 6 to 10 members. Each pack is led by an alpha pair \u2014 the dominant male and female who are usually the parents of the other wolves. Every wolf in the pack has a specific role and knows its place in the social order.\n\nWolves are remarkable hunters. They work together to chase and tire out large prey like elk, deer, and bison. A wolf can travel up to 30 miles in a single day while hunting. Their stamina \u2014 the ability to keep going for long periods \u2014 is more important than their speed. Wolves can run at 35 miles per hour but usually pursue prey at a steady trot.\n\nWolves communicate through howling, growling, whimpering, and body language. Howling allows wolves to communicate over long distances, announce their location to the pack, and warn rival packs to stay away. A wolf's howl can be heard up to 10 miles away.\n\nWolves play a vital role in their ecosystems. When wolves were reintroduced to Yellowstone National Park in 1995 after being absent for 70 years, they changed the entire ecosystem. By hunting deer and elk, they prevented overgrazing, which allowed plants and trees to grow back, which in turn brought back birds, beavers, and even changed the course of rivers. Scientists call this a trophic cascade.", "vocab": [{"word": "pack", "definition": "A group of wolves that live and hunt together."}, {"word": "alpha", "definition": "The dominant leader of a wolf pack."}, {"word": "stamina", "definition": "The ability to keep doing something physically demanding for a long time."}, {"word": "rival", "definition": "A competing group or individual."}, {"word": "reintroduced", "definition": "Brought back to an area where a species previously lived."}, {"word": "trophic cascade", "definition": "A chain of effects in an ecosystem caused by adding or removing a predator."}], "questions": [{"question": "What is an alpha pair in a wolf pack?", "options": ["A. The two fastest wolves", "B. The two oldest wolves", "C. The dominant male and female leaders", "D. The two largest wolves"], "answer": 2, "explanation": "The alpha pair is the dominant male and female that lead the pack \u2014 they are usually the parents of the other wolves."}, {"question": "How far can a wolf travel in a single day while hunting?", "options": ["A. Up to 10 miles", "B. Up to 30 miles", "C. Up to 50 miles", "D. Up to 100 miles"], "answer": 1, "explanation": "A wolf can travel up to 30 miles in a single day while hunting."}, {"question": "Why is a wolf's stamina more important than its speed?", "options": ["A. Wolves can't run very fast", "B. Prey animals are faster than wolves", "C. Wolves chase and tire out prey over long distances rather than sprinting", "D. Speed uses too much energy"], "answer": 2, "explanation": "Wolves pursue prey at a steady trot over long distances to tire them out \u2014 stamina matters more than top speed."}, {"question": "What happened when wolves were reintroduced to Yellowstone in 1995?", "options": ["A. They ate too many animals and caused damage", "B. They had no effect on the ecosystem", "C. They changed the entire ecosystem through a trophic cascade", "D. They quickly died out again"], "answer": 2, "explanation": "The wolves changed the entire ecosystem \u2014 by controlling deer and elk, they allowed plants to grow back, which brought back birds, beavers, and even changed rivers."}, {"question": "How far can a wolf's howl be heard?", "options": ["A. Up to 1 mile", "B. Up to 5 miles", "C. Up to 10 miles", "D. Up to 20 miles"], "answer": 2, "explanation": "A wolf's howl can be heard up to 10 miles away."}]}, {"id": 22, "topic": "Animals", "emoji": "\ud83d\udc38", "title": "Frogs: Masters of Adaptation", "body": "The Frogs: Masters of Adaptation is one of the most fascinating creatures in the animal kingdom. Found in diverse habitats around the world, these remarkable animals have developed extraordinary adaptations that allow them to thrive in their environments.\n\nScientists who study these animals have discovered amazing behaviors. They use sophisticated communication methods, work in cooperative groups, and show problem-solving abilities that continue to surprise researchers. Their social structures are complex and carefully organized.\n\nLike many animals today, Frogs: Masters of Adaptation face challenges from habitat loss and climate change. Conservation efforts around the world are working to protect these species and their natural habitats for future generations.\n\nLearning about these incredible creatures reminds us of the incredible diversity of life on Earth. Every species plays an important role in its ecosystem, and protecting them means protecting the natural world we all share.", "vocab": [{"word": "adaptation", "definition": "A feature that helps a living thing survive in its environment."}, {"word": "habitat", "definition": "The natural place where an animal lives."}, {"word": "predator", "definition": "An animal that hunts and eats other animals."}, {"wo
