频声音。"}, {"word": "迁徙", "definition": "动物随季节从一个地方移动到另一个地方。"}, {"word": "哀悼", "definition": "因某人去世而感到深深的悲痛。"}, {"word": "改造环境", "definition": "通过自身活动改变周围的环境。"}], "questions": [{"question": "象鼻有多少块肌肉？", "options": ["A. 超过400块", "B. 超过4000块", "C. 超过4万块", "D. 超过40万块"], "answer": 2, "explanation": "文章说象鼻有超过4万块肌肉。"}, {"question": "谁领导象群？", "options": ["A. 最年轻的雄象", "B. 最年长的雌象", "C. 体型最大的大象", "D. 速度最快的大象"], "answer": 1, "explanation": "大象由最年长的雌象（象群女家长）领导。"}, {"question": "什么是次声？", "options": ["A. 响亮的号叫声", "B. 只有幼象发出的声音", "C. 人类听不到的极低频声音", "D. 大象脚步声"], "answer": 2, "explanation": "次声是人类听不到的极低频声音，能通过地面传播。"}, {"question": "以下哪项说明大象有感情？", "options": ["A. 它们跑得很快", "B. 它们会哀悼死者并互相安慰", "C. 它们有大耳朵", "D. 它们吃很多食物"], "answer": 1, "explanation": "大象会哀悼死者、愉快玩耍、互相安慰，这些都是有感情的表现。"}, {"question": "大象为什么对生态系统很重要？", "options": ["A. 它们吓走捕食者", "B. 它们推倒树木和挖掘水坑，让其他动物受益", "C. 它们传播种子", "D. 它们开辟道路"], "answer": 1, "explanation": "大象通过推倒树木和挖掘水坑改造环境，让其他动物受益。"}]}, {"id": 3, "topic": "动物", "emoji": "🐬", "title": "海豚：海洋中的天才", "body": "海豚是世界上最聪明的动物之一。它们生活在海洋和一些河流中，属于鲸目动物，和鲸鱼是同一个家族。海豚通过头顶的喷水孔呼吸空气，所以必须定期浮出水面换气。\n\n海豚具有高度的社会性，生活在称为海豚群的群体中。它们合作捕鱼，经常将鱼群赶成密集的球形，然后轮流进食。它们还喜欢一起玩耍，乘浪而行，跃出水面。\n\n海豚最令人印象深刻的能力之一是回声定位。海豚发出咔哒声，声波在水中传播并从物体上反弹回来。通过聆听回声，它们可以判断物体的大小、形状和距离，即使在浑浊的水中也能做到。\n\n海豚用口哨声和咔哒声相互沟通。研究人员发现，每只海豚都有独特的签名口哨声，就像名字一样。这种沟通水平在动物界极为罕见，体现了海豚非凡的智慧。", "vocab": [{"word": "喷水孔", "definition": "海豚或鲸鱼头顶用来呼吸的鼻孔。"}, {"word": "回声定位", "definition": "利用声音的回声来确定物体位置的方法。"}, {"word": "浑浊", "definition": "暗沉混浊，难以看清。"}, {"word": "签名口哨声", "definition": "每只海豚独有的像名字一样的口哨声。"}, {"word": "合作", "definition": "为了共同目标而一起努力工作。"}, {"word": "鲸目", "definition": "包括海豚和鲸鱼在内的海洋哺乳动物群体。"}], "questions": [{"question": "海豚如何呼吸？", "options": ["A. 像鱼一样用鳃", "B. 只用嘴巴", "C. 通过头顶的喷水孔", "D. 通过皮肤"], "answer": 2, "explanation": "海豚通过头顶的喷水孔呼吸空气，必须定期浮出水面。"}, {"question": "什么是回声定位？", "options": ["A. 海豚特有的舞蹈", "B. 海豚的睡眠方式", "C. 利用声音回声定位物体", "D. 一种海豚的叫声"], "answer": 2, "explanation": "回声定位是发出声音并通过听回声来判断物体的大小、形状和距离。"}, {"question": "海豚如何合作捕鱼？", "options": ["A. 把鱼赶到岸边", "B. 潜入深海", "C. 将鱼群聚拢成球形后轮流进食", "D. 用回声定位让鱼停止移动"], "answer": 2, "explanation": "海豚合作将鱼群赶成密集的球形，然后轮流进食。"}, {"question": "什么是签名口哨声？", "options": ["A. 一种警报声", "B. 每只海豚独有的像名字一样的口哨声", "C. 求偶时发出的声音", "D. 只用于捕猎的声音"], "answer": 1, "explanation": "每只海豚都有独特的签名口哨声，其他海豚用来呼唤它，就像名字一样。"}, {"question": "这篇文章的主要主题是什么？", "options": ["A. 海豚是危险动物", "B. 海豚非常聪明且有独特能力", "C. 海豚只生活在海洋中", "D. 海豚和鱼类非常相似"], "answer": 1, "explanation": "文章的主要主题是介绍海豚非凡的智慧和独特的能力，如回声定位和签名口哨声。"}]}, {"id": 4, "topic": "动物", "emoji": "🦋", "title": "帝王蝴蝶的神奇旅程", "body": "每年，数百万只帝王蝴蝶都会进行动物界最令人惊叹的旅程之一。这些橙黑相间的精巧昆虫从加拿大和美国出发，飞行约4800公里，前往它们在墨西哥山区的越冬地。整个旅程大约需要两个月。\n\n让这次迁徙真正令人惊叹的是，没有任何一只蝴蝶能完成整个来回旅程。春天离开墨西哥的蝴蝶，是秋天返回时那些蝴蝶的曾曾祖父母。然而，每一代蝴蝶都能找到回到墨西哥同一片小树林的路。\n\n科学家认为帝王蝴蝶把太阳当作指南针来导航。它们还能感应地球磁场，帮助自己保持正确方向。在迁徙前，帝王蝴蝶大量进食马利筋植物，储备足够的脂肪用于漫长的旅程。\n\n近几十年来，帝王蝴蝶的数量急剧减少。农药摧毁了马利筋，而马利筋是帝王蝴蝶毛毛虫唯一能吃的植物。在花园里种植马利筋、减少使用农药，是帮助保护这种神奇蝴蝶的简单方法。", "vocab": [{"word": "迁徙", "definition": "动物随季节进行的长途旅行。"}, {"word": "导航", "definition": "从一个地方找路到另一个地方。"}, {"word": "磁场", "definition": "地球周围看不见的力场，指南针能感应到它。"}, {"word": "农药", "definition": "用来杀死农作物害虫的化学物质。"}, {"word": "马利筋", "definition": "帝王蝴蝶毛毛虫唯一能吃的植物。"}, {"word": "储备", "definition": "储存起来备用的供给。"}], "questions": [{"question": "帝王蝴蝶迁徙的距离大约是多少？", "options": ["A. 约500公里", "B. 约1600公里", "C. 约4800公里", "D. 约8000公里"], "answer": 2, "explanation": "文章说帝王蝴蝶飞行约4800公里到墨西哥。"}, {"question": "帝王蝴蝶迁徙有什么令人惊叹之处？", "options": ["A. 它们只在夜间飞行", "B. 没有任何一只蝴蝶能完成整个来回旅程", "C. 它们聚集成一个巨大的群体飞行", "D. 它们比其他昆虫飞得更快"], "answer": 1, "explanation": "没有任何一只蝴蝶能完成来回旅程，返回的蝴蝶是离开的蝴蝶的曾曾孙辈。"}, {"question": "帝王蝴蝶如何在迁徙中找到方向？", "options": ["A. 沿河流飞行", "B. 跟随年长的蝴蝶", "C. 利用太阳和地球磁场", "D. 通过气味找到墨西哥"], "answer": 2, "explanation": "科学家认为帝王蝴蝶把太阳当指南针，并能感应地球磁场来导航。"}, {"question": "导致帝王蝴蝶数量减少的主要原因是什么？", "options": ["A. 仅气候变化", "B. 迁徙途中被天敌吃掉", "C. 农药摧毁了马利筋", "D. 墨西哥的森林消失"], "answer": 2, "explanation": "农药摧毁了马利筋，这是帝王蝴蝶数量减少的主要原因。"}, {"question": "人们如何帮助保护帝王蝴蝶？", "options": ["A. 捕捉蝴蝶并保护它们", "B. 在花园种马利筋、减少使用农药", "C. 阻止蝴蝶迁徙", "D. 建造蝴蝶房子"], "answer": 1, "explanation": "文章说在花园里种植马利筋、减少使用农药，是帮助保护帝王蝴蝶的简单方法。"}]}, {"id": 5, "topic": "动物", "emoji": "🐧", "title": "企鹅：不会飞的鸟类", "body": "企鹅是鸟类，但与大多数鸟类不同，它们不会飞。它们的翅膀进化成了鳍肢，使它们成为游泳高手。企鹅游泳速度可达每小时25公里，能潜入550多米深的水下。\n\n企鹅共有18种，全部生活在南半球。最大的是帝企鹅，身高可达1.2米。帝企鹅通过聚在一起取暖来度过严酷的南极冬季。它们轮流移动到人群中心更温暖的位置，共享体温。\n\n企鹅是尽职尽责的父母。帝企鹅的父亲将蛋平衡放在脚背上，用腹部温暖的育雏囊覆盖。在零下几十度的严寒中，它们不吃东西坚持65天，直到蛋孵化。这种奉献精神令人敬佩。\n\n大多数企鹅终身伴侣。它们能在数千只企鹅中通过独特的叫声认出自己的伴侣和幼雏。当一只企鹅从海里回来时，它发出呼唤声，家人就会回应，在嘈杂的栖息地中，这是感人的画面。", "vocab": [{"word": "鳍肢", "definition": "像桨一样的扁平肢体，用于游泳。"}, {"word": "进化", "definition": "经过许多代的缓慢变化，更好地适应环境。"}, {"word": "南半球", "definition": "地球赤道以南的半个地球。"}, {"word": "聚集取暖", "definition": "紧密地聚集在一起取暖或保护。"}, {"word": "育雏囊", "definition": "用来保持蛋温暖的皮肤褶皱。"}, {"word": "奉献", "definition": "为了他人或目标而付出自己的时间和精力。"}], "questions": [{"question": "企鹅为什么不会飞？", "options": ["A. 翅膀太小", "B. 翅膀进化成了游泳用的鳍肢", "C. 身体太重", "D. 它们从来没学过飞行"], "answer": 1, "explanation": "企鹅的翅膀进化成了鳍肢，使它们成为出色的游泳者。"}, {"question": "帝企鹅如何度过南极冬季？", "options": ["A. 迁往北方", "B. 在地下冬眠", "C. 聚集在一起共享体温", "D. 长出更厚的羽毛"], "answer": 2, "explanation": "帝企鹅聚集成大群，轮流移动到中心更温暖的位置共享体温。"}, {"question": "帝企鹅父亲孵蛋多少天不吃东西？", "options": ["A. 约20天", "B. 约40天", "C. 约65天", "D. 约90天"], "answer": 2, "explanation": "文章说帝企鹅父亲在严寒中不吃东西坚持约65天，直到蛋孵化。"}, {"question": "企鹅如何在大群中认出自己的家人？", "options": ["A. 通过外貌", "B. 通过气味", "C. 通过独特的叫声", "D. 通过鳍肢的颜色"], "answer": 2, "explanation": "企鹅通过独特的叫声在数千只同类中认出自己的伴侣和幼雏。"}, {"question": "大多数企鹅的伴侣关系如何？", "options": ["A. 每年换一个伴侣", "B. 终身伴侣", "C. 雄性有多个伴侣", "D. 企鹅没有固定伴侣"], "answer": 1, "explanation": "文章说大多数企鹅终身伴侣。"}]}, {"id": 6, "topic": "太空", "emoji": "🚀", "title": "我们的太阳系", "body": "我们的太阳系是一个庞大的天体集合，所有天体都围绕着一颗叫做太阳的恒星运转。太阳包含了太阳系中99.8%的质量，它大到可以容纳约100万个地球！太阳的引力将太阳系中的一切都保持在原位。\n\n太阳系有八大行星。距太阳最近的四颗是水星、金星、地球和火星，称为类地行星，因为它们都有岩石表面。外侧的四颗行星是木星、土星、天王星和海王星，称为气态巨行星，它们体积巨大，主要由气体和液体构成。\n\n在火星和木星之间有一个小行星带，那里有数百万颗称为小行星的岩石。在海王星轨道之外有一个称为柯伊伯带的区域，那里住着冥王星等矮行星和数百万颗冰质天体。\n\n地球是太阳系中唯一已知存在生命的行星。它有适宜的温度、液态水和含有氧气的大气层。科学家们正在其他行星和卫星上寻找微生物的迹象，那些不借助显微镜就看不到的微小生命。", "vocab": [{"word": "公转", "definition": "沿曲线路径围绕某物运动，如行星围绕太阳运动。"}, {"word": "类地行星", "definition": "有岩石表面的行星，如地球。"}, {"word": "小行星", "definition": "围绕太阳运行的岩石体，比行星小。"}, {"word": "矮行星", "definition": "围绕太阳运行的圆形天体，比普通行星小。"}, {"word": "大气层", "definition": "围绕行星的气体层。"}, {"word": "微生物", "definition": "非常微小的生命体，需要显微镜才能看到。"}], "questions": [{"question": "太阳包含太阳系多少的质量？", "options": ["A. 50%", "B. 75%", "C. 90%", "D. 99.8%"], "answer": 3, "explanation": "文章说太阳包含太阳系中99.8%的质量。"}, {"question": "什么是类地行星？", "options": ["A. 由气体构成的行星", "B. 有岩石表面的行星", "C. 有光环的行星", "D. 有很多卫星的行星"], "answer": 1, "explanation": "类地行星有岩石表面，它们是水星、金星、地球和火星。"}, {"question": "小行星带在哪里？", "options": ["A. 地球和火星之间", "B. 火星和木星之间", "C. 木星和土星之间", "D. 海王星之外"], "answer": 1, "explanation": "小行星带位于火星和木星之间。"}, {"question": "地球在太阳系中有什么独特之处？", "options": ["A. 它是最大的行星", "B. 它有最多的卫星", "C. 它是唯一已知存在生命的行星", "D. 它离太阳最近"], "answer": 2, "explanation": "地球是太阳系中唯一已知存在生命的行星。"}, {"question": "以下哪颗是气态巨行星？", "options": ["A. 火星", "B. 金星", "C. 木星", "D. 水星"], "answer": 2, "explanation": "木星是外侧的气态巨行星之一，体积巨大，主要由气体和液体构成。"}]}, {"id": 7, "topic": "太空", "emoji": "🌙", "title": "月球：地球的伙伴", "body": "月球是地球唯一的天然卫星，平均距离地球约38.4万公里。它的大小约为地球的四分之一。月球没有大气层、没有风、没有液态水，是一个与地球截然不同的世界。\n\n月球表面布满了陨石坑，这些是数十亿年前陨石撞击形成的。因为没有风和雨来侵蚀，这些陨石坑得到了完美的保存。月球上还有宽阔的平原，称为月海，古代天文学家曾误以为它们是真正的海洋。\n\n月球对地球有重要影响。它的引力导致了海洋潮汐。月球还稳定了地球的倾斜角度，使地球的气候保持相对稳定。没有月球，地球的季节和气候可能会变得极度不稳定。\n\n1969年7月20日，宇航员阿姆斯特朗和奥尔德林在阿波罗11号任务中成为首批登上月球的人类。阿姆斯特朗说出了名言：这是我个人的一小步，却是人类的一大步。1969年至1972年间，共有12名宇航员在月球上行走。", "vocab": [{"word": "卫星", "definition": "围绕行星运行的天体，月球是地球的天然卫星。"}, {"word": "陨石坑", "definition": "行星或卫星表面被陨石撞击后形成的碗状凹坑。"}, {"word": "陨石", "definition": "从太空撞击行星或卫星表面的岩石。"}, {"word": "侵蚀", "definition": "被风、水或其他力量缓慢磨损。"}, {"word": "引力", "definition": "将物体相互吸引的重力。"}, {"word": "潮汐", "definition": "由月球引力引起的海水定期涨落现象。"}], "questions": [{"question": "月球与地球的平均距离是多少？", "options": ["A. 约3.84万公里", "B. 约38.4万公里", "C. 约384万公里", "D. 约1.5亿公里"], "answer": 1, "explanation": "文章说月球平均距离地球约38.4万公里。"}, {"question": "为什么月球上的陨石坑保存完好？", "options": ["A. 月球非常寒冷", "B. 冰层保护了陨石坑", "C. 没有风和雨来侵蚀", "D. 新岩石填补了陨石坑"], "answer": 2, "explanation": "因为月球没有风和雨，没有东西侵蚀陨石坑，所以它们保存完好。"}, {"question": "月球对地球有什么重要影响？", "options": ["A. 它创造了地球的天气", "B. 它反射阳光使地球温暖", "C. 它的引力导致潮汐并稳定地球倾斜角度", "D. 它保护地球不受小行星撞击"], "answer": 2, "explanation": "月球的引力导致海洋潮汐，并稳定地球的倾斜角度，使气候保持稳定。"}, {"question": "人类首次登上月球是哪一年？", "options": ["A. 1959年", "B. 1969年", "C. 1979年", "D. 1989年"], "answer": 1, "explanation": "阿波罗11号在1969年7月20日登上月球。"}, {"question": "一共有多少名宇航员在月球上行走？", "options": ["A. 2名", "B. 6名", "C. 12名", "D. 24名"], "answer": 2, "explanation": "文章说1969年至1972年间，共有12名宇航员在月球上行走。"}]}, {"id": 8, "topic": "太空", "emoji": "⭐", "title": "恒星：宇宙中的火球", "body": "当你抬头仰望夜空，看到成千上万闪闪发光的光点，那些就是恒星！恒星是巨大的热气球，主要由氢气和氦气组成。它们通过核聚变的过程产生能量，在这个过程中氢原子结合形成氦，释放出大量的光和热。\n\n我们的太阳就是一颗恒星，一颗中等大小、中年龄的恒星，大约已经有46亿年的历史。与其他恒星相比，太阳相当普通。有些恒星非常大，被称为超巨星，比太阳大数千倍。另一些恒星非常小而暗淡，称为红矮星，是银河系中最常见的恒星类型。\n\n恒星有生命周期，就像生命体一样。恒星诞生于称为星云的气体和尘埃云中。经过数十亿年后，当恒星耗尽氢燃料时，它会发生剧烈变化。像太阳这样的恒星会膨胀成红巨星，然后收缩成白矮星。\n\n较大的恒星以壮观的爆炸结束生命，称为超新星。超新星爆发后，残余物可能会变成中子星，甚至变成黑洞，一种密度极大、连光都无法逃脱其引力的天体。", "vocab": [{"word": "核聚变", "definition": "原子结合释放大量能量的过程。"}, {"word": "超巨星", "definition": "极大极亮的恒星，比太阳大得多。"}, {"word": "红矮星", "definition": "小而暗淡的恒星，是银河系中最常见的类型。"}, {"word": "星云", "definition": "宇宙中孕育恒星的气体和尘埃云。"}, {"word": "超新星", "definition": "大型恒星死亡时发生的巨大爆炸。"}, {"word": "黑洞", "definition": "密度极大、连光都无法逃脱的宇宙天体。"}], "questions": [{"question": "恒星由什么构成？", "options": ["A. 岩石和冰", "B. 主要由氢气和氦气组成的热气", "C. 燃烧的木头和氧气", "D. 液态火焰和金属"], "answer": 1, "explanation": "恒星是巨大的热气球，主要由氢气和氦气组成。"}, {"question": "恒星用什么方式产生能量？", "options": ["A. 燃烧氧气", "B. 化学反应", "C. 核聚变", "D. 太阳辐射"], "answer": 2, "explanation": "恒星通过核聚变产生能量，氢原子结合形成氦，释放出光和热。"}, {"question": "银河系中最常见的恒星类型是什么？", "options": ["A. 超巨星", "B. 像太阳这样的恒星", "C. 白矮星", "D. 红矮星"], "answer": 3, "explanation": "文章说红矮星是银河系中最常见的恒星类型。"}, {"question": "恒星在哪里诞生？", "options": ["A. 在黑洞内部", "B. 在称为星云的气体和尘埃云中", "C. 靠近星系中心", "D. 只从超新星爆炸中诞生"], "answer": 1, "explanation": "恒星诞生于称为星云的气体和尘埃云中。"}, {"question": "大型恒星死亡后可能变成什么？", "options": ["A. 新的行星", "B. 红巨星", "C. 中子星或黑洞", "D. 新的太阳系"], "answer": 2, "explanation": "超新星爆发后残余物可能变成中子星或黑洞。"}]}, {"id": 9, "topic": "自然", "emoji": "🌿", "title": "树木的神奇世界", "body": "树木是地球上最大的生命体，对地球上的所有生命都至关重要。通过光合作用，树木从空气中吸收二氧化碳并释放氧气，也就是我们呼吸的空气。一棵成熟的大树每年可以吸收约22公斤的二氧化碳，并为两个人提供足够的氧气。\n\n树木通过连接根部的地下真菌网络相互沟通，这有时被称为森林互联网。通过这个网络，树木共享营养物质和水分。母树是森林中最大最老的树，会向在阴暗处生长、阳光不足的幼苗输送额外的营养。\n\n有些树木的寿命极长。加利福尼亚州一棵名为玛士撒拉的刺果松已经约4850年了，这是世界上已知最古老的树木。犹他州一片称为潘多的颤杨林，估计已有8万年历史！\n\n森林覆盖地球陆地面积的约31%，是约80%的陆地动物的家园。它们调节气候、防止土壤侵蚀、净化水源。保护森林是人类对抗气候变化最重要的事情之一。", "vocab": [{"word": "光合作用", "definition": "植物利用阳光、水和二氧化碳制造食物并释放氧气的过程。"}, {"word": "真菌", "definition": "蘑菇、霉菌等分解死亡物质的生物。"}, {"word": "营养物质", "definition": "生物维持生长和健康所需的物质。"}, {"word": "幼苗", "definition": "刚从种子发芽的幼小植物。"}, {"word": "母树", "definition": "森林中最大最老的树，会向幼苗输送营养。"}, {"word": "侵蚀", "definition": "土壤或岩石被风、水或其他力量缓慢磨损的过程。"}], "questions": [{"question": "一棵成熟的大树每年能吸收多少二氧化碳？", "options": ["A. 约2.2公斤", "B. 约22公斤", "C. 约220公斤", "D. 约2200公斤"], "answer": 1, "explanation": "文章说一棵成熟的大树每年可以吸收约22公斤的二氧化碳。"}, {"question": "什么是森林互联网？", "options": ["A. 一种树木疾病", "B. 追踪森林的互联网系统", "C. 连接树木根部的地下真菌网络", "D. 帮助树木的森林动物网络"], "answer": 2, "explanation": "森林互联网指的是连接树木根部的地下真菌网络，树木通过它共享营养和水分。"}, {"question": "母树的作用是什么？", "options": ["A. 产生最多的种子", "B. 向在阴暗处生长的幼苗输送额外营养", "C. 是森林中最高的树", "D. 保护其他树木免受病害"], "answer": 1, "explanation": "母树是最大最老的树，会向阳光不足的幼苗输送额外营养。"}, {"question": "大约多少比例的地球陆地动物生活在森林中？", "options": ["A. 约31%", "B. 约50%", "C. 约80%", "D. 约95%"], "answer": 2, "explanation": "文章说森林是约80%的地球陆地动物的家园。"}, {"question": "颤杨林潘多估计有多少年历史？", "options": ["A. 约4850年", "B. 约1万年", "C. 约5万年", "D. 约8万年"], "answer": 3, "explanation": "文章说犹他州的潘多颤杨林估计已有8万年历史。"}]}, {"id": 10, "topic": "自然", "emoji": "🌋", "title": "火山：地球的火山", "body": "火山是地壳上的开口，炽热的熔岩可以从这里喷出。地下的熔融岩石称为岩浆，到达地表后就称为熔岩。每块大陆都有火山，甚至在海底也有。地球上目前大约有1500座活跃或潜在活跃的火山。\n\n火山在板块相互碰撞或分离的地方形成。太平洋周围有一个称为火环的区域，世界上约75%的火山分布在这里。日本、印度尼西亚和智利等国家都坐落在这个火山环上。\n\n并非所有火山喷发都相同。有些火山缓慢喷发，熔岩稳定地向下流动。另一些则剧烈爆炸，将灰烬、岩石和气体喷射到几公里高的空中。1980年华盛顿州圣海伦斯火山的喷发炸飞了整个山坡，并将火山灰扩散到11个州。\n\n尽管具有破坏力，火山也有创造力。火山岩风化后会变成极其肥沃的土壤，这就是为什么几千年来人们一直在火山附近耕种。夏威夷群岛完全由火山活动形成。", "vocab": [{"word": "岩浆", "definition": "地球表面以下发现的高温熔融岩石。"}, {"word": "熔岩", "definition": "通过火山到达地球表面的岩浆。"}, {"word": "板块", "definition": "地球外壳的大型移动板块。"}, {"word": "火环", "definition": "以众多火山和地震闻名的太平洋周围地区。"}, {"word": "喷发", "definition": "火山突然释放熔岩、灰烬和气体。"}, {"word": "肥沃", "definition": "富含营养、能够支持植物生长的土壤。"}], "questions": [{"question": "什么是熔岩？", "options": ["A. 火山释放的热气", "B. 从天空落下的火山灰", "C. 到达地球表面的岩浆", "D. 火山顶部的火山口"], "answer": 2, "explanation": "岩浆到达地表后就称为熔岩。"}, {"question": "火环在哪里？", "options": ["A. 大西洋周围", "B. 太平洋周围", "C. 非洲中部", "D. 赤道附近"], "answer": 1, "explanation": "火环是太平洋周围的区域，世界上约75%的火山分布在这里。"}, {"question": "为什么人们在火山附近耕种？", "options": ["A. 热量帮助农作物生长更快", "B. 火山岩风化后变成非常肥沃的土壤", "C. 火山附近害虫更少", "D. 火山区总是有充足的水源"], "answer": 1, "explanation": "火山岩风化后会变成极其肥沃的土壤，非常适合农业。"}, {"question": "夏威夷群岛是如何形成的？", "options": ["A. 板块碰撞", "B. 火山活动", "C. 珊瑚礁生长", "D. 冰川侵蚀"], "answer": 1, "explanation": "夏威夷群岛完全由火山活动形成。"}, {"question": "圣海伦斯火山喷发时发生了什么？", "options": ["A. 它形成了一座新岛", "B. 它只融化了附近的冰川", "C. 它炸飞了整个山坡，火山灰扩散到11个州", "D. 它在太平洋引起了海啸"], "answer": 2, "explanation": "1980年的喷发炸飞了整个山坡，将火山灰扩散到11个州。"}]}, {"id": 11, "topic": "历史", "emoji": "🏛️", "title": "古埃及：法老的国度", "body": "古埃及是世界上最伟大的文明之一，延续了3000多年。它沿着非洲东北部的尼罗河兴起。每年，尼罗河都会泛滥，在岸边沉积肥沃的黑色土壤，让农民能在沙漠中心种出丰收的庄稼。这个可靠的洪水周期是埃及社会的基础。\n\n古埃及社会的最高统治者是法老，被认为是活神的国王。法老拥有绝对权力，负责维护称为玛阿特的秩序。法老死后，埃及人相信他们会前往来世。为了保护法老的遗体，他们使用了复杂的木乃伊制作过程，去除器官并用特殊盐分干燥来保存遗体。\n\n古埃及人是卓越的工程师。为法老胡夫建造的吉萨大金字塔约于公元前2560年完工，由230万块石头砌成，有些重达80吨。工人如何在没有现代机械的情况下搬运这些石块，至今仍是历史谜题。\n\n埃及人还发展出最早的文字系统之一，称为象形文字。他们在纸莎草上书写，纸莎草是用芦苇制作的类似纸张的材料。古埃及在数学、医学和建筑方面的贡献影响了许多后来的文明。", "vocab": [{"word": "文明", "definition": "有城市、法律、艺术和文字的复杂人类社会。"}, {"word": "法老", "definition": "古埃及的统治者，被认为是活神。"}, {"word": "木乃伊", "definition": "用特殊方法保存下来的古埃及遗体。"}, {"word": "来世", "definition": "人们相信死后继续存在的生命。"}, {"word": "象形文字", "definition": "古埃及使用图形符号的文字系统。"}, {"word": "纸莎草", "definition": "古埃及人用芦苇制作的类似纸张的书写材料。"}], "questions": [{"question": "为什么尼罗河每年泛滥对古埃及很重要？", "options": ["A. 它为埃及人提供鱼类食物", "B. 它在沙漠中沉积肥沃土壤用于农业", "C. 它防止敌人渡河", "D. 它填满了灌溉运河"], "answer": 1, "explanation": "尼罗河的洪水沉积了肥沃的黑色土壤，让农民能在沙漠中种植庄稼。"}, {"question": "古埃及人如何保存法老的遗体？", "options": ["A. 将遗体放在冰中", "B. 通过木乃伊制作过程", "C. 用黄金包裹", "D. 将遗体放在海水中"], "answer": 1, "explanation": "埃及人使用木乃伊制作过程，去除器官并用特殊盐分干燥来保存遗体。"}, {"question": "吉萨大金字塔由多少块石头砌成？", "options": ["A. 约23万块", "B. 约230万块", "C. 约2300万块", "D. 约2.3亿块"], "answer": 1, "explanation": "吉萨大金字塔由230万块石头砌成。"}, {"question": "什么是象形文字？", "options": ["A. 古埃及的硬币", "B. 金字塔墙壁的装饰", "C. 古埃及使用图形符号的文字系统", "D. 一种古埃及数学"], "answer": 2, "explanation": "象形文字是古埃及使用图形符号的文字系统。"}, {"question": "纸莎草用来做什么？", "options": ["A. 建造金字塔", "B. 制作衣物", "C. 书写，像纸张一样", "D. 包裹木乃伊"], "answer": 2, "explanation": "纸莎草是埃及人用来书写的类似纸张的材料。"}]}, {"id": 12, "topic": "科学", "emoji": "🔬", "title": "细胞：生命的基本单位", "body": "如果你能把身体缩小到极小，你会发现自己被数万亿个微小的积木包围着，这些就是细胞！细胞是所有生命体的基本单位。你的身体由约37万亿个细胞组成，每个细胞都在执行特定的工作，让你保持健康和活跃。\n\n细胞有许多不同的类型，每种都有特殊的功能。血液中的红细胞负责将氧气运送到全身。神经细胞传输大脑的信号。肌肉细胞使你能够移动和运动。皮肤细胞形成保护你身体的屏障。\n\n大多数细胞都有一个称为细胞核的控制中心，里面含有DNA，也就是你身体的建造指令。DNA就像一本包含约20000个基因的详细手册，这些基因决定了你的眼睛颜色、头发类型和许多其他特征。\n\n细胞不断地分裂和更新。皮肤细胞大约每两周更换一次。红细胞的寿命约为120天。有些细胞，如神经细胞，可以存活一生。当细胞分裂出错时，就可能导致疾病，如癌症。这就是为什么科学家们非常认真地研究细胞如何工作。", "vocab": [{"word": "细胞", "definition": "所有生命体的基本单位，执行特定功能。"}, {"word": "细胞核", "definition": "细胞的控制中心，含有DNA遗传信息。"}, {"word": "DNA", "definition": "细胞中包含生物建造和功能指令的分子。"}, {"word": "基因", "definition": "DNA中的片段，决定生物的遗传特征。"}, {"word": "分裂", "definition": "一个细胞分成两个相同的细胞的过程。"}, {"word": "癌症", "definition": "细胞异常分裂失控引起的疾病。"}], "questions": [{"question": "人体大约由多少个细胞组成？", "options": ["A. 约370万个", "B. 约37亿个", "C. 约37万亿个", "D. 约370万亿个"], "answer": 2, "explanation": "文章说人体由约37万亿个细胞组成。"}, {"question": "红细胞的主要功能是什么？", "options": ["A. 传输大脑信号", "B. 将氧气运送到全身", "C. 保护皮肤", "D. 帮助消化食物"], "answer": 1, "explanation": "红细胞负责将氧气运送到全身。"}, {"question": "细胞核里含有什么？", "options": ["A. 氧气", "B. 血液", "C. DNA遗传信息", "D. 消化液"], "answer": 2, "explanation": "细胞核是细胞的控制中心，里面含有DNA。"}, {"question": "皮肤细胞大约多久更换一次？", "options": ["A. 每天", "B. 约每两周", "C. 约每6个月", "D. 每年"], "answer": 1, "explanation": "皮肤细胞大约每两周更换一次。"}, {"question": "当细胞分裂出错时可能导致什么？", "options": ["A. 细胞变得更强大", "B. 细胞停止工作", "C. 可能导致癌症等疾病", "D. 细胞变得更小"], "answer": 2, "explanation": "当细胞分裂出错时，就可能导致疾病，如癌症。"}]}, {"id": 13, "topic": "科学", "emoji": "💧", "title": "水循环", "body": "水是生命的基础，地球上的水处于不断循环之中。这个过程叫做水循环，它将水在地球的海洋、天空和陆地之间不断移动和再利用。没有水循环，地球的生命将无法存在。\n\n水循环从蒸发开始。太阳的热量使海洋、湖泊和河流中的水变成水蒸气，升入大气层。植物也通过叶片蒸腾作用向空气中释放水蒸气。这些水蒸气上升后遇冷，凝结成微小的水滴，形成云。\n\n当云中的水滴变得足够大时，就会以雨、雪、冰雹或冻雨的形式降落到地面，这称为降水。降落的水一部分流入河流和湖泊，流向海洋；另一部分渗入地下，成为地下水；还有一些被植物吸收。\n\n人类活动正在影响水循环。森林砍伐减少了植物的蒸腾作用，改变了降雨模式。气候变化使极端天气事件如洪水和干旱更加频繁。保护水资源、减少污染，是保障未来水安全的关键。", "vocab": [{"word": "水循环", "definition": "水在地球的海洋、大气和陆地之间不断循环的过程。"}, {"word": "蒸发", "definition": "液态水变成水蒸气进入大气层的过程。"}, {"word": "蒸腾作用", "definition": "植物通过叶片向空气中释放水蒸气的过程。"}, {"word": "凝结", "definition": "水蒸气遇冷变成小水滴的过程。"}, {"word": "降水", "definition": "以雨、雪、冰雹等形式从天空落下的水。"}, {"word": "地下水", "definition": "渗入地下储存在岩石和土壤中的水。"}], "questions": [{"question": "水循环从哪个过程开始？", "options": ["A. 降水", "B. 蒸发", "C. 凝结", "D. 渗透"], "answer": 1, "explanation": "水循环从蒸发开始，太阳的热量使水变成水蒸气升入大气层。"}, {"question": "云是怎么形成的？", "options": ["A. 风吹起海水", "B. 工厂排放的烟雾", "C. 水蒸气上升遇冷凝结成微小水滴", "D. 植物直接产生的"], "answer": 2, "explanation": "水蒸气上升后遇冷，凝结成微小的水滴，形成云。"}, {"question": "什么是降水？", "options": ["A. 水从地下涌出", "B. 水蒸发进入空气", "C. 水以雨、雪、冰雹等形式从天空降落", "D. 植物吸收水分"], "answer": 2, "explanation": "降水是指水以雨、雪、冰雹或冻雨的形式降落到地面。"}, {"question": "渗入地下的水会变成什么？", "options": ["A. 云", "B. 河流", "C. 地下水", "D. 雪"], "answer": 2, "explanation": "降落的水一部分渗入地下，成为地下水。"}, {"question": "森林砍伐对水循环有什么影响？", "options": ["A. 使水循环加速", "B. 减少蒸腾作用，改变降雨模式", "C. 增加地下水储量", "D. 使海洋蒸发增加"], "answer": 1, "explanation": "森林砍伐减少了植物的蒸腾作用，改变了降雨模式。"}]}, {"id": 14, "topic": "健康", "emoji": "🍎", "title": "为什么我们需要吃蔬菜", "body": "蔬菜对健康的身体极其重要。蔬菜富含维生素、矿物质和膳食纤维，这些营养素帮助身体生长、抵抗疾病并正常运转。每天吃各种颜色的蔬菜是你能为自己健康做的最好事情之一。\n\n不同颜色的蔬菜提供不同的营养素。橙色和黄色蔬菜，如胡萝卜和红薯，富含β-胡萝卜素，身体将其转化为维生素A，对视力很重要。深绿色蔬菜，如菠菜和西兰花，含有丰富的铁、钙和维生素C。红色蔬菜，如番茄，含有番茄红素，有助于保护心脏。\n\n膳食纤维是蔬菜中另一种关键营养素。纤维帮助食物通过消化系统移动，让你更长时间感到饱，防止便秘。纤维还喂养肠道中有益细菌，这对免疫系统很重要。\n\n研究表明，多吃蔬菜的人患心脏病、糖尿病和某些癌症的概率更低。营养专家建议每餐的一半应该是水果和蔬菜。烤制蔬菜能激发天然的甜味，让蔬菜变得更美味。", "vocab": [{"word": "维生素", "definition": "食物中人体需要少量才能正常运作的营养素。"}, {"word": "矿物质", "definition": "食物中帮助身体运转的天然物质，如铁和钙。"}, {"word": "β-胡萝卜素", "definition": "橙色蔬菜中的天然色素，身体会将其转化为维生素A。"}, {"word": "膳食纤维", "definition": "植物性食物中帮助消化、让人有饱腹感的营养素。"}, {"word": "消化系统", "definition": "分解食物使身体获取能量的器官系统。"}, {"word": "免疫系统", "definition": "身体抵抗疾病和感染的防御系统。"}], "questions": [{"question": "橙色蔬菜提供什么营养素？", "options": ["A. 维生素C和钙", "B. 铁和纤维", "C. 转化为维生素A的β-胡萝卜素", "D. 保护心脏的番茄红素"], "answer": 2, "explanation": "橙色蔬菜富含β-胡萝卜素，身体将其转化为维生素A，对视力很重要。"}, {"question": "膳食纤维对身体有什么作用？", "options": ["A. 帮助骨骼强壮", "B. 改善视力", "C. 帮助食物通过消化系统并让你感到饱", "D. 使皮肤发光"], "answer": 2, "explanation": "纤维帮助食物通过消化系统，让你更长时间感到饱，并喂养有益肠道细菌。"}, {"question": "营养专家建议每餐如何分配？", "options": ["A. 只吃蔬菜", "B. 一半是水果和蔬菜", "C. 只在晚餐吃蔬菜", "D. 每周至少吃一份蔬菜"], "answer": 1, "explanation": "营养专家建议每餐的一半应该是水果和蔬菜。"}, {"question": "红色蔬菜中什么营养素有助于保护心脏？", "options": ["A. β-胡萝卜素", "B. 维生素K", "C. 铁", "D. 番茄红素"], "answer": 3, "explanation": "红色蔬菜含有番茄红素，有助于保护心脏。"}, {"question": "为什么烤蔬菜更美味？", "options": ["A. 让蔬菜更脆", "B. 去除苦味", "C. 激发蔬菜天然的甜味", "D. 增加额外的维生素"], "answer": 2, "explanation": "烤制能激发蔬菜天然的甜味，让蔬菜变得更美味。"}]}, {"id": 15, "topic": "健康", "emoji": "😴", "title": "睡眠的重要性", "body": "睡眠是人体最重要的活动之一，但很多人都没有得到足够的睡眠。对于8-10岁的孩子，专家建议每晚睡9到11个小时。睡眠期间，身体和大脑都在努力工作，为第二天做准备。\n\n在睡眠中，大脑处理和储存白天学到的信息，将短期记忆转化为长期记忆。这就是为什么在考试前好好睡觉比熬夜学习效果更好。科学研究表明，睡眠不足的学生记忆力和注意力明显下降。\n\n睡眠期间，身体分泌生长激素，促进肌肉生长、修复组织和强化骨骼。免疫系统也在睡眠中得到加强，产生更多的白细胞来对抗感染。这就是为什么生病时你常常感到特别困倦。\n\n良好的睡眠习惯能帮助你睡得更好：每天固定时间上床睡觉；睡前一小时避免看屏幕；保持卧室黑暗、凉爽和安静；白天进行体育锻炼。把睡眠视为对健康的重要投资，就像吃健康食品和锻炼一样重要。", "vocab": [{"word": "生长激素", "definition": "睡眠中分泌的促进生长和修复身体的物质。"}, {"word": "免疫系统", "definition": "身体抵抗疾病的防御系统。"}, {"word": "白细胞", "definition": "血液中对抗感染和疾病的细胞。"}, {"word": "短期记忆", "definition": "存储时间很短的临时记忆。"}, {"word": "长期记忆", "definition": "能够长时间保留的永久性记忆。"}, {"word": "愈合", "definition": "身体从疾病或伤害中恢复正常的过程。"}], "questions": [{"question": "8-10岁的孩子每晚需要多少小时的睡眠？", "options": ["A. 6到7小时", "B. 7到8小时", "C. 9到11小时", "D. 12到14小时"], "answer": 2, "explanation": "文章说对于8-10岁的孩子，专家建议每晚睡9到11个小时。"}, {"question": "为什么睡眠对学习很重要？", "options": ["A. 睡觉时大脑会自动学习", "B. 睡眠中大脑将短期记忆转化为长期记忆", "C. 睡觉让眼睛休息", "D. 早上精神好记东西更快"], "answer": 1, "explanation": "在睡眠中，大脑处理和储存信息，将短期记忆转化为长期记忆。"}, {"question": "睡眠期间身体分泌什么重要物质？", "options": ["A. 维生素C", "B. 钙质", "C. 生长激素", "D. 糖分"], "answer": 2, "explanation": "睡眠期间，身体分泌生长激素，促进肌肉生长和修复组织。"}, {"question": "以下哪项是良好的睡眠习惯？", "options": ["A. 睡前一小时看视频", "B. 每天不同时间睡觉", "C. 保持卧室黑暗、凉爽和安静", "D. 白天多喝含咖啡因的饮料"], "answer": 2, "explanation": "保持卧室黑暗、凉爽和安静是良好的睡眠习惯。"}, {"question": "为什么生病时会特别困倦？", "options": ["A. 身体缺乏能量", "B. 疾病让人感到沮丧", "C. 身体需要休息和睡眠来愈合", "D. 免疫系统需要关闭才能工作"], "answer": 2, "explanation": "生病时身体需要更多的睡眠和休息来对抗疾病和愈合。"}]}, {"id": 16, "topic": "中华文化", "emoji": "🐉", "title": "中国的四大发明", "body": "中国古代有四项伟大的发明，深刻地改变了整个世界的历史进程：造纸术、印刷术、火药和指南针。这四大发明被称为中国对人类文明最重要的贡献。\n\n造纸术是由东汉时期的蔡伦于公元105年改进的。在此之前，人们在昂贵的丝绸或沉重的竹简上书写。纸张的出现使知识的记录和传播变得更加容易和便宜，极大地推动了教育的发展。\n\n印刷术的发明使书籍能够大量复制。北宋时期的毕昇发明了活字印刷术，将刻有文字的泥块排列组合进行印刷。这个发明比欧洲古腾堡的活字印刷术早了约400年，使知识能够传播到更多人手中。\n\n火药最初由唐代的炼丹士偶然发现，他们原本在寻找长生不老药。指南针则是中国航海家用来在茫茫大海中确定方向的工具。这两项发明都从中国传到了世界各地，深深影响了历史的走向。", "vocab": [{"word": "造纸术", "definition": "将植物纤维制作成纸张的方法，中国古代的重大发明。"}, {"word": "活字印刷术", "definition": "用可以移动的文字块进行印刷的技术。"}, {"word": "火药", "definition": "一种可以爆炸的化学混合物，中国古代发明。"}, {"word": "指南针", "definition": "利用地球磁场确定方向的导航工具。"}, {"word": "炼丹士", "definition": "古代寻找长生不老药的人。"}, {"word": "文明", "definition": "具有复杂社会组织、文化和技术的人类社会。"}], "questions": [{"question": "中国古代四大发明是哪四项？", "options": ["A. 造纸术、印刷术、丝绸、瓷器", "B. 造纸术、印刷术、火药、指南针", "C. 火药、指南针、铁器、农业", "D. 印刷术、数学、医学、建筑"], "answer": 1, "explanation": "中国古代四大发明是造纸术、印刷术、火药和指南针。"}, {"question": "蔡伦改进造纸术是在哪个朝代？", "options": ["A. 秦朝", "B. 汉朝", "C. 唐朝", "D. 宋朝"], "answer": 1, "explanation": "造纸术是由东汉时期的蔡伦于公元105年改进的。"}, {"question": "毕昇发明的活字印刷术比欧洲早多少年？", "options": ["A. 约100年", "B. 约200年", "C. 约400年", "D. 约600年"], "answer": 2, "explanation": "毕昇的活字印刷术比欧洲古腾堡的活字印刷术早了约400年。"}, {"question": "火药最初是谁偶然发现的？", "options": ["A. 军事将领", "B. 皇帝", "C. 炼丹士", "D. 渔民"], "answer": 2, "explanation": "火药最初由唐代的炼丹士偶然发现，他们原本在寻找长生不老药。"}, {"question": "指南针有什么用途？", "options": ["A. 测量温度", "B. 确定时间", "C. 在海上确定方向", "D. 预测天气"], "answer": 2, "explanation": "指南针是中国航海家用来在茫茫大海中确定方向的工具。"}]}, {"id": 17, "topic": "中华文化", "emoji": "🎆", "title": "春节：中国最重要的节日", "body": "春节是中国最重要的传统节日，也是世界上庆祝人数最多的节日之一。它按照农历来计算，通常在每年的一月底或二月初。整个庆祝活动持续约15天，在正月十五元宵节时结束。\n\n春节的庆祝活动丰富多彩。家家户户在门上贴红色春联和福字，因为红色象征着好运和驱除邪气。人们大扫除，清除旧年的霉运，迎接新年的好运。除夕夜，家人团聚在一起吃年夜饭，这是春节最重要的传统之一。\n\n新年期间，长辈会给孩子们压岁钱，装在红色的信封里，称为红包。舞龙舞狮是春节的传统表演，人们相信能驱除邪灵、带来好运。燃放烟花爆竹则是为了吓走传说中的怪兽年。\n\n不同地区有不同的春节食物传统。北方人喜欢吃饺子，因为饺子的形状像古代的金元宝，象征财富。南方人则喜欢吃年糕，年糕谐音年年高，寓意生活越来越好。", "vocab": [{"word": "农历", "definition": "中国传统的以月亮周期为基础的历法。"}, {"word": "春联", "definition": "春节期间贴在门上的红色对联，写有吉祥话语。"}, {"word": "压岁钱", "definition": "春节期间长辈给孩子们装在红包里的钱。"}, {"word": "舞龙舞狮", "definition": "春节期间表演的传统民俗活动，象征好运。"}, {"word": "年糕", "definition": "一种用糯米做的传统春节食品，象征步步高升。"}, {"word": "谐音", "definition": "发音相同或相似的词语。"}], "questions": [{"question": "春节按照什么历法计算？", "options": ["A. 公历（阳历）", "B. 农历（阴历）", "C. 太阳历", "D. 儒略历"], "answer": 1, "explanation": "文章说春节按照农历来计算。"}, {"question": "为什么春节到处使用红色？", "options": ["A. 因为红色是皇帝最喜欢的颜色", "B. 红色象征着好运和驱除邪气", "C. 因为冬天需要温暖的颜色", "D. 因为红色比较便宜"], "answer": 1, "explanation": "红色象征着好运和驱除邪气。"}, {"question": "红包里装的是什么？", "options": ["A. 糖果", "B. 小礼物", "C. 压岁钱", "D. 祝福卡片"], "answer": 2, "explanation": "长辈会给孩子们压岁钱，装在红色的信封（红包）里。"}, {"question": "北方人在春节吃饺子有什么寓意？", "options": ["A. 饺子好吃", "B. 饺子形状像金元宝，象征财富", "C. 饺子谐音年年好", "D. 饺子容易消化"], "answer": 1, "explanation": "饺子的形状像古代的金元宝，象征财富。"}, {"question": "年糕有什么寓意？", "options": ["A. 甜甜蜜蜜", "B. 团团圆圆", "C. 年年高（生活越来越好）", "D. 健康长寿"], "answer": 2, "explanation": "年糕谐音年年高，寓意生活越来越好。"}]}, {"id": 18, "topic": "地理", "emoji": "🌏", "title": "中国：幅员辽阔的大国", "body": "中国是世界上人口最多的国家，也是面积第三大的国家。中国地处亚洲东部，东临太平洋。中国的地理非常多样，从北方的戈壁沙漠到南方的热带雨林，从西部的青藏高原到东部的平原和丘陵。\n\n青藏高原是世界上最高的高原，平均海拔超过4500米，被称为世界屋脊。世界最高峰珠穆朗玛峰就位于中国和尼泊尔的边界，海拔8849米。黄河是中国的母亲河，孕育了中华文明；长江是亚洲最长的河流，全长约6300公里。\n\n中国拥有丰富的自然资源和生物多样性。大熊猫是中国的国宝，只生活在四川、陕西和甘肃的竹林里。中国还是世界上最大的农业国家之一，水稻、小麦和蔬菜是主要农作物。\n\n中国有约56个民族，汉族是最大的民族群体，约占总人口的92%。各民族有着不同的语言、文化和传统。长城、故宫、兵马俑等众多历史遗迹吸引着来自世界各地的游客。", "vocab": [{"word": "青藏高原", "definition": "位于中国西部的世界最高高原，被称为世界屋脊。"}, {"word": "珠穆朗玛峰", "definition": "位于中国和尼泊尔边界的世界最高山峰。"}, {"word": "生物多样性", "definition": "一个地区内不同生物物种的多样程度。"}, {"word": "国宝", "definition": "被国家视为珍贵的象征性动物或文物。"}, {"word": "民族", "definition": "有着共同历史、文化和语言的人群群体。"}, {"word": "历史遗迹", "definition": "保留下来的具有历史价值的古建筑或遗址。"}], "questions": [{"question": "青藏高原有什么特别之处？", "options": ["A. 它是世界上最大的沙漠", "B. 它是世界上最高的高原，被称为世界屋脊", "C. 它是中国最热的地区", "D. 它是中国人口最多的地区"], "answer": 1, "explanation": "青藏高原是世界上最高的高原，平均海拔超过4500米，被称为世界屋脊。"}, {"question": "长江大约多长？", "options": ["A. 约1600公里", "B. 约3200公里", "C. 约6300公里", "D. 约10000公里"], "answer": 2, "explanation": "长江是亚洲最长的河流，全长约6300公里。"}, {"question": "大熊猫生活在哪些地区？", "options": ["A. 内蒙古草原", "B. 东北的森林", "C. 四川、陕西和甘肃的竹林", "D. 云南的热带雨林"], "answer": 2, "explanation": "大熊猫只生活在四川、陕西和甘肃的竹林里。"}, {"question": "汉族约占中国总人口的多少？", "options": ["A. 约50%", "B. 约70%", "C. 约92%", "D. 约99%"], "answer": 2, "explanation": "汉族是最大的民族群体，约占总人口的92%。"}, {"question": "以下哪项不是中国的历史遗迹？", "options": ["A. 长城", "B. 故宫", "C. 兵马俑", "D. 埃菲尔铁塔"], "answer": 3, "explanation": "埃菲尔铁塔是法国巴黎的地标，不是中国的历史遗迹。"}]}, {"id": 19, "topic": "数学与思维", "emoji": "🔢", "title": "数字的奥秘", "body": "数学是人类最伟大的发明之一，它是科学、工程和日常生活的语言。数字看起来很简单，但其中蕴藏着无穷的奥秘和规律。学习数学不仅能帮助我们计算，还能锻炼逻辑思维能力。\n\n有些数字非常特别。质数只能被1和它自己整除，如2、3、5、7、11。数学家们几千年来一直在研究质数，它们在密码学中也有重要应用。黄金比例约为1.618，被称为神圣比例，出现在贝壳的螺旋形状、向日葵的种子排列，甚至古希腊建筑中。\n\n斐波那契数列是另一个神奇的数字序列：0、1、1、2、3、5、8、13、21，每个数字都是前两个数字之和。令人惊讶的是，这个数列在自然界中随处可见，花瓣的数量、松果的螺旋，甚至蜗牛的外壳形状都遵循这个规律。\n\n零的发明也是数学史上的重大突破。古印度数学家大约在公元500年左右发明了零这个概念，使大数字的计算变得更加容易。没有零，就不会有十进制系统，也不会有今天的计算机和数字技术。", "vocab": [{"word": "质数", "definition": "只能被1和自身整除的自然数，如2、3、5、7。"}, {"word": "黄金比例", "definition": "约等于1.618的特殊数学比例，在自然界和艺术中广泛出现。"}, {"word": "斐波那契数列", "definition": "每个数字等于前两个数字之和的数字序列。"}, {"word": "密码学", "definition": "研究信息加密和解密的学科。"}, {"word": "十进制", "definition": "以10为基础的计数系统，我们日常使用的计数方法。"}, {"word": "逻辑思维", "definition": "按照规律和证据来推理和解决问题的思维方式。"}], "questions": [{"question": "什么是质数？", "options": ["A. 能被3整除的数", "B. 只能被1和自身整除的数", "C. 所有偶数", "D. 末尾是0的数"], "answer": 1, "explanation": "质数只能被1和它自己整除，如2、3、5、7、11。"}, {"question": "黄金比例大约等于多少？", "options": ["A. 0.618", "B. 1.414", "C. 1.618", "D. 3.14"], "answer": 2, "explanation": "黄金比例约为1.618，被称为神圣比例。"}, {"question": "斐波那契数列的规律是什么？", "options": ["A. 每个数字是前一个数字的两倍", "B. 每个数字等于前两个数字之和", "C. 每个数字比前一个大10", "D. 每个数字都是质数"], "answer": 1, "explanation": "斐波那契数列中每个数字都是前两个数字之和。"}, {"question": "大约什么时候发明了零？", "options": ["A. 约公元前500年", "B. 约公元500年", "C. 约1000年", "D. 约1500年"], "answer": 1, "explanation": "古印度数学家大约在公元500年左右发明了零。"}, {"question": "以下哪个地方不会出现斐波那契数列？", "options": ["A. 花瓣数量", "B. 松果的螺旋", "C. 蜗牛的外壳形状", "D. 人的头发颜色"], "answer": 3, "explanation": "文章提到花瓣、松果螺旋和蜗牛外壳都遵循斐波那契数列，但没有提到头发颜色。"}]}, {"id": 20, "topic": "数学与思维", "emoji": "🧩", "title": "逻辑与推理", "body": "每当你解决一道数学题、玩拼图游戏或者决定如何安排时间，你都在使用逻辑思维。逻辑是一种系统地思考和推理的方法，帮助我们找到正确答案，避免错误。\n\n演绎推理是从已知的规律推导出新结论的过程。例如：所有鸟类都有翅膀，企鹅是鸟类，所以企鹅有翅膀。这种推理方式就像数学证明，如果前提正确，结论一定正确。科学家和数学家经常使用演绎推理。\n\n归纳推理则是通过观察许多具体例子来总结出规律。例如，你观察了100只乌鸦，它们都是黑色的，于是你得出乌鸦都是黑色的这个结论。不过，归纳推理不能保证百分之百正确，说不定世界某个地方存在白色的乌鸦！\n\n批判性思维是检查信息、发现错误推理的能力。当有人说因为大家都这么做所以这是对的时，这就是一种错误的逻辑。学会批判性思维，能帮助你辨别真假信息，做出更好的决定。这在信息爆炸的现代社会尤其重要。", "vocab": [{"word": "逻辑", "definition": "系统地思考和推理，找出正确结论的方法。"}, {"word": "演绎推理", "definition": "从已知规律出发，推导出新结论的思维方式。"}, {"word": "归纳推理", "definition": "通过观察具体例子来总结出一般规律的思维方式。"}, {"word": "批判性思维", "definition": "检查信息、识别错误推理的思维能力。"}, {"word": "前提", "definition": "推理的出发点，被认为是正确的基础条件。"}, {"word": "结论", "definition": "通过推理得出的最终判断或答案。"}], "questions": [{"question": "演绎推理的特点是什么？", "options": ["A. 通过观察例子总结规律", "B. 从已知规律推导出新结论", "C. 凭感觉做判断", "D. 相信权威说的话"], "answer": 1, "explanation": "演绎推理是从已知的规律推导出新结论的过程。"}, {"question": "观察100只乌鸦都是黑色后得出乌鸦都是黑色的结论，这是哪种推理？", "options": ["A. 演绎推理", "B. 批判性思维", "C. 归纳推 let lang = "en";
let users = JSON.parse(localStorage.getItem("readspark_v2_users") || "[]");

let selectedAvatar = AVATARS[0];

let currentQIndex = 0;
let userAnswers = [];

let timerSeconds = 0;
let readingTime = 0;
let isSpeaking = false;
let activeFilter = "all";
let searchTerm = "";

const s = () => STR[lang];

// ── LANG ──
function setLang(l) {
  lang = l;
  ALL_ARTICLES = l==="zh" ? ZH_ARTICLES : EN_ARTICLES;
  document.body.classList.toggle("lang-zh", l==="zh");
  document.documentElement.lang = l==="zh" ? "zh-CN" : "en";
  activeFilter = "all";
  document.getElementById("lang-screen").style.display = "none";
  document.getElementById("profile-screen").classList.add("show");
  applyStrings();
  renderProfileScreen();
}

function changeLang() {
  stopTimer();
  if(isSpeaking){window.speechSynthesis.cancel();isSpeaking=false;}
  lang = lang==="en" ? "zh" : "en";
  ALL_ARTICLES = lang==="zh" ? ZH_ARTICLES : EN_ARTICLES;
  document.body.classList.toggle("lang-zh", lang==="zh");
  activeFilter = "all";
  applyStrings();
  // Stay in app, refresh start
  if(currentUserId) { showSection("start"); }
}

function applyStrings() {
  const S = s();
  document.getElementById("pb-title").textContent = S.pb_title;
  document.getElementById("pb-sub").textContent = S.pb_sub;
  document.getElementById("nuf-title").textContent = S.nuf_title;
  document.getElementById("new-name").placeholder = S.name_placeholder;
  document.getElementById("btn-create").textContent = S.btn_create;
  document.getElementById("app-logo").textContent = "📚 " + S.pb_title;
  document.getElementById("btn-scores").textContent = S.btn_scores;
  document.getElementById("lang-toggle").textContent = S.lang_toggle;
  document.getElementById("modal-title").textContent = S.modal_title;
  document.getElementById("search-bar").placeholder = S.search_placeholder;
}

// ── USERS ──
const saveUsers = () => localStorage.setItem("readspark_v2_users", JSON.stringify(users));
const currentUser = () => users.find(u => u.id===currentUserId)||null;
const userHistory = () => {
  const u=currentUser(); if(!u) return [];
  const key = lang+"_history";
  return u[key]||[];
};
function addToHistory(entry) {
  const u=currentUser(); if(!u) return;
  const key = lang+"_history";
  if(!u[key]) u[key]=[];
  u[key] = u[key].filter(h=>h.articleId!==entry.articleId);
  u[key].unshift(entry);
  if(u[key].length>200) u[key].pop();
  saveUsers();
}
function getScoreMap() {
  const m={}; userHistory().forEach(h=>{m[h.articleId]=h;}); return m;
}

function renderProfileScreen() {
  const picker = document.getElementById("avatar-picker");
  picker.innerHTML = AVATARS.map((av,i)=>
    `<button class="av-btn${i===0?" sel":""}" onclick="pickAvatar('${av}',this)">${av}</button>`
  ).join("");
  renderUserList();
}
function renderUserList() {
  const list = document.getElementById("user-list");
  const S = s();
  if(!users.length){
    list.innerHTML=`<p style="color:var(--muted);font-size:13px;text-align:center;padding:12px">${lang==="zh"?"还没有读者，在下面添加一个吧！":"No readers yet — add one below!"}</p>`;
    return;
  }
  list.innerHTML = users.map(u=>{
    const hkey = lang+"_history";
    const done = (u[hkey]||[]).length;
    const avg = done?Math.round((u[hkey]||[]).reduce((s,h)=>s+h.score/h.total,0)/done*100):0;
    return `<div class="user-card" onclick="loginUser('${u.id}')">
      <div class="user-avatar" style="background:${u.color}">${u.avatar}</div>
      <div class="user-info">
        <div class="u-name">${u.name}</div>
        <div class="u-stats">${done}${S.h_done}${avg}%</div>
      </div>
      <button class="user-del" onclick="event.stopPropagation();deleteUser('${u.id}')" title="Delete">🗑</button>
    </div>`;
  }).join("");
}
function pickAvatar(av,btn){
  selectedAvatar=av;
  document.querySelectorAll(".av-btn").forEach(b=>b.classList.remove("sel"));
  btn.classList.add("sel");
}

  const id="u_"+Date.now();
  const ci=users.length%COLORS.length;
  users.push({id,name,avatar:selectedAvatar,color:COLORS[ci]});
  saveUsers();
  document.getElementById("new-name").value="";
  loginUser(id);
}
function deleteUser(id){
  if(!confirm(s().delete_confirm)) return;
  users=users.filter(u=>u.id!==id); saveUsers(); renderUserList();
}
function loginUser(id){
  currentUserId=id;
  document.getElementById("profile-screen").classList.remove("show");
  document.getElementById("app").style.display="block";
  updateUserHeader(); initApp();
}
function switchUser(){
  stopTimer();
  if(isSpeaking){window.speechSynthesis.cancel();isSpeaking=false;}
  document.getElementById("app").style.display="none";
  document.getElementById("profile-screen").classList.add("show");
  renderUserList();
}
function updateUserHeader(){
  const u=currentUser(); if(!u) return;
  document.getElementById("up-dot").style.background=u.color;
  document.getElementById("up-dot").textContent=u.avatar;
  document.getElementById("up-name").textContent=u.name;
}

// ── APP ──
function initApp(){
  showSection("start");
  updateWelcomeBar();
  buildFilters();
  filterArticles();
}
function updateWelcomeBar(){
  const u=currentUser(); if(!u) return;
  const S=s();
  const h=userHistory();
  const done=h.length, total=ALL_ARTICLES.length;
  const avg=done?Math.round(h.reduce((s,hh)=>s+hh.score/hh.total,0)/done*100):0;
  const left=total-done;
  const greet=done?S.greet_more[Math.floor(Math.random()*S.greet_more.length)]:S.greet_first;
  document.getElementById("wb-greet").textContent=`${u.avatar} ${greet}，${u.name}！`;
  document.getElementById("wb-sub").textContent=done
    ? done+S.sub_more.replace("{left}",left)
    : total+S.sub_first;
  document.getElementById("wb-stats").innerHTML=done
    ? `<div class="wb-stat"><div class="ws-num">${done}</div><div class="ws-label">${S.done_label}</div></div>
       <div class="wb-stat"><div class="ws-num">${left}</div><div class="ws-label">${S.left_label}</div></div>
       <div class="wb-stat"><div class="ws-num">${avg}%</div><div class="ws-label">${S.avg_label}</div></div>`
    : `<div class="wb-stat"><div class="ws-num">${total}</div><div class="ws-label">${S.stories_label}</div></div>`;
}
function buildFilters(){
  const topics=new Set(ALL_ARTICLES.map(a=>a.topic));
  const row=document.getElementById("filter-row");
  row.innerHTML="";
  document.getElementById("sec-title").textContent=s().sec_title;
  const allBtn=document.createElement("button");
  allBtn.className="filter-btn active"; allBtn.textContent=s().filter_all;
  allBtn.onclick=()=>{activeFilter="all";document.querySelectorAll(".filter-btn").forEach(b=>b.classList.remove("active"));allBtn.classList.add("active");filterArticles();};
  row.appendChild(allBtn);
  topics.forEach(t=>{
    const btn=document.createElement("button");
    btn.className="filter-btn"; btn.textContent=t;
    btn.onclick=()=>{activeFilter=t;document.querySelectorAll(".filter-btn").forEach(b=>b.classList.remove("active"));btn.classList.add("active");filterArticles();};
    row.appendChild(btn);
  });
}
function filterArticles(){
  searchTerm=document.getElementById("search-bar").value.toLowerCase();
  const filtered=ALL_ARTICLES.filter(a=>{
    const mt=activeFilter==="all"||a.topic===activeFilter;
    const ms=!searchTerm||a.title.toLowerCase().includes(searchTerm)||a.topic.toLowerCase().includes(searchTerm);
    return mt&&ms;
  });
  document.getElementById("articles-count").textContent=filtered.length+s().count_suffix;
  renderGrid(filtered);
}
function renderGrid(articles){
  const scores=getScoreMap(), S=s();
  document.getElementById("articles-grid").innerHTML=articles.map(a=>{
    const sc=scores[a.id];
    const scoreHTML=sc
      ?`<span class="mini-score ${scoreLevel(sc.score,sc.total)}">${sc.score}/${sc.total}</span>`
      :`<span style="font-size:11px;color:var(--muted);font-weight:600">${S.not_done}</span>`;
    return `<div class="article-card-mini${sc?" completed":""}" onclick="openArticle(${a.id})">
      <div class="mini-header"><div class="mini-emoji">${a.emoji}</div>
      <div><div class="mini-title">${a.title}</div><div class="mini-topic">${a.topic}</div></div></div>
      <div class="mini-footer"><span class="mini-badge">${a.questions.length} Q</span>${scoreHTML}</div>
    </div>`;
  }).join("");
}
const scoreLevel=(s,t)=>{const p=s/t;return p>=.8?"great":p>=.6?"ok":"low";};

// ── READING ──
function openArticle(id){
  currentArticle=ALL_ARTICLES.find(a=>a.id===id); if(!currentArticle) return;
  renderArticle(currentArticle); showSection("reading"); startTimer();
}
function renderArticle(data){
  const S=s();
  document.getElementById("art-title").textContent=data.title;
  document.getElementById("badge-topic").textContent=data.emoji+" "+data.topic;
  document.getElementById("badge-grade").textContent=S.grade;
  const words=lang==="zh"?data.body.replace(/\s/g,"").length+" 字":data.body.split(/\s+/).length+" words";
  document.getElementById("badge-words").textContent="~"+words;
  document.getElementById("tts-btn").textContent=S.tts_read;
  document.getElementById("btn-quiz").textContent=S.quiz_btn;
  document.getElementById("btn-back").textContent=S.back_btn;
  document.getElementById("timer-label").textContent=S.timer_label;
  document.getElementById("vocab-hint").innerHTML="💡 "+S.vocab_hint;
  document.getElementById("big-quiz-btn").textContent=S.big_quiz_btn;
  const vm={}; (data.vocab||[]).forEach(v=>{vm[v.word]=v.definition;});
  const bodyEl=document.getElementById("art-body");
  const paras=data.body.split(/\n\n+/);
  let html="";
  paras.forEach(p=>{
    if(!p.trim()) return;
    let ph=p;
    if(lang==="zh"){
      Object.keys(vm).sort((a,b)=>b.length-a.length).forEach(w=>{
        ph=ph.split(w).join(`<span class="vocab-word" data-w="${w}" data-d="${vm[w]}">${w}</span>`);
      });
    } else {
      const tokens=ph.split(/(\s+)/);
      ph=""; tokens.forEach(tok=>{
        const clean=tok.replace(/[^a-zA-Z\'\-]/g,"").toLowerCase();
        ph+=vm[clean]?`<span class="vocab-word" data-w="${tok.replace(/[^a-zA-Z\'\-]/g,"")}" data-d="${vm[clean]}">${tok}</span>`:tok;
      });
    }
    html+=`<p>${ph}</p>`;
  });
  bodyEl.innerHTML=html;
  bodyEl.querySelectorAll(".vocab-word").forEach(el=>{
    el.addEventListener("mouseover",showTip);
    el.addEventListener("mousemove",moveTip);
    el.addEventListener("mouseleave",hideTip);
    el.addEventListener("click",showTip);
  });
}
const tip=document.getElementById("tooltip");
function showTip(e){const el=e.currentTarget;document.getElementById("tip-w").textContent=el.dataset.w;document.getElementById("tip-d").textContent=el.dataset.d;tip.classList.add("visible");posTip(e);}
function moveTip(e){posTip(e);}
function hideTip(){tip.classList.remove("visible");}
function posTip(e){let x=e.clientX+12,y=e.clientY-10;if(x+250>window.innerWidth)x=e.clientX-250;if(y+90>window.innerHeight)y=e.clientY-90;tip.style.left=x+"px";tip.style.top=y+"px";}
function startTimer(){timerSeconds=0;clearInterval(timerInterval);timerInterval=setInterval(()=>{timerSeconds++;const m=Math.floor(timerSeconds/60),sec=timerSeconds%60;document.getElementById("timer-num").textContent=m+":"+String(sec).padStart(2,"0");},1000);}
function stopTimer(){clearInterval(timerInterval);readingTime=timerSeconds;}
function toggleTTS(){
  const ss=window.speechSynthesis, S=s();
  if(isSpeaking){ss.cancel();isSpeaking=false;document.getElementById("tts-btn").textContent=S.tts_read;document.getElementById("tts-btn").classList.remove("speaking");}
  else{const text=currentArticle.title+". "+currentArticle.body.replace(/\n/g," ");const u=new SpeechSynthesisUtterance(text);u.lang=lang==="zh"?"zh-CN":"en-US";u.rate=0.87;u.pitch=1.05;u.onend=()=>{isSpeaking=false;document.getElementById("tts-btn").textContent=S.tts_read;document.getElementById("tts-btn").classList.remove("speaking");};ss.speak(u);isSpeaking=true;document.getElementById("tts-btn").textContent=S.tts_stop;document.getElementById("tts-btn").classList.add("speaking");}
}

// ── QUIZ ──
function startQuiz(){
  stopTimer();if(isSpeaking){window.speechSynthesis.cancel();isSpeaking=false;}
  currentQIndex=0;userAnswers=new Array(currentArticle.questions.length).fill(null);
  const S=s();
  document.getElementById("quiz-title").textContent=S.quiz_title;
  document.getElementById("quiz-sub").textContent=S.quiz_sub;
  showSection("quiz");renderQ(0);
}
function renderQ(idx){
  const q=currentArticle.questions[idx],total=currentArticle.questions.length,S=s();
  document.getElementById("q-counter").textContent=S.q_of.replace("{n}",idx+1).replace("{t}",total);
  document.getElementById("prog").style.width=(idx/total*100)+"%";
  document.getElementById("btn-next").textContent=S.next_btn;
  document.getElementById("btn-submit").textContent=S.submit_btn;
  const labels=["A","B","C","D"];
  let html=`<div class="q-card"><div class="q-num">${S.q_of.replace("{n}",idx+1).replace("{t}",total)}</div><div class="q-text">${q.question}</div><div class="options" id="opts-${idx}">`;
  q.options.forEach((opt,i)=>{const ot=opt.replace(/^[A-D]\.\s*/,"");html+=`<button class="opt-btn" id="opt-${idx}-${i}" onclick="selectAns(${idx},${i})"><span class="opt-label">${labels[i]}</span>${ot}</button>`;});
  html+=`</div><div class="explanation" id="exp-${idx}"></div></div>`;
  document.getElementById("q-container").innerHTML=html;
  document.getElementById("btn-next").style.display="none";
  document.getElementById("btn-submit").style.display="none";
  if(userAnswers[idx]!==null)revealAns(idx,userAnswers[idx]);
}
function selectAns(qi,oi){if(userAnswers[qi]!==null)return;userAnswers[qi]=oi;revealAns(qi,oi);}
function revealAns(qi,oi){
  const q=currentArticle.questions[qi],S=s();
  document.querySelectorAll("#opts-"+qi+" .opt-btn").forEach((btn,i)=>{btn.disabled=true;if(i===q.answer)btn.classList.add("correct");else if(i===oi&&oi!==q.answer)btn.classList.add("wrong");});
  const expEl=document.getElementById("exp-"+qi),ok=oi===q.answer;
  expEl.textContent=(ok?S.correct_pre:S.wrong_pre)+q.explanation;
  expEl.className="explanation show"+(ok?"":" wrong-exp");
  const isLast=qi===currentArticle.questions.length-1;
  document.getElementById(isLast?"btn-submit":"btn-next").style.display="inline-flex";
  document.getElementById(isLast?"btn-next":"btn-submit").style.display="none";
}
function nextQ(){if(currentQIndex<currentArticle.questions.length-1){currentQIndex++;renderQ(currentQIndex);document.getElementById("q-container").scrollIntoView({behavior:"smooth",block:"start"});}}
function submitQuiz(){
  const score=userAnswers.filter((a,i)=>a===currentArticle.questions[i].answer).length;
  const total=currentArticle.questions.length,pct=Math.round(score/total*100);
  addToHistory({articleId:currentArticle.id,title:currentArticle.title,topic:currentArticle.topic,score,total,readingTime,date:new Date().toLocaleDateString(lang==="zh"?"zh-CN":"en-US")});
  showResults(score,total,pct);
}
function showResults(score,total,pct){
  showSection("result");
  const lvl=pct>=80?"great":pct>=60?"ok":"low",S=s();
  document.getElementById("score-ring").className="score-ring "+lvl;
  document.getElementById("res-score").textContent=score;
  document.getElementById("res-total").textContent="/ "+total;
  const r=S.res[lvl];
  document.getElementById("res-emoji").textContent=r.emoji;
  document.getElementById("res-title").textContent=r.title;
  document.getElementById("res-msg").textContent=r.msg;
  const m=Math.floor(readingTime/60),sec=readingTime%60;
  document.getElementById("res-pills").innerHTML=`<div class="rpill">⏱ ${m}:${String(sec).padStart(2,"0")}</div><div class="rpill">✅ ${score}/${total}</div><div class="rpill">📊 ${pct}%</div>`;
  document.getElementById("rbtn-home").textContent=lang==="zh"?"🏠 更多文章":"🏠 More Stories";
  document.getElementById("rbtn-review").textContent=lang==="zh"?"👀 查看解析":"👀 Review";
  document.getElementById("rbtn-again").textContent=lang==="zh"?"🔄 重新阅读":"🔄 Read Again";
}
function reviewQuiz(){showSection("quiz");renderQ(0);userAnswers.forEach((a,i)=>{if(a!==null&&i===0)revealAns(i,a);});}
function readAgain(){showSection("reading");startTimer();}

function openHistory(){
  const h=userHistory(),u=currentUser(),S=s();
  const list=document.getElementById("history-list");
  document.getElementById("modal-title").textContent=S.modal_title;
  list.innerHTML=!h.length?`<div class="h-empty">${S.h_empty}</div>`
    :`<p style="color:var(--muted);font-size:12px;margin-bottom:12px"><strong>${u.name}</strong>${S.modal_user_label.replace("{n}",h.length)}</p>`
      +h.map(hh=>{const pct=Math.round(hh.score/hh.total*100),lvl=pct>=80?"great":pct>=60?"ok":"low",m=Math.floor((hh.readingTime||0)/60),sec=(hh.readingTime||0)%60;
        return`<div class="h-item"><div><div class="h-title">${hh.title}</div><div class="h-meta">📚 ${hh.topic} · ⏱ ${m}:${String(sec).padStart(2,"0")} · 📅 ${hh.date}</div></div><span class="score-badge ${lvl}">${hh.score}${S.h_of}${hh.total}</span></div>`;
      }).join("");
  document.getElementById("modal-history").classList.add("open");
}
function closeHistory(){document.getElementById("modal-history").classList.remove("open");}
document.getElementById("modal-history").addEventListener("click",e=>{if(e.target===e.currentTarget)closeHistory();});

function showSection(name){
  ["start","reading","quiz","result"].forEach(s=>document.getElementById(s+"-section").style.display="none");
  document.getElementById(name+"-section").style.display="block";
  window.scrollTo({top:0,behavior:"smooth"});
  if(name==="start"){updateWelcomeBar();buildFilters();filterArticles();}
}
function goHome(){
  stopTimer();if(isSpeaking){window.speechSynthesis.cancel();isSpeaking=false;}
  showSection("start");
}
</script>
</body>
</html>
