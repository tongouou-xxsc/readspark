<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ReadSpark · 读星</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800;900&family=ZCOOL+XiaoWei&family=Noto+Sans+SC:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --blue:#3b82f6;--blue-d:#1d4ed8;--green:#22c55e;--green-d:#16a34a;
  --orange:#f97316;--red:#ef4444;--yellow:#fbbf24;--purple:#8b5cf6;
  --ink:#1a1a2e;--gold:#e8a838;--jade:#27ae60;--jade-d:#1a7a5e;
  --bg:#f0f7ff;--paper:#faf6f0;--text:#1e293b;--muted:#64748b;
  --radius:20px;--shadow:0 4px 24px rgba(59,130,246,0.12);
  --border:#e2e8f0;
  /* active lang vars - set by JS */
  --accent:#3b82f6; --accent-d:#1d4ed8;
  --header-bg:#1e293b;
  --logo-font:'Fredoka One';
}
body.lang-zh {
  --accent:#e8a838; --accent-d:#c47f10;
  --header-bg:#1a1a2e;
  --logo-font:'ZCOOL XiaoWei';
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Nunito','Noto Sans SC',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;
  background-image:radial-gradient(circle at 20% 20%,#dbeafe 0%,transparent 50%),
  radial-gradient(circle at 80% 80%,#fde8ff 0%,transparent 50%);}
body.lang-zh{background:var(--paper);}

/* ── LANG PICKER ── */
#lang-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;
  background:linear-gradient(135deg,#0f172a 0%,#1e293b 50%,#0f3460 100%);}
.lang-box{background:white;border-radius:28px;padding:48px 36px;max-width:440px;width:100%;
  text-align:center;box-shadow:0 24px 80px rgba(0,0,0,0.4);}
.lang-logo{font-size:52px;margin-bottom:16px;}
.lang-title{font-size:17px;color:var(--muted);margin-bottom:36px;font-weight:600;letter-spacing:1px;}
.lang-options{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.lang-btn{padding:28px 16px;border:3px solid var(--border);border-radius:20px;
  background:#fafafa;cursor:pointer;transition:all .25s;text-align:center;}
.lang-btn:hover{border-color:var(--blue);background:#eff6ff;transform:translateY(-4px);box-shadow:0 8px 24px rgba(59,130,246,0.18);}
.lang-btn .lb-flag{font-size:36px;display:block;margin-bottom:10px;}
.lang-btn .lb-name{font-size:18px;font-weight:800;display:block;margin-bottom:4px;}
.lang-btn .lb-sub{font-size:12px;color:var(--muted);font-weight:600;}
.lang-btn.zh .lb-name{font-family:'ZCOOL XiaoWei',serif;font-size:22px;letter-spacing:3px;}

/* ── PROFILE SCREEN ── */
#profile-screen{display:none;align-items:center;justify-content:center;min-height:100vh;padding:20px;}
#profile-screen.show{display:flex;}
.profile-box{background:white;border-radius:var(--radius);padding:40px 32px;max-width:480px;width:100%;
  box-shadow:var(--shadow);text-align:center;position:relative;overflow:hidden;}
.profile-box::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;
  background:linear-gradient(90deg,var(--blue),var(--purple),var(--green));}
body.lang-zh .profile-box::before{background:linear-gradient(90deg,#c0392b,#e8a838,#27ae60);}
.pb-logo{font-size:40px;margin-bottom:8px;}
.pb-title{font-size:28px;font-weight:800;margin-bottom:4px;color:var(--text);}
body.lang-zh .pb-title{font-family:'ZCOOL XiaoWei',serif;letter-spacing:4px;font-size:32px;}
.pb-sub{color:var(--muted);font-size:13px;margin-bottom:26px;font-weight:600;}
.user-list{display:flex;flex-direction:column;gap:10px;margin-bottom:18px;}
.user-card{background:#f8fafc;border:2.5px solid var(--border);border-radius:14px;padding:14px 18px;
  display:flex;align-items:center;gap:14px;cursor:pointer;transition:all .2s;text-align:left;}
.user-card:hover{border-color:var(--blue);background:#eff6ff;transform:translateX(4px);}
body.lang-zh .user-card:hover{border-color:var(--gold);}
.user-avatar{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:22px;color:white;font-weight:800;flex-shrink:0;}
.u-name{font-weight:800;font-size:15px;}
.u-stats{font-size:11px;color:var(--muted);margin-top:2px;}
.user-del{margin-left:auto;background:none;border:none;color:#cbd5e1;cursor:pointer;font-size:17px;padding:4px;
  border-radius:8px;transition:color .2s;flex-shrink:0;}
.user-del:hover{color:var(--red);}
.divider{border:none;border-top:1px solid var(--border);margin:16px 0;}
.new-user-form{display:flex;flex-direction:column;gap:10px;}
.nuf-title{font-size:17px;font-weight:800;color:var(--text);margin-bottom:4px;}
body.lang-zh .nuf-title{font-family:'ZCOOL XiaoWei',serif;font-size:18px;}
.avatar-picker{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;}
.av-btn{width:42px;height:42px;border-radius:50%;border:3px solid transparent;
  font-size:20px;cursor:pointer;background:#f1f5f9;display:flex;align-items:center;justify-content:center;
  transition:all .2s;}
.av-btn:hover,.av-btn.sel{border-color:var(--blue);background:#dbeafe;transform:scale(1.15);}
body.lang-zh .av-btn:hover, body.lang-zh .av-btn.sel{border-color:var(--gold);background:#fff3d0;}
.name-input{width:100%;padding:12px 16px;border:2.5px solid var(--border);border-radius:12px;
  font-family:'Nunito','Noto Sans SC',sans-serif;font-size:15px;font-weight:600;outline:none;
  transition:border-color .2s;}
.name-input:focus{border-color:var(--blue);}
body.lang-zh .name-input:focus{border-color:var(--gold);}
.btn-create{background:linear-gradient(135deg,var(--blue),var(--purple));color:white;border:none;
  padding:13px;border-radius:12px;font-family:'Fredoka One','ZCOOL XiaoWei',cursive;
  font-size:18px;cursor:pointer;transition:opacity .2s;letter-spacing:1px;}
body.lang-zh .btn-create{background:linear-gradient(135deg,#c0392b,#e74c3c);letter-spacing:3px;font-size:19px;}
.btn-create:hover{opacity:.9;}

/* ── HEADER ── */
header{background:var(--header-bg);padding:12px 22px;display:flex;align-items:center;justify-content:space-between;
  box-shadow:0 2px 16px rgba(0,0,0,0.2);position:sticky;top:0;z-index:100;}
.logo{font-family:var(--logo-font),'Fredoka One',cursive;font-size:22px;color:var(--accent);
  display:flex;align-items:center;gap:8px;letter-spacing:2px;}
body.lang-zh .logo{letter-spacing:4px;}
.header-right{display:flex;gap:8px;align-items:center;}
.lang-toggle{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.25);
  color:white;padding:6px 12px;border-radius:50px;font-size:12px;font-weight:700;
  cursor:pointer;transition:background .2s;}
.lang-toggle:hover{background:rgba(255,255,255,.22);}
.user-pill{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.1);
  border:1px solid rgba(255,255,255,.2);border-radius:50px;padding:6px 14px;
  cursor:pointer;font-size:13px;font-weight:700;color:white;transition:all .2s;}
.user-pill:hover{background:rgba(255,255,255,.2);}
.up-dot{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;}
.btn-scores{background:var(--accent);color:white;border:none;padding:8px 16px;border-radius:50px;
  font-family:'Nunito','Noto Sans SC',sans-serif;font-weight:800;font-size:13px;cursor:pointer;transition:transform .15s;}
body.lang-zh .btn-scores{color:var(--ink);}
.btn-scores:hover{transform:translateY(-2px);}

main{max-width:920px;margin:0 auto;padding:24px 20px 60px;}

/* ── WELCOME BAR ── */
.welcome-bar{background:linear-gradient(135deg,var(--ink),#0f3460);border-radius:var(--radius);
  padding:22px 28px;margin-bottom:28px;color:white;
  display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;}
body.lang-zh .welcome-bar{background:linear-gradient(135deg,#1a1a2e,#0f3460);}
.wb-left h2{font-family:'Fredoka One',cursive;font-size:22px;margin-bottom:4px;}
body.lang-zh .wb-left h2{font-family:'ZCOOL XiaoWei',serif;letter-spacing:2px;}
.wb-left p{font-size:13px;opacity:.8;}
.wb-stats{display:flex;gap:12px;}
.wb-stat{background:rgba(255,255,255,.12);border-radius:12px;padding:10px 18px;text-align:center;}
.ws-num{font-family:'Fredoka One',cursive;font-size:26px;color:var(--accent);}
body.lang-zh .ws-num{font-family:'ZCOOL XiaoWei',serif;}
.ws-label{font-size:11px;opacity:.7;margin-top:2px;}

/* ── FILTER & GRID ── */
.section-title{font-size:18px;font-weight:800;margin-bottom:12px;color:var(--text);}
body.lang-zh .section-title{font-family:'ZCOOL XiaoWei',serif;font-size:20px;letter-spacing:2px;}
.filter-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px;}
.filter-btn{background:white;border:2.5px solid var(--border);border-radius:50px;
  padding:7px 15px;font-family:'Nunito','Noto Sans SC',sans-serif;font-weight:700;font-size:13px;
  cursor:pointer;transition:all .2s;color:var(--text);}
.filter-btn:hover,.filter-btn.active{border-color:var(--blue);background:#eff6ff;color:var(--blue);}
body.lang-zh .filter-btn:hover, body.lang-zh .filter-btn.active{border-color:var(--gold);background:#fff8e0;color:var(--ink);}
.search-bar{width:100%;padding:11px 18px;border:2.5px solid var(--border);border-radius:50px;
  font-family:'Nunito','Noto Sans SC',sans-serif;font-size:14px;font-weight:600;outline:none;
  margin-bottom:12px;transition:border-color .2s;}
.search-bar:focus{border-color:var(--blue);}
body.lang-zh .search-bar:focus{border-color:var(--gold);}
.articles-count{text-align:center;color:var(--muted);font-size:12px;font-weight:700;letter-spacing:1px;margin-bottom:14px;}
.articles-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px;margin-bottom:32px;}
.article-card-mini{background:white;border-radius:var(--radius);padding:16px;
  box-shadow:0 2px 10px rgba(0,0,0,.06);cursor:pointer;transition:all .2s;border:2px solid transparent;}
.article-card-mini:hover{transform:translateY(-4px);box-shadow:var(--shadow);border-color:var(--blue);}
body.lang-zh .article-card-mini:hover{border-color:var(--gold);}
.article-card-mini.completed{border-color:var(--green);}
body.lang-zh .article-card-mini.completed{border-color:var(--jade);}
.mini-emoji{font-size:30px;flex-shrink:0;}
.mini-header{display:flex;align-items:flex-start;gap:10px;margin-bottom:10px;}
.mini-title{font-weight:800;font-size:14px;line-height:1.4;}
.mini-topic{font-size:11px;color:var(--muted);margin-top:3px;font-weight:600;}
.mini-footer{display:flex;align-items:center;justify-content:space-between;}
.mini-badge{font-size:11px;font-weight:700;padding:3px 10px;border-radius:50px;background:#eff6ff;color:var(--blue);}
body.lang-zh .mini-badge{background:#fff8e0;color:#b7791f;}
.mini-score{font-family:'Fredoka One',cursive;font-size:15px;}
body.lang-zh .mini-score{font-family:'ZCOOL XiaoWei',serif;}
.mini-score.great{color:var(--green);}
.mini-score.ok{color:var(--orange);}
.mini-score.low{color:var(--red);}

/* ── READING ── */
#reading-section{display:none;}
.art-card{background:white;border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;margin-bottom:18px;}
.art-header{background:linear-gradient(135deg,var(--ink),#0f3460);padding:20px 24px;color:white;}
.art-header h1{font-family:'Fredoka One',cursive;font-size:20px;margin-bottom:10px;}
body.lang-zh .art-header h1{font-family:'ZCOOL XiaoWei',serif;letter-spacing:2px;}
.art-meta{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px;}
.badge{background:rgba(255,255,255,.2);padding:3px 12px;border-radius:50px;font-size:11px;font-weight:700;}
.ctrl-bar{display:flex;gap:8px;flex-wrap:wrap;}
.ctrl-btn{background:rgba(255,255,255,.15);border:1.5px solid rgba(255,255,255,.35);color:white;
  border-radius:50px;padding:7px 14px;font-family:'Nunito','Noto Sans SC',sans-serif;
  font-weight:700;font-size:12px;cursor:pointer;transition:background .2s;}
.ctrl-btn:hover{background:rgba(255,255,255,.28);}
.ctrl-btn.speaking{background:rgba(251,191,36,.4);}
.timer-bar{background:#f8fafc;padding:9px 24px;display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid var(--border);}
.timer-num{font-family:'Fredoka One',cursive;font-size:20px;color:var(--blue);}
body.lang-zh .timer-num{font-family:'ZCOOL XiaoWei',serif;color:#c0392b;}
.timer-label{font-size:11px;color:var(--muted);font-weight:700;letter-spacing:1px;}
.art-body{padding:24px;line-height:1.95;font-size:16px;}
body.lang-zh .art-body{line-height:2.2;letter-spacing:.3px;}
.art-body p{margin-bottom:14px;}
.vocab-word{cursor:pointer;border-bottom:2px dashed var(--blue);color:var(--text);
  font-weight:700;padding:0 2px;border-radius:3px;transition:background .15s;}
body.lang-zh .vocab-word{border-bottom-color:var(--gold);}
.vocab-word:hover{background:#dbeafe;}
body.lang-zh .vocab-word:hover{background:#fff3d0;}
.tooltip{position:fixed;background:#1e293b;color:white;padding:10px 14px;border-radius:12px;
  font-size:13px;max-width:240px;z-index:999;pointer-events:none;opacity:0;transition:opacity .2s;
  line-height:1.5;box-shadow:0 8px 24px rgba(0,0,0,.3);}
.tooltip.visible{opacity:1;}
.tooltip strong{color:var(--yellow);font-size:14px;display:block;margin-bottom:3px;}

/* ── QUIZ ── */
#quiz-section{display:none;}
.quiz-top{text-align:center;margin-bottom:20px;}
.quiz-top h2{font-family:'Fredoka One',cursive;font-size:26px;color:var(--text);}
body.lang-zh .quiz-top h2{font-family:'ZCOOL XiaoWei',serif;letter-spacing:3px;}
.quiz-top p{color:var(--muted);font-size:13px;margin-top:5px;}
.prog-outer{background:var(--border);height:8px;border-radius:99px;margin:12px 0 22px;overflow:hidden;}
.prog-inner{height:100%;background:linear-gradient(90deg,var(--blue),var(--purple));border-radius:99px;transition:width .4s;}
body.lang-zh .prog-inner{background:linear-gradient(90deg,#c0392b,var(--gold));}
.q-card{background:white;border-radius:var(--radius);padding:24px;box-shadow:var(--shadow);margin-bottom:16px;}
.q-num{font-size:11px;font-weight:800;color:var(--purple);text-transform:uppercase;letter-spacing:2px;margin-bottom:8px;}
body.lang-zh .q-num{color:#c0392b;}
.q-text{font-size:16px;font-weight:700;line-height:1.5;margin-bottom:18px;}
.options{display:flex;flex-direction:column;gap:9px;}
.opt-btn{background:#f8fafc;border:2.5px solid var(--border);border-radius:13px;padding:12px 16px;
  text-align:left;font-family:'Nunito','Noto Sans SC',sans-serif;font-size:14px;font-weight:600;
  cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:11px;color:var(--text);}
.opt-btn:hover:not(:disabled){border-color:var(--blue);background:#eff6ff;transform:translateX(4px);}
body.lang-zh .opt-btn:hover:not(:disabled){border-color:var(--gold);background:#fff8e0;}
.opt-label{width:28px;height:28px;background:var(--border);border-radius:50%;
  display:flex;align-items:center;justify-content:center;font-weight:800;font-size:12px;flex-shrink:0;}
.opt-btn.correct{border-color:var(--green);background:#f0fdf4;color:var(--green-d);}
.opt-btn.correct .opt-label{background:var(--green);color:white;}
.opt-btn.wrong{border-color:var(--red);background:#fff5f5;color:var(--red);}
.opt-btn.wrong .opt-label{background:var(--red);color:white;}
.explanation{margin-top:10px;padding:11px 14px;background:#f0fdf4;border-left:4px solid var(--green);
  border-radius:10px;font-size:13px;color:#166534;font-weight:600;display:none;line-height:1.6;}
.explanation.show{display:block;}
.explanation.wrong-exp{background:#fff5f5;border-color:var(--red);color:#991b1b;}
.quiz-nav{display:flex;justify-content:space-between;align-items:center;margin-top:6px;}
.q-counter{font-size:13px;color:var(--muted);font-weight:700;}
.btn-next,.btn-submit{padding:11px 26px;border-radius:50px;border:none;
  font-family:'Fredoka One',cursive;font-size:17px;cursor:pointer;display:none;transition:transform .2s;}
body.lang-zh .btn-next, body.lang-zh .btn-submit{font-family:'ZCOOL XiaoWei',serif;letter-spacing:2px;}
.btn-next{background:linear-gradient(135deg,var(--green),var(--green-d));color:white;}
.btn-submit{background:linear-gradient(135deg,var(--orange),var(--red));color:white;}
.btn-next:hover,.btn-submit:hover{transform:translateY(-2px);}

/* ── RESULTS ── */
#result-section{display:none;text-align:center;}
.result-card{background:white;border-radius:var(--radius);padding:34px 26px;box-shadow:var(--shadow);}
.score-ring{width:128px;height:128px;border-radius:50%;margin:0 auto 18px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  font-family:'Fredoka One',cursive;}
body.lang-zh .score-ring{font-family:'ZCOOL XiaoWei',serif;}
.score-ring.great{background:linear-gradient(135deg,var(--green),var(--green-d));color:white;}
.score-ring.ok{background:linear-gradient(135deg,var(--orange),var(--yellow));color:var(--text);}
.score-ring.low{background:linear-gradient(135deg,var(--red),var(--orange));color:white;}
.score-main{font-size:42px;line-height:1;}
.score-sub{font-size:14px;opacity:.8;}
.result-emoji{font-size:50px;margin-bottom:10px;}
.result-title{font-family:'Fredoka One',cursive;font-size:28px;margin-bottom:8px;}
body.lang-zh .result-title{font-family:'ZCOOL XiaoWei',serif;letter-spacing:3px;}
.result-msg{color:var(--muted);font-size:14px;margin-bottom:22px;}
.result-pills{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-bottom:24px;}
.rpill{background:#f8fafc;border:2px solid var(--border);border-radius:50px;padding:8px 16px;font-size:13px;font-weight:700;}
.result-btns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;}
.rbtn{padding:12px 26px;border-radius:50px;font-family:'Fredoka One',cursive;font-size:16px;
  cursor:pointer;border:none;transition:transform .2s;}
body.lang-zh .rbtn{font-family:'ZCOOL XiaoWei',serif;letter-spacing:2px;}
.rbtn:hover{transform:translateY(-2px);}
.rbtn.blue{background:linear-gradient(135deg,var(--blue),var(--purple));color:white;}
.rbtn.orange{background:linear-gradient(135deg,var(--orange),var(--red));color:white;}
.rbtn.green{background:linear-gradient(135deg,var(--green),var(--green-d));color:white;}

/* ── MODAL ── */
.modal-overlay{position:fixed;inset:0;background:rgba(15,23,42,.6);backdrop-filter:blur(4px);
  z-index:200;display:none;align-items:center;justify-content:center;padding:20px;}
.modal-overlay.open{display:flex;}
.modal{background:white;border-radius:var(--radius);width:100%;max-width:540px;max-height:82vh;
  overflow-y:auto;padding:26px;box-shadow:0 20px 60px rgba(0,0,0,.25);}
.modal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;}
.modal-head h3{font-family:'Fredoka One',cursive;font-size:20px;}
body.lang-zh .modal-head h3{font-family:'ZCOOL XiaoWei',serif;letter-spacing:2px;}
.btn-close{background:none;border:none;font-size:22px;cursor:pointer;color:var(--muted);}
.h-empty{text-align:center;color:var(--muted);padding:36px;font-size:14px;}
.h-item{border:2px solid var(--border);border-radius:13px;padding:12px 16px;margin-bottom:9px;
  display:flex;align-items:center;justify-content:space-between;gap:10px;}
.h-title{font-weight:700;font-size:13px;}
.h-meta{font-size:11px;color:var(--muted);margin-top:2px;}
.score-badge{font-family:'Fredoka One',cursive;font-size:16px;padding:5px 13px;border-radius:50px;color:white;}
body.lang-zh .score-badge{font-family:'ZCOOL XiaoWei',serif;}
.score-badge.great{background:var(--green);}
.score-badge.ok{background:var(--orange);}
.score-badge.low{background:var(--red);}
.big-btn{background:linear-gradient(135deg,var(--blue),var(--purple));color:white;border:none;
  padding:13px 32px;border-radius:50px;font-family:'Fredoka One',cursive;font-size:19px;
  cursor:pointer;box-shadow:0 4px 20px rgba(59,130,246,.3);transition:transform .2s;}
body.lang-zh .big-btn{background:linear-gradient(135deg,#c0392b,var(--gold));
  font-family:'ZCOOL XiaoWei',serif;letter-spacing:3px;box-shadow:0 4px 20px rgba(192,57,43,.3);}
.big-btn:hover{transform:translateY(-3px);}
@media(max-width:600px){.wb-stats{display:none;}.art-header{padding:14px;}}
</style>
</head>
<body>

<!-- TOOLTIP -->
<div class="tooltip" id="tooltip"><strong id="tip-w"></strong><span id="tip-d"></span></div>

<!-- HISTORY MODAL -->
<div class="modal-overlay" id="modal-history">
  <div class="modal">
    <div class="modal-head">
